  });
};

async function submitDailyChanges() {
  const items = getDailyChangedItems();
  if (!items.length) { toast('請先調整品項數量', 'error'); return; }
  if (!dailyClinicId) { toast('請選擇診所', 'error'); return; }

  const summary = items.map(it => `${it.changeType === 'in' ? '+' : '-'}${it.quantity} ${it.name}`).join('、');
  if (!await showConfirm('確認送出', `將送出 ${items.length} 項變動：<br><small>${summary}</small>`)) return;

  try {
    for (const it of items) {
      const { data: inv } = await withTimeout(sb.from('clinic_inventory')
        .select('*').eq('clinic_id', dailyClinicId).eq('material_id', it.material_id).single());

      if (it.changeType === 'out') {
        if (!inv) { toast(`${it.name} 無庫存紀錄`, 'error'); continue; }
        if (inv.current_stock < it.quantity) { toast(`${it.name} 庫存不足 (${inv.current_stock})`, 'error'); continue; }
        const newStock = inv.current_stock - it.quantity;
        const safety = inv.safety_stock ?? 5;
        const notifyLevel = inv.notify_level ?? 0;
        let newNotifyLevel = notifyLevel;
        const nc = await loadNotifyConfig();
        if (newStock < safety / 2 && notifyLevel < 2 && nc.low_stock?.enable_half !== false) {
          notifyLowStock(dailyClinicId, it.name, newStock, safety, 'half');
          newNotifyLevel = 2;
        } else if (newStock < safety && notifyLevel < 1 && nc.low_stock?.enable_low !== false) {
          notifyLowStock(dailyClinicId, it.name, newStock, safety, 'low');
          newNotifyLevel = 1;
        }
        const updateData = { current_stock: newStock };
        if (newNotifyLevel !== notifyLevel) updateData.notify_level = newNotifyLevel;
        await withTimeout(sb.from('clinic_inventory').update(updateData).eq('id', inv.id));
      } else {
        if (inv) {
          const safety = inv.safety_stock ?? 5;
          const newStock = inv.current_stock + it.quantity;
          const resetNotify = newStock >= safety && (inv.notify_level ?? 0) > 0;
          await withTimeout(sb.from('clinic_inventory').update({
            current_stock: newStock,
            ...(resetNotify ? { notify_level: 0 } : {})
          }).eq('id', inv.id));
        } else {
          await withTimeout(sb.from('clinic_inventory').insert({ clinic_id: dailyClinicId, material_id: it.material_id, current_stock: it.quantity, safety_stock: 5, notify_level: 0 }));
        }
      }
      await withTimeout(sb.from('inventory_logs').insert({
        clinic_id: dailyClinicId, material_id: it.material_id,
        type: it.changeType === 'in' ? 'in' : 'out',
        quantity: it.quantity,
        operator_id: currentUser.id, operator_name: userProfile.display_name,
        notes: it.changeType === 'in' ? '日常入庫' : '日常消耗'
      }));
    }
    toast('所有變動已送出');
    dailyQtyMap = {};
    // Reload inventory
    const { data: invData } = await withTimeout(sb.from('clinic_inventory').select('*').eq('clinic_id', dailyClinicId));
    dailyInvMap = {};
    (invData || []).forEach(i => { dailyInvMap[i.material_id] = i; });
    renderDailyContent();
    loadDailyConfirmedLogs();
  } catch (e) {
    toast('送出失敗: ' + e.message, 'error');
  }
}

window.toggleDailyConfirmedPanel = function() {
  const panel = document.getElementById('dailyConfirmedPanel');
  if (panel) panel.classList.toggle('collapsed');
};

async function loadDailyConfirmedLogs() {
  const titleEl = document.getElementById('dailyConfirmedTitle');
  const bodyEl = document.getElementById('dailyConfirmedBody');
  if (!titleEl || !bodyEl) return;
  if (!dailyClinicId) { bodyEl.innerHTML = '<div class="cp-empty">請選擇診所</div>'; return; }

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);

  const { data: logs } = await withTimeout(sb.from('inventory_logs').select('*')
    .eq('clinic_id', dailyClinicId)
    .gte('created_at', todayStart.toISOString())
    .lte('created_at', todayEnd.toISOString())
    .order('created_at', { ascending: false }));

  const items = logs || [];
  titleEl.textContent = `✅ 已確認變動 (${items.length})`;

  if (!items.length) {
    bodyEl.innerHTML = '<div class="cp-empty">今天尚無已確認變動</div>';
    return;
  }
  bodyEl.innerHTML = items.map(log => {
    const isIn = log.type === 'in';
    const time = new Date(log.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    return `<div class="cp-item">
      <div class="cp-item-left">
        <span class="cp-item-name">${escHtml(materialName(log.material_id))}</span>
        <span class="cp-item-qty ${isIn ? 'positive' : 'negative'}">${isIn ? '+' : '-'}${log.quantity}</span>
        <span class="cp-item-time">${time}</span>
      </div>
      <button class="cp-item-cancel" onclick="cancelDailyLog(${log.id})">取消</button>
    </div>`;
  }).join('');
}

window.cancelDailyLog = async function(logId) {
  if (!await showConfirm('取消變動', '確定要取消這筆變動？庫存將反向調整。')) return;
  try {
    const { data: log, error: e1 } = await withTimeout(sb.from('inventory_logs').select('*').eq('id', logId).single());
    if (e1 || !log) { toast('找不到該筆紀錄', 'error'); return; }

    const { data: inv } = await withTimeout(sb.from('clinic_inventory').select('*')
      .eq('clinic_id', log.clinic_id).eq('material_id', log.material_id).single());

    if (inv) {
      const newStock = log.type === 'out' ? inv.current_stock + log.quantity : inv.current_stock - log.quantity;
      await withTimeout(sb.from('clinic_inventory').update({ current_stock: Math.max(0, newStock) }).eq('id', inv.id));
    }

    await withTimeout(sb.from('inventory_logs').delete().eq('id', logId));
    toast('變動已取消，庫存已調整');

    // Reload inventory map and confirmed logs
    const { data: invData } = await withTimeout(sb.from('clinic_inventory').select('*').eq('clinic_id', dailyClinicId));
    dailyInvMap = {};
    (invData || []).forEach(i => { dailyInvMap[i.material_id] = i; });
    renderDailyContent();
    loadDailyConfirmedLogs();
  } catch (e) {
    toast('取消失敗: ' + e.message, 'error');
  }
};

    ${orderConfirmItems.map((it, i) => `<div class="order-confirm-item">
      <span><strong>${escHtml(it.name)}</strong> x${it.quantity}${canSeePrice() ? ' <small class="text-muted">' + fmtMoney(it.unit_price * it.quantity) + '</small>' : ''}</span>
      <label style="font-size:.78rem;color:var(--danger);display:flex;align-items:center;gap:3px;cursor:pointer;margin:0 8px"><input type="checkbox" onchange="orderConfirmItems[${i}].is_urgent=this.checked" ${it.is_urgent?'checked':''}> 急件</label>
      <button class="btn btn-danger btn-xs" onclick="removeOrderConfirmItem(${i})">✕</button>
    </div>`).join('')}
    <div class="order-confirm-actions">
      <button class="btn btn-ghost" onclick="orderConfirmItems=[];updateOrderConfirmArea()">清空</button>
      <button class="btn btn-success" onclick="submitOrdering()">送出叫貨</button>
    </div>
  </div>`;
}

window.removeOrderConfirmItem = function(idx) {
  orderConfirmItems.splice(idx, 1);
  updateOrderConfirmArea();
};

async function submitOrdering() {
  if (!orderConfirmItems.length) { toast('清單是空的', 'error'); return; }
  const cid = orderClinicId || userProfile.clinic_id;
  if (!cid) { toast('請選擇診所', 'error'); return; }

  if (!await showConfirm('送出叫貨', `共 ${orderConfirmItems.length} 項品項，確定送出？`)) return;

  try {
    // 不足一單位叫貨數量時，無條件進位
    const roundedItems = orderConfirmItems.map(it => {
      const mat = allMaterials.find(m => m.id === it.material_id);
      const ratio = mat ? (mat.unit_ratio || 1) : 1;
      const qty = ratio > 1 ? Math.ceil(it.quantity / ratio) * ratio : it.quantity;
      return { ...it, quantity: qty };
    });
    const totalAmount = roundedItems.reduce((s, it) => s + (it.unit_price || 0) * it.quantity, 0);
    const { data: order, error: e1 } = await withTimeout(sb.from('orders').insert({
      status: 'pending', created_by: currentUser.id, total_amount: totalAmount, notes: ''
    }).select().single());
    if (e1) { toast('建立失敗: ' + e1.message, 'error'); return; }

    const orderItems = roundedItems.map(it => ({
      order_id: order.id, material_id: it.material_id, clinic_id: cid,
      quantity: it.quantity, unit_price: it.unit_price || 0,
      is_urgent: it.is_urgent || false
    }));
    const { error: e2 } = await withTimeout(sb.from('order_items').insert(orderItems));
    if (e2) { toast('明細建立失敗: ' + e2.message, 'error'); return; }

    // 自動建立 delivery_confirmation，讓收貨頁面立即顯示
    const { data: existDc } = await withTimeout(sb.from('delivery_confirmations').select('id').eq('order_id', order.id).eq('clinic_id', cid));
    if (!existDc || existDc.length === 0) {
      await withTimeout(sb.from('delivery_confirmations').insert({ order_id: order.id, clinic_id: cid, status: 'pending' }));
    }

    toast('叫貨單已送出');
    orderConfirmItems = [];
    orderQtyMap = {};
    updateOrderConfirmArea();
    updateOrderSubmitBar();
    loadConfirmedOrders();
  } catch (e) {
    toast('錯誤: ' + e.message, 'error');
  }
}

window.toggleOrderConfirmedPanel = function() {
  const panel = document.getElementById('orderConfirmedPanel');
  if (panel) panel.classList.toggle('collapsed');
};

async function loadConfirmedOrders() {
  const titleEl = document.getElementById('orderConfirmedTitle');
  const bodyEl = document.getElementById('orderConfirmedBody');
  if (!titleEl || !bodyEl) return;

  const cid = orderClinicId || userProfile.clinic_id;

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);

  const { data: orders } = await withTimeout(sb.from('orders').select('*')
    .gte('created_at', todayStart.toISOString())
    .lte('created_at', todayEnd.toISOString())
    .eq('created_by', currentUser.id)
    .order('created_at', { ascending: false }));

  // Filter orders that have order_items belonging to the selected clinic
  const orderIds = (orders || []).map(o => o.id);
  let filteredOrders = [];
  let oiMap = {};
  if (orderIds.length > 0 && cid) {
    const { data: allOI } = await withTimeout(sb.from('order_items').select('*').in('order_id', orderIds));
    (allOI || []).forEach(oi => { if (!oiMap[oi.order_id]) oiMap[oi.order_id] = []; oiMap[oi.order_id].push(oi); });
    filteredOrders = (orders || []).filter(o => (oiMap[o.id] || []).some(oi => oi.clinic_id === cid));
  } else {
    filteredOrders = orders || [];
    if (orderIds.length > 0) {
      const { data: allOI } = await withTimeout(sb.from('order_items').select('*').in('order_id', orderIds));
      (allOI || []).forEach(oi => { if (!oiMap[oi.order_id]) oiMap[oi.order_id] = []; oiMap[oi.order_id].push(oi); });
    }
  }

  titleEl.textContent = `✅ 已送出叫貨單 (${filteredOrders.length})`;

  if (!filteredOrders.length) {
    bodyEl.innerHTML = '<div class="cp-empty">今天尚無已送出叫貨單</div>';
    return;
  }

  bodyEl.innerHTML = filteredOrders.map(o => {
    const ois = (oiMap[o.id] || []).filter(oi => !cid || oi.clinic_id === cid);
    const time = new Date(o.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    const itemsHtml = ois.map(oi => {
      const isSt = oi.item_status || 'pending';
      const canCancel = (isSt === 'pending' || isSt === 'confirmed');
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid var(--border-light)">
        <span style="font-size:.84rem">${escHtml(materialName(oi.material_id))} x${oi.quantity}</span>
        ${canCancel ? `<button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:.9rem;padding:2px 6px" onclick="event.stopPropagation();cancelOrderItem(${o.id},${oi.id})" title="取消此品項">✕</button>` : ''}
      </div>`;
    }).join('');
    return `<div class="cp-item" style="flex-direction:column;align-items:stretch;gap:0">
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:6px;border-bottom:1px solid var(--border)">
        <span class="cp-item-name">#${o.id} ${statusBadge(o.status)} <span class="cp-item-time">${time}</span></span>
        ${o.status === 'pending' && !ois.some(oi => (oi.item_status === 'shipped' || oi.item_status === 'delivered')) ? `<button class="cp-item-cancel" onclick="cancelOrder(${o.id})">整單取消</button>` : ''}
      </div>
      <div style="margin-top:4px">${itemsHtml}</div>
    </div>`;
  }).join('');
}

window.cancelOrder = async function(orderId) {
  if (!await showConfirm('取消叫貨單', '確定要取消整張叫貨單？')) return;
  try {
    await withTimeout(sb.from('order_items').delete().eq('order_id', orderId));
    await withTimeout(sb.from('orders').delete().eq('id', orderId));
    toast('叫貨單已取消');
    loadConfirmedOrders();
  } catch (e) {
    toast('取消失敗: ' + e.message, 'error');
  }
};

window.cancelOrderItem = async function(orderId, itemId) {
  if (!await showConfirm('取消品項', '確定要取消此品項？')) return;
  try {
    await withTimeout(sb.from('order_items').delete().eq('id', itemId));
    const { data: remaining } = await withTimeout(sb.from('order_items').select('id').eq('order_id', orderId));
    if (!remaining || remaining.length === 0) {
      await withTimeout(sb.from('orders').delete().eq('id', orderId));
      toast('品項已取消，叫貨單已清空刪除');
    } else {
      toast('品項已取消');
    }
    loadConfirmedOrders();
  } catch (e) {
    toast('取消失敗: ' + e.message, 'error');
  }
};

// 叫貨管理用：單項取消（刪除 item，重算狀態）
window.cancelOrderItemMgmt = async function(orderId, itemId) {
  if (!await showConfirm('取消品項', '確定要取消此品項？')) return;

    await withTimeout(sb.from('order_items').delete().eq('id', itemId));
    const { data: remaining } = await withTimeout(sb.from('order_items').select('id').eq('order_id', orderId));
    if (!remaining || remaining.length === 0) {
      await withTimeout(sb.from('orders').delete().eq('id', orderId));
      toast('品項已取消，叫貨單已清空刪除');
    } else {
      await recomputeOrderStatus(orderId);

    }

};

// 叫貨管理用：取消整單（刪所有 items + order）
window.cancelWholeOrder = async function(orderId) {
  // 檢查是否有品項已收貨
  const { data: dcs } = await withTimeout(sb.from('delivery_confirmations').select('*').eq('order_id', orderId));
  if (dcs && dcs.some(dc => dc.status === 'confirmed')) {
    toast('有品項已收貨，請先讓診所回待收貨', 'error');
    return;
  }
  // 檢查是否有品項已到貨
  const { data: oiCheck } = await withTimeout(sb.from('order_items').select('item_status').eq('order_id', orderId));
  if (oiCheck && oiCheck.some(it => it.item_status === 'delivered')) {
    toast('有品項已到貨，無法取消整單', 'error');
    return;
  }
  if (!await showConfirm('取消整單', '確定要取消整張叫貨單？所有品項都會被刪除。')) return;
  try {
    // 同時刪除 delivery_confirmations
    await withTimeout(sb.from('delivery_confirmations').delete().eq('order_id', orderId));
    await withTimeout(sb.from('order_items').delete().eq('order_id', orderId));
    await withTimeout(sb.from('orders').delete().eq('id', orderId));
    toast('叫貨單已取消');
    renderOrderMgmt();
  } catch (e) { toast('取消失敗: ' + e.message, 'error'); }
};

async function renderOrderMgmtList(orders) {
  const el = document.getElementById('orderMgmtList');
  if (!orders.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><span>📭</span>沒有叫貨單</div></div>';
    return;
  }

  // 排序
  const sorted = [...orders].sort((a, b) => {
    const ta = new Date(a.created_at).getTime(), tb = new Date(b.created_at).getTime();
    return window.orderSortAsc ? ta - tb : tb - ta;
  });

  // 取得所有訂單的 order_items 以取得診所名
  const orderIds = sorted.map(o => o.id);
  const { data: allOI } = await withTimeout(sb.from('order_items').select('order_id, clinic_id, item_status').in('order_id', orderIds));
  const orderClinicMap = {};
  const orderHasShipped = {};
  (allOI || []).forEach(oi => {
    if (!orderClinicMap[oi.order_id]) orderClinicMap[oi.order_id] = new Set();
    if (oi.clinic_id) orderClinicMap[oi.order_id].add(oi.clinic_id);
    if (oi.item_status === 'delivered' || oi.item_status === 'shipped') orderHasShipped[oi.order_id] = true;
  });

  const sortBtnHtml = `<div style="margin-bottom:8px;display:flex;gap:6px">
    <button class="btn ${window.orderSortAsc ? 'btn-ghost' : 'btn-primary'} btn-xs" onclick="window.orderSortAsc=false;renderOrderMgmt()">新→舊</button>
    <button class="btn ${window.orderSortAsc ? 'btn-primary' : 'btn-ghost'} btn-xs" onclick="window.orderSortAsc=true;renderOrderMgmt()">舊→新</button>
  </div>`;

  el.innerHTML = sortBtnHtml + sorted.map(o => {
    const realStatus = o._realStatus || o.status;
    const clinicIds = orderClinicMap[o.id] ? [...orderClinicMap[o.id]] : [];
    const clinicLabel = clinicIds.map(cid => clinicName(cid)).join(', ') || '-';
    return `
    <div class="order-card" id="oc_${o.id}">
      <div class="order-card-header" onclick="toggleOrderCard(${o.id})">
        <div>
          <strong>#${o.id}</strong> - ${escHtml(clinicLabel)} - ${fmtDate(o.created_at)} ${statusBadge(realStatus)}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:.85rem">${userName(o.created_by)} | ${fmtMoney(o.total_amount)}</span>
          ${orderHasShipped[o.id]
            ? `<button class="btn btn-danger btn-xs" disabled style="opacity:0.4;cursor:not-allowed;pointer-events:none">取消整單（有品項已出貨）</button>`
            : `<button class="btn btn-danger btn-xs" onclick="event.stopPropagation();cancelWholeOrder(${o.id})">取消整單</button>`}
          <span>▼</span>
        </div>
      </div>
      <div class="order-card-body" id="ocb_${o.id}"></div>
    </div>`;
  }).join('');

  // 恢復展開狀態
  for (const oid of window._expandedOrders) {
    const card = document.getElementById('oc_' + oid);
    if (card) toggleOrderCard(oid);
  }
}

// ---- 叫貨總覽 ----
async function renderOrderSummary() {
  const el = document.getElementById('orderMgmtTabContent');
  el.innerHTML = '<div style="text-align:center;padding:32px"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent);width:28px;height:28px;border-width:3px"></div></div>';

  // 讀取 confirmed / shipped 的 order_items（已收貨 delivered 不顯示）
  const { data: items } = await withTimeout(sb.from('order_items').select('*').in('item_status', ['confirmed', 'shipped']));
  if (!items || !items.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><span>📭</span>目前沒有待出貨或已出貨的品項</div></div>';
    return;
  }

  // 按 material_id 彙總：confirmed = 待出貨, shipped = 已出貨
  const grouped = {};
  items.forEach(it => {
    const mid = it.material_id;
    if (!grouped[mid]) grouped[mid] = { confirmedItems: [], shippedItems: [], totalConfirmedQty: 0, totalShippedQty: 0, totalActual: 0, urgentQty: 0 };
    if (it.item_status === 'shipped') {
      grouped[mid].shippedItems.push(it);
      grouped[mid].totalShippedQty += (it.quantity || 0);
    } else {
      grouped[mid].confirmedItems.push(it);
      grouped[mid].totalConfirmedQty += (it.quantity || 0);
    }
    if (it.is_urgent) grouped[mid].urgentQty += (it.quantity || 0);
    grouped[mid].totalActual += (it.actual_ordered_qty || 0);
  });

  // 按廠商分組
  const bySupplier = {};
  Object.keys(grouped).forEach(mid => {
    const mat = materialObj(Number(mid));
    const suppId = mat ? (mat.supplier_id || 0) : 0;
    if (!bySupplier[suppId]) bySupplier[suppId] = [];
    bySupplier[suppId].push({ mid, g: grouped[mid], mat });
  });

  let html = '';
  let osIdx = 0;
  Object.keys(bySupplier).forEach(suppId => {
    const suppLabel = suppId == 0 ? '未指定廠商' : supplierName(parseInt(suppId));
    const mats = bySupplier[suppId];
    const osId = 'osSup_' + osIdx++;
    html += `<div class="card" style="overflow:hidden;margin-bottom:8px">
      <div class="card-title" style="cursor:pointer;user-select:none" onclick="const b=document.getElementById('${osId}');const open=b.style.display!=='none';b.style.display=open?'none':'block';this.querySelector('.os-arr').textContent=open?'▶':'▼'">
        ${escHtml(suppLabel)} (${mats.length}) <span class="os-arr" style="font-size:.8rem;margin-left:6px">▼</span>
      </div>
      <div id="${osId}"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.9rem">
      <thead><tr style="border-bottom:2px solid var(--border);text-align:left">
        <th style="padding:10px 12px">品項名</th>
        <th style="padding:10px 12px;color:var(--danger)">急件</th>
        <th style="padding:10px 12px">待出貨</th><th style="padding:10px 12px">已出貨</th>
        <th style="padding:10px 12px">已叫貨數量</th>
        <th style="padding:10px 12px">差額</th></tr></thead><tbody>`;

    mats.forEach(({ mid, g, mat }) => {
      const name = mat ? escHtml(mat.name) : `#${mid}`;
      const ratio = mat ? (mat.unit_ratio || 1) : 1;
      const orderUnit = mat ? (mat.order_unit || mat.unit || '') : '';
      const confirmedQty = Math.round((g.totalConfirmedQty / ratio) * 100) / 100;
      const shippedQty = Math.round((g.totalShippedQty / ratio) * 100) / 100;
      const actualQty = Math.round((g.totalActual / ratio) * 100) / 100;
      const diff = Math.round((confirmedQty - actualQty) * 100) / 100;
      const diffColor = diff > 0 ? 'var(--danger)' : diff < 0 ? 'var(--success)' : 'var(--text-light)';
      const itemIds = g.confirmedItems.map(i => i.id).join(',');

      const urgentQty = g.urgentQty > 0 ? Math.round((g.urgentQty / ratio) * 100) / 100 : 0;

      html += `<tr style="border-bottom:1px solid var(--border-light)">
        <td style="padding:10px 12px"><strong>${name}</strong></td>
        <td style="padding:10px 12px;color:var(--danger);font-weight:700">${urgentQty > 0 ? urgentQty + ' ' + escHtml(orderUnit) : ''}</td>
        <td style="padding:10px 12px">${confirmedQty} ${escHtml(orderUnit)}</td>
        <td style="padding:10px 12px">${shippedQty} ${escHtml(orderUnit)}</td>
        <td style="padding:10px 12px">
          <input type="number" value="${actualQty}" min="0" step="0.01"
            style="width:80px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.88rem"
            onchange="onSummaryActualChange(this.value,${ratio},'${itemIds}')">
          ${escHtml(orderUnit)}
        </td>
        <td style="padding:10px 12px;color:${diffColor};font-weight:600">${diff > 0 ? '+' : ''}${diff} ${escHtml(orderUnit)}</td>
      </tr>`;
    });

    html += '</tbody></table></div></div></div>';
  });

  if (!html) html = '<div class="card"><div class="empty-state"><span>📭</span>目前沒有已確認或已出貨的品項</div></div>';
  el.innerHTML = html;
}

window.onSummaryActualChange = async function(val, ratio, itemIdsStr) {
  const actualInOrderUnit = parseFloat(val) || 0;
  const actualDaily = Math.round(actualInOrderUnit * ratio);
  const ids = itemIdsStr.split(',').map(Number);
  if (!ids.length) return;
  try {
    // 將總量平均分配：第一筆存全部，其餘歸 0（簡化處理）
    for (let i = 0; i < ids.length; i++) {
      const qty = i === 0 ? actualDaily : 0;
      await withTimeout(sb.from('order_items').update({ actual_ordered_qty: qty }).eq('id', ids[i]));
    }
    toast('已更新叫貨數量');
  } catch (e) { toast('更新失敗: ' + e.message, 'error'); }
};

// ---- 催貨管理 ----
async function renderRushMgmt() {
  const el = document.getElementById('orderMgmtTabContent');
  el.innerHTML = '<div style="text-align:center;padding:32px"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent);width:28px;height:28px;border-width:3px"></div></div>';

  // 取得所有 confirmed + shipped 品項
  const { data: shippedItems } = await withTimeout(sb.from('order_items').select('*').in('item_status', ['confirmed', 'shipped']));
  if (!shippedItems || !shippedItems.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><span>📭</span>目前沒有已確認或已出貨待收貨的品項</div></div>';
    return;
  }

  // 取得對應的 delivery_confirmations (status=pending)
  const orderIds = [...new Set(shippedItems.map(i => i.order_id))];
  const { data: dcs } = await withTimeout(sb.from('delivery_confirmations').select('*').in('order_id', orderIds).eq('status', 'pending'));
  const dcMap = {};
  (dcs || []).forEach(dc => { dcMap[dc.order_id + '_' + dc.clinic_id] = dc; });

  // 組合資料：每個 shipped item 配上 dc
  const rows = shippedItems.map(it => {
    const dc = dcMap[it.order_id + '_' + it.clinic_id];
    const mat = materialObj(it.material_id);
    const shippedAt = it.updated_at || it.created_at;
    const waitDays = shippedAt ? Math.floor((Date.now() - new Date(shippedAt).getTime()) / 86400000) : 0;
    return {
      item: it,
      dc,
      matName: mat ? mat.name : `#${it.material_id}`,
      itemStatus: it.item_status || 'confirmed',
      clinicId: it.clinic_id,
      clinicLabel: clinicName(it.clinic_id),
      shippedAt,
      waitDays,
      notes: dc ? (dc.notes || '') : ''
    };
  });

  // 按診所分組
  const byClinic = {};
  rows.forEach(r => {
    if (!byClinic[r.clinicId]) byClinic[r.clinicId] = { label: r.clinicLabel, items: [] };
    byClinic[r.clinicId].items.push(r);
  });

  let html = '';
  Object.keys(byClinic).forEach(cid => {
    const group = byClinic[cid];
    const gid = 'rushClinic_' + cid;
    html += `<div class="card" style="margin-bottom:8px">
      <div style="padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600" onclick="document.getElementById('${gid}').style.display=document.getElementById('${gid}').style.display==='none'?'block':'none';this.querySelector('.chevron').textContent=document.getElementById('${gid}').style.display==='none'?'▶':'▼'">
        <span>🏥 ${escHtml(group.label)} (${group.items.length})</span>
        <span class="chevron" style="font-size:.8rem">▼</span>
      </div>
      <div id="${gid}">
        <table style="width:100%;border-collapse:collapse;font-size:.85rem">
          <thead><tr style="border-bottom:2px solid var(--border);text-align:left">
            <th style="padding:8px 12px">品項</th>
            <th style="padding:8px 12px">出貨日</th>
            <th style="padding:8px 12px">等待</th>
            <th style="padding:8px 12px">操作</th>
          </tr></thead><tbody>`;

    group.items.forEach(r => {
      const rushHistory = r.notes.split('\n').filter(l => l.includes('催貨')).map(l => {
        const text = escHtml(l.trim());
        if (text.includes('[診所催貨]')) return `<span style="color:#e67e22">${text}</span>`;
        if (text.includes('[管理催貨]')) return `<span style="color:var(--danger)">${text}</span>`;
        return text;
      }).join('<br>');
      html += `<tr style="border-bottom:1px solid var(--border-light)">
        <td style="padding:8px 12px"><strong>${escHtml(r.matName)}</strong></td>
        <td style="padding:8px 12px">${fmtDate(r.shippedAt)}</td>
        <td style="padding:8px 12px;${r.waitDays >= 3 ? 'color:var(--danger);font-weight:600' : ''}">${r.waitDays} 天</td>
        <td style="padding:8px 12px">
          ${r.dc ? `<button class="btn btn-danger btn-sm" style="font-size:.8rem;padding:4px 10px" onclick="rushFromMgmt(${r.dc.id})">📞 催貨</button>` : '<span style="color:var(--text-light)">無確認單</span>'}
        </td>
      </tr>`;
      if (rushHistory) {
        html += `<tr style="border-bottom:1px solid var(--border-light)"><td colspan="4" style="padding:4px 12px 8px;font-size:.78rem">${rushHistory}</td></tr>`;
      }
    });

    html += '</tbody></table></div></div>';
  });

  if (!html) html = '<div class="card"><div class="empty-state"><span>📭</span>目前沒有已出貨待收貨的品項</div></div>';
  el.innerHTML = html;
}

window.rushFromMgmt = async function(dcId) {
  const now = new Date();
  const ts = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const { data: dc } = await withTimeout(sb.from('delivery_confirmations').select('notes').eq('id', dcId).single());
  const newNotes = ((dc?.notes || '') + `\n[管理催貨] ${ts}`).trim();
  const { error } = await withTimeout(sb.from('delivery_confirmations').update({ notes: newNotes }).eq('id', dcId));
  if (error) { toast('催貨記錄失敗: ' + error.message, 'error'); return; }
  toast('已記錄催貨');
  await renderRushMgmt();
};

async function toggleOrderCard(orderId) {
  const card = document.getElementById('oc_' + orderId);
  const body = document.getElementById('ocb_' + orderId);
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    window._expandedOrders.delete(orderId);
    return;
  }
  card.classList.add('expanded');
  window._expandedOrders.add(orderId);

  if (body.innerHTML) return; // already loaded

  body.innerHTML = '<div style="padding:16px;text-align:center"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent);width:24px;height:24px;border-width:3px"></div></div>';

  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId));
  if (!items || !items.length) { body.innerHTML = '<div style="padding:16px;color:var(--text-light)">無明細</div>'; return; }

  // Load material_suppliers for all materials in this order (requires migrate-v9.sql)
  const matIds = [...new Set(items.map(i => i.material_id))];
  let matSupMap = {};
  try {
    const { data: matSups } = await withTimeout(sb.from('material_suppliers').select('*').in('material_id', matIds));
    (matSups || []).forEach(s => {
      if (!matSupMap[s.material_id]) matSupMap[s.material_id] = [];
      matSupMap[s.material_id].push({ supplier_id: s.supplier_id, unit_price: s.unit_price, name: supplierName(s.supplier_id), is_default: s.is_default, spec: s.spec || '' });
    });
  } catch(e) { /* table may not exist yet */ }

  // Sort urgent items first
  items.sort((a, b) => (b.is_urgent ? 1 : 0) - (a.is_urgent ? 1 : 0));

  let html = '<div style="padding:16px 0">';
  items.forEach(it => {
    const mat = materialObj(it.material_id);
    const price = it.is_custom_price && it.custom_price != null ? it.custom_price : it.unit_price;
    const urgentStyle = it.is_urgent ? 'color:var(--danger);font-weight:700' : '';
    const itemStatus = it.item_status || it.notes_status || 'pending';
    const ratio = mat ? (mat.unit_ratio || 1) : 1;
    const orderUnit = mat ? (mat.order_unit || mat.unit) : '';
    const dailyUnit = mat ? mat.unit : '';
    const orderQty = Math.round((it.quantity / ratio) * 100) / 100;
    const subtotal = it.quantity * price;
    const sups = matSupMap[it.material_id] || [];
    const curSupId = it.order_supplier_id || (sups.find(s=>s.is_default)?.supplier_id);
    if (sups.length > 0) window._orderItemSupsMap[it.id] = sups;
    const supSelectHtml = itemStatus === 'pending' ? `
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:4px 0">
        ${sups.length > 0 ? `<label style="font-size:.82rem;color:var(--text-light)">廠商:</label>
        <select id="oisup_${it.id}" style="padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:.85rem;background:var(--card);color:var(--text)"
          onchange="onOrderItemSupplierChange(${it.id},${orderId},this.value)">
          <option value="">-- 選廠商 --</option>
          ${sups.map(s=>`<option value="${s.supplier_id}"${s.supplier_id==curSupId?' selected':''}>${escHtml(s.name)}${s.spec?' ['+escHtml(s.spec)+']':''} (${fmtMoney(s.unit_price)})</option>`).join('')}
        </select>` : ''}
        <label style="font-size:.82rem;color:var(--warning);display:flex;align-items:center;gap:4px;cursor:pointer;margin-left:8px">
          <input type="checkbox" id="oiic_${it.id}" onchange="toggleInterClinic(${it.id},${orderId})"> 庫存出貨 <span class="help-tip">!<span class="help-text">從其他診所調貨，單價變$0，出貨時自動扣來源診所庫存。</span></span>
        </label>
      </div>` : '';

    html += `<div class="order-item-row" id="oi_${it.id}">
      <div class="order-item-info" style="flex:1">
        <strong style="${urgentStyle}">${it.is_urgent?'🔴 ':''}${mat ? escHtml(mat.name) : materialName(it.material_id)}</strong>
        <br>
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:6px 0">
          <label style="font-size:.82rem;color:var(--text-light)">數量:</label>
          <input type="number" id="oiq_${it.id}" value="${orderQty}" min="0" step="0.01"
            style="width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.88rem${itemStatus !== 'pending' ? ';opacity:.6' : ''}"
            onchange="onOrderItemQtyChange(${it.id},${orderId},this.value)" ${itemStatus !== 'pending' ? 'disabled' : ''}>
          <span style="font-size:.8rem;color:var(--text-light)">${escHtml(orderUnit)}</span>
        </div>
        ${supSelectHtml}
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:4px 0">
          <label style="font-size:.82rem;color:var(--text-light)">換算:</label>
          <input type="number" id="oir_${it.id}" value="${ratio}" min="0.01" step="0.01"
            style="width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.88rem${itemStatus !== 'pending' ? ';opacity:.6' : ''}"
            onchange="onOrderItemRatioChange(${it.id},${orderId},this.value)" ${itemStatus !== 'pending' ? 'disabled' : ''}>
          <span style="font-size:.8rem;color:var(--text-light)">${escHtml(dailyUnit)}/${escHtml(orderUnit)}</span>
        </div>
        <div style="font-size:.85rem;margin:4px 0" class="order-item-price">單價: ${it.is_custom_price ? '<span class="text-success">優惠</span> ' : ''}${fmtMoney(price)}
        | 小計: <span id="ois_${it.id}">${fmtMoney(subtotal)}</span></div>
        <br>${statusBadge(itemStatus)}
      </div>
      <div class="order-item-actions">
        ${itemStatus === 'pending' ? `
          <button class="btn btn-ghost btn-xs" onclick="editItemPrice(${it.id},${it.unit_price},${it.custom_price || 0},${it.is_custom_price ? 1 : 0})">💰 改價</button>
          <button class="btn btn-success btn-xs" onclick="confirmOrderItem(${it.id},${orderId})">✓ 確認</button>
          <button class="btn btn-danger btn-xs" onclick="cancelOrderItemMgmt(${orderId},${it.id})">✕ 取消</button>
        ` : ''}
        ${itemStatus === 'confirmed' ? `
          <button class="btn btn-primary btn-xs" onclick="setItemStatus(${it.id},${orderId},'shipped')">📦 出貨</button>
          <button class="btn btn-warning btn-xs" onclick="setItemStatus(${it.id},${orderId},'pending')">↩ 回待確認</button>
          <button class="btn btn-danger btn-xs" onclick="cancelOrderItemMgmt(${orderId},${it.id})">✕ 取消</button>
        ` : ''}
        ${itemStatus === 'shipped' ? `
          <button class="btn btn-warning btn-xs" onclick="setItemStatus(${it.id},${orderId},'confirmed')">↩ 回已確認</button>
          <button class="btn btn-danger btn-xs" onclick="cancelOrderItemMgmt(${orderId},${it.id})">✕ 取消</button>
        ` : ''}
        ${itemStatus === 'cancelled' ? `
          <button class="btn btn-ghost btn-xs" onclick="setItemStatus(${it.id},${orderId},'pending')">↩ 恢復</button>
        ` : ''}
      </div>
    </div>`;
  });
  // 底部統一操作按鈕
  const hasPending = items.some(i => (i.item_status || 'pending') === 'pending');
  const hasConfirmed = items.some(i => (i.item_status || 'pending') === 'confirmed');
  if (hasPending || hasConfirmed) {
    html += '<div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)">';
    if (hasPending) html += `<button class="btn btn-success btn-sm" onclick="confirmAllItems(${orderId})">✓ 全部確認</button>`;
    if (hasConfirmed) html += `<button class="btn btn-primary btn-sm" onclick="shipAllItems(${orderId})">📦 全部出貨</button>`;
    html += '</div>';
  }

  html += '</div>';
  body.innerHTML = html;
}

window.confirmAllItems = async function(orderId) {
  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId));
  if (!items) return;
  const pendingItems = items.filter(i => (i.item_status || 'pending') === 'pending');
  if (!pendingItems.length) { toast('沒有待確認品項'); return; }
  try {
    for (const it of pendingItems) {
      const mat = materialObj(it.material_id);
      const ratio = mat ? (mat.unit_ratio || 1) : 1;
      // 讀取 DOM 中管理員可能修改過的數量和換算
      const qtyEl = document.getElementById('oiq_' + it.id);
      const ratioEl = document.getElementById('oir_' + it.id);
      const qtyInOrderUnit = qtyEl ? (parseFloat(qtyEl.value) || 0) : Math.round((it.quantity / ratio) * 100) / 100;
      const finalRatio = ratioEl ? (parseFloat(ratioEl.value) || 1) : ratio;
      const dailyQty = Math.round(qtyInOrderUnit * finalRatio);
      await withTimeout(sb.from('order_items').update({ quantity: dailyQty, item_status: 'confirmed' }).eq('id', it.id));
    }
    await recomputeOrderStatus(orderId);
    toast(`已確認 ${pendingItems.length} 個品項`);
    renderOrderMgmt();
  } catch (e) { toast('全部確認失敗: ' + e.message, 'error'); }
};

window.shipAllItems = async function(orderId) {
  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId));
  if (!items) return;
  const confirmedItems = items.filter(i => (i.item_status || 'pending') === 'confirmed');
  if (!confirmedItems.length) { toast('沒有已確認品項'); return; }
  try {
    for (const it of confirmedItems) {
      await withTimeout(sb.from('order_items').update({ item_status: 'shipped' }).eq('id', it.id));
      await deductInterClinicInventory(it.id, it.material_id, it.quantity);
    }
    console.log(`[shipAllItems] All ${confirmedItems.length} items updated to shipped → calling checkAutoShipOrder(${orderId})`);
    await checkAutoShipOrder(orderId);
    await recomputeOrderStatus(orderId);
    toast(`已出貨 ${confirmedItems.length} 個品項`);
    renderOrderMgmt();
  } catch (e) { toast('全部出貨失敗: ' + e.message, 'error'); }
};

// Supplier selection in order management
// _orderItemSupsMap[itemId] = [{supplier_id, unit_price, name}]
if (!window._orderItemSupsMap) window._orderItemSupsMap = {};
window.onOrderItemSupplierChange = async function(itemId, orderId, supIdStr) {
  const supId = parseInt(supIdStr);
  if (!supId) return;
  try {
    const sups = window._orderItemSupsMap[itemId] || [];
    const sup = sups.find(s => s.supplier_id === supId);
    if (!sup) return;
    await withTimeout(sb.from('order_items').update({ order_supplier_id: supId, unit_price: sup.unit_price, is_custom_price: false }).eq('id', itemId));
    // Update price display — subtotal = dailyQty × unit_price
    const qtyEl = document.getElementById('oiq_' + itemId);
    const ratioEl = document.getElementById('oir_' + itemId);
    const qtyInOrderUnit = parseFloat(qtyEl?.value) || 0;
    const ratio = parseFloat(ratioEl?.value) || 1;
    const dailyQty = Math.round(qtyInOrderUnit * ratio);
    const priceEl = document.querySelector(`#oi_${itemId} .order-item-price`);
    if (priceEl) priceEl.innerHTML = `單價: ${fmtMoney(sup.unit_price)} | 小計: <span id="ois_${itemId}">${fmtMoney(dailyQty * sup.unit_price)}</span>`;
  } catch(e) { toast('更新廠商失敗: ' + e.message, 'error'); }
};

// 庫存出貨：從其他診所出貨，單價變0
window.toggleInterClinic = async function(itemId, orderId) {
  const checked = document.getElementById('oiic_' + itemId)?.checked;
  const srcClinicId = document.getElementById('interClinicSource')?.value;
  if (checked && !srcClinicId) {
    alert('請先在上方選擇「庫存出貨來源診所」');
    document.getElementById('oiic_' + itemId).checked = false;
    return;
  }
  try {
    if (checked) {
      // 設定單價為0，標記為庫存出貨
      await withTimeout(sb.from('order_items').update({ unit_price: 0, is_custom_price: true, custom_price: 0 }).eq('id', itemId));
      const priceEl = document.querySelector(`#oi_${itemId} .order-item-price`);
      if (priceEl) priceEl.innerHTML = `單價: <span style="color:var(--warning)">🏥 庫存出貨 $0</span> | 小計: <span id="ois_${itemId}">$0</span>`;
      // 禁用廠商選擇
      const supSel = document.getElementById('oisup_' + itemId);
      if (supSel) supSel.disabled = true;
      toast('已標記為庫存出貨');
    } else {
      // 恢復
      const supSel = document.getElementById('oisup_' + itemId);
      if (supSel) supSel.disabled = false;
      toast('已取消庫存出貨');
    }
  } catch(e) { toast('操作失敗: ' + e.message, 'error'); }
};

// 出貨時扣除來源診所庫存
async function deductInterClinicInventory(itemId, materialId, quantity) {
  const srcClinicId = document.getElementById('interClinicSource')?.value;
  const isInterClinic = document.getElementById('oiic_' + itemId)?.checked;
  if (!isInterClinic || !srcClinicId) return;
  try {
    // 讀取來源診所庫存
    const { data: inv } = await withTimeout(sb.from('clinic_inventory').select('*').eq('clinic_id', srcClinicId).eq('material_id', materialId).single());
    if (inv) {
      const newStock = Math.max(0, inv.current_stock - quantity);
      await withTimeout(sb.from('clinic_inventory').update({ current_stock: newStock }).eq('id', inv.id));
      // 記錄異動
      await withTimeout(sb.from('inventory_logs').insert({
        clinic_id: parseInt(srcClinicId), material_id: materialId,
        type: 'out', quantity: quantity,
        operator_id: currentUser?.id, operator_name: userProfile?.display_name || '',
        notes: '跨院調貨出庫'
      }));
    }
  } catch(e) { console.error('扣庫存失敗:', e); }
}

// Inline edit: update order_item qty (in order units) → convert to daily units and save
window.onOrderItemQtyChange = async function(itemId, orderId, val) {
  const qtyInOrderUnit = parseFloat(val) || 0;
  const ratioEl = document.getElementById('oir_' + itemId);
  const ratio = parseFloat(ratioEl?.value) || 1;
  const dailyQty = Math.round(qtyInOrderUnit * ratio);
  const { error } = await withTimeout(sb.from('order_items').update({ quantity: dailyQty }).eq('id', itemId));
  if (error) { toast('更新失敗: ' + error.message, 'error'); return; }
  updateOrderItemSubtotal(itemId, dailyQty);
};

window.onOrderItemRatioChange = async function(itemId, orderId, val) {
  const ratio = parseFloat(val) || 1;
  const qtyEl = document.getElementById('oiq_' + itemId);
  const qtyInOrderUnit = parseFloat(qtyEl?.value) || 0;
  const dailyQty = Math.round(qtyInOrderUnit * ratio);
  const { error } = await withTimeout(sb.from('order_items').update({ quantity: dailyQty }).eq('id', itemId));
  if (error) { toast('更新失敗: ' + error.message, 'error'); return; }
  updateOrderItemSubtotal(itemId, dailyQty);
};

function updateOrderItemSubtotal(itemId, dailyQty) {
  const subtotalEl = document.getElementById('ois_' + itemId);
  if (!subtotalEl) return;
  const row = document.getElementById('oi_' + itemId);
  if (!row) return;
  const priceMatch = row.innerHTML.match(/單價:.*?\$([0-9,]+(?:\.\d+)?)/);
  const price = priceMatch ? parseFloat(priceMatch[1].replace(/,/g, '')) : 0;
  subtotalEl.innerHTML = fmtMoney(dailyQty * price);
}

// Confirm button: convert qty to daily units (qty * ratio) and set confirmed
window.confirmOrderItem = async function(itemId, orderId) {
  const qtyEl = document.getElementById('oiq_' + itemId);
  const ratioEl = document.getElementById('oir_' + itemId);
  const qtyInOrderUnit = parseFloat(qtyEl?.value) || 0;
  const ratio = parseFloat(ratioEl?.value) || 1;
  const dailyQty = Math.round(qtyInOrderUnit * ratio);

  const { error } = await withTimeout(sb.from('order_items').update({
    quantity: dailyQty,
    item_status: 'confirmed'
  }).eq('id', itemId));

// 計算整單最慢狀態：pending > confirmed > shipped > delivered
function slowestItemStatus(items) {
  const priority = { pending: 0, confirmed: 1, shipped: 2, delivered: 3 };
  const activeItems = items.filter(i => (i.item_status || 'pending') !== 'cancelled');
  if (!activeItems.length) return 'cancelled';
  let slowest = 'delivered';
  for (const it of activeItems) {
    const s = it.item_status || 'pending';
    if ((priority[s] ?? 0) < (priority[slowest] ?? 3)) slowest = s;
  }
  return slowest;
}

async function recomputeOrderStatus(orderId) {
  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId));
  if (!items) return;
  const newStatus = slowestItemStatus(items);
  const update = { status: newStatus };
  if (newStatus === 'shipped' && !items._shipped_at) update.shipped_at = new Date().toISOString();
  if (newStatus === 'delivered' && !items._delivered_at) update.delivered_at = new Date().toISOString();
  await withTimeout(sb.from('orders').update(update).eq('id', orderId));
}

async function setItemStatus(itemId, orderId, newStatus) {
  console.log(`[setItemStatus] called with itemId=${itemId}, orderId=${orderId}, newStatus=${newStatus}`);
  // Try to update item_status column; fallback to notes
  let { error } = await withTimeout(sb.from('order_items').update({ item_status: newStatus }).eq('id', itemId));
  if (error) {
    console.log(`[setItemStatus] item_status update failed, trying notes fallback. Error:`, error);
    // Fallback: use notes field to store status
    const notesVal = `__status:${newStatus}`;
    ({ error } = await withTimeout(sb.from('order_items').update({ notes: notesVal }).eq('id', itemId)));
    if (error) { toast('更新失敗: ' + error.message, 'error'); return; }
  }

  // Verify the update was persisted
  const { data: verifyItem } = await withTimeout(sb.from('order_items').select('id,item_status,order_id,clinic_id').eq('id', itemId).single());
  console.log(`[setItemStatus] after update, verified item:`, verifyItem);

  toast(`品項狀態已改為 ${statusLabelText(newStatus)}`);

  // 庫存出貨：出貨時從來源診所扣庫存
  if (newStatus === 'shipped') {
    const item = verifyItem;
    if (item) {
      const { data: fullItem } = await withTimeout(sb.from('order_items').select('material_id,quantity').eq('id', itemId).single());
      if (fullItem) await deductInterClinicInventory(itemId, fullItem.material_id, fullItem.quantity);
    }
  }

  // Check if we need to create delivery_confirmations (when item shipped)
  if (newStatus === 'shipped') {
    console.log(`[setItemStatus] Item ${itemId} shipped → directly inserting delivery_confirmation`);
    const clinicId = verifyItem ? verifyItem.clinic_id : null;
    if (clinicId) {
      const { data: existDc } = await withTimeout(sb.from('delivery_confirmations')
        .select('id').eq('order_id', orderId).eq('clinic_id', clinicId));
      if (!existDc || existDc.length === 0) {
        const { error: dcErr } = await withTimeout(sb.from('delivery_confirmations')
          .insert({ order_id: Number(orderId), clinic_id: Number(clinicId), status: 'pending' }));
        if (dcErr) { console.error('DC insert error:', dcErr); toast('建立收貨確認失敗: ' + dcErr.message, 'error'); }
        else { console.log('DC created for order', orderId, 'clinic', clinicId); toast('已建立收貨確認'); }
      } else {
        console.log('DC already exists for order', orderId, 'clinic', clinicId);
      }
    } else {
      console.warn('[setItemStatus] No clinic_id found for item', itemId, ', falling back to checkAutoShipOrder');
      await checkAutoShipOrder(orderId);
    }
  }

  // 重新計算整單狀態（以最慢的 item 為準）
  await recomputeOrderStatus(orderId);

  // Refresh entire order management list so cards move to correct tab
  renderOrderMgmt();
}

function statusLabelText(s) {
  return { pending: '待確認', confirmed: '已確認', shipped: '已出貨', delivered: '已到貨', cancelled: '已取消' }[s] || s;
}

async function checkAutoShipOrder(orderId) {
  console.log(`[checkAutoShipOrder] START orderId=${orderId}`);
  const { data: items, error: itemsErr } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId));
  if (itemsErr) { console.error('[checkAutoShipOrder] fetch items error:', itemsErr); return; }
  if (!items || !items.length) { console.log('[checkAutoShipOrder] no items found, return'); return; }
  console.log(`[checkAutoShipOrder] total items: ${items.length}`, items.map(i => ({ id: i.id, status: i.item_status, clinic_id: i.clinic_id })));

  // Check: any items shipped? → create delivery confirmations for those clinics
  const shippedItems = items.filter(i => (i.item_status || 'pending') === 'shipped');
  console.log(`[checkAutoShipOrder] shippedItems: ${shippedItems.length}`);
  if (shippedItems.length > 0) {
    // Filter out items with null/undefined clinic_id
    const validShipped = shippedItems.filter(i => i.clinic_id != null);
    if (validShipped.length === 0) {
      console.warn('[checkAutoShipOrder] all shipped items have null clinic_id! Cannot create delivery_confirmations.');
      return;
    }
    const clinicIds = [...new Set(validShipped.map(i => Number(i.clinic_id)))];
    console.log(`[checkAutoShipOrder] clinicIds from shipped items:`, clinicIds);
    // Check existing delivery_confirmations
    const { data: existingDcs } = await withTimeout(sb.from('delivery_confirmations').select('clinic_id').eq('order_id', orderId));
    const existingClinicIds = (existingDcs || []).map(d => Number(d.clinic_id));
    console.log(`[checkAutoShipOrder] existing DC clinic_ids:`, existingClinicIds);
    const newClinicIds = clinicIds.filter(c => !existingClinicIds.includes(c));
    console.log(`[checkAutoShipOrder] new clinic_ids to insert:`, newClinicIds);
    if (newClinicIds.length > 0) {
      const insertRows = newClinicIds.map(cid => ({ order_id: Number(orderId), clinic_id: Number(cid), status: 'pending' }));
      console.log(`[checkAutoShipOrder] inserting delivery_confirmations:`, insertRows);
      const { data: insertedData, error: insertErr } = await withTimeout(sb.from('delivery_confirmations').insert(insertRows).select());
      if (insertErr) {
        console.error(`[checkAutoShipOrder] delivery_confirmations insert failed for order ${orderId}:`, insertErr);
        toast('建立待收貨記錄失敗: ' + insertErr.message, 'error');
        return;
      }
      console.log(`[checkAutoShipOrder] insert returned data:`, insertedData);
      // Verify by re-reading
      const { data: verifyDcs, error: verifyErr } = await withTimeout(sb.from('delivery_confirmations').select('*').eq('order_id', orderId));
      if (verifyErr) {
        console.error(`[checkAutoShipOrder] verify select failed:`, verifyErr);
        toast('驗證待收貨記錄失敗: ' + verifyErr.message, 'error');
      } else {
        console.log(`[checkAutoShipOrder] verified delivery_confirmations for order ${orderId}:`, verifyDcs);
      }
    }
    // Update order status to shipped if not already
    await withTimeout(sb.from('orders').update({ status: 'shipped', shipped_at: new Date().toISOString() }).eq('id', orderId));
    console.log(`[checkAutoShipOrder] order ${orderId} status updated to shipped`);
  }
  console.log(`[checkAutoShipOrder] END orderId=${orderId}`);
}

async function checkAutoDeliverOrder(orderId) {
  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId));
  if (!items) return;
  const activeItems = items.filter(i => (i.item_status || 'pending') !== 'cancelled');
  if (activeItems.length === 0) return;
  const allShippedOrDelivered = activeItems.every(i => ['shipped', 'delivered'].includes(i.item_status || 'pending'));
  if (allShippedOrDelivered) {
    await withTimeout(sb.from('orders').update({ status: 'shipped', shipped_at: new Date().toISOString() }).eq('id', orderId));
  }
}

async function renderReceiveContent(tab) {
  const el = document.getElementById('receiveContent');
  const items = tab === 'pending' ? window._receivePending : window._receiveConfirmed;

  if (!items.length) {
    el.innerHTML = `<div class="card"><div class="empty-state"><span>📦</span>${tab === 'pending' ? '目前沒有待收貨項目' : '尚無已收貨紀錄'}</div></div>`;
    return;
  }

  // 預先查詢 order_items 判斷每張 dc 是否全部已出貨
  const dcAllShipped = {};
  if (tab === 'pending') {
    const dcKeys = items.map(d => ({ order_id: d.order_id, clinic_id: d.clinic_id }));
    const orderIds = [...new Set(dcKeys.map(k => k.order_id))];
    if (orderIds.length) {
      const { data: oiRows } = await withTimeout(sb.from('order_items').select('order_id, clinic_id, item_status').in('order_id', orderIds));
      const grouped = {};
      (oiRows || []).forEach(oi => {
        const key = oi.order_id + '_' + oi.clinic_id;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(oi.item_status || 'pending');
      });
      items.forEach(d => {
        const key = d.order_id + '_' + d.clinic_id;
        const statuses = grouped[key] || [];
        dcAllShipped[d.id] = statuses.length > 0 && statuses.every(s => s === 'shipped' || s === 'delivered');
      });
    }
  }

  // 載入催貨紀錄顏色
  const colorRushNotes = (notes) => {
    if (!notes) return '';
    return notes.split('\n').filter(l => l.includes('催貨')).map(l => {
      const text = escHtml(l.trim());
      if (text.includes('[診所催貨]')) return `<span style="color:#e67e22">${text}</span>`;
      if (text.includes('[管理催貨]')) return `<span style="color:var(--danger)">${text}</span>`;
      return text;
    }).join('<br>');
  };

  el.innerHTML = items.map(d => {
    const rushHtml = colorRushNotes(d.notes);
    const canReceiveAll = dcAllShipped[d.id] !== false;
    return `
    <div class="card">
      <div class="card-title" style="justify-content:space-between">
        <span>叫貨單 #${d.order_id} - ${escHtml(clinicName(d.clinic_id))}</span>
        ${statusBadge(d.status)}
      </div>
      <div style="font-size:.85rem;color:var(--text-light);margin-bottom:10px">
        ${d.orders ? '建立: ' + fmtDate(d.orders.created_at) : ''}
        ${d.confirmed_at ? ' | 收貨: ' + fmtDate(d.confirmed_at) : ''}
      </div>
      ${rushHtml ? `<div style="font-size:.78rem;margin-bottom:10px">${rushHtml}</div>` : ''}
      <div id="rcDetail_${d.id}"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${d.status === 'pending' ? `
          ${canReceiveAll
            ? `<button class="btn btn-success btn-sm" onclick="startReceive(${d.id},${d.order_id},${d.clinic_id})">全部收貨</button>`
            : `<button class="btn btn-success btn-sm" disabled style="opacity:0.4;cursor:not-allowed;pointer-events:none" title="有品項尚未出貨">全部收貨（有品項尚未出貨）</button>`}
          <button class="btn btn-warning btn-sm" onclick="rushDelivery(${d.id})">🔔 催貨</button>
          <button class="btn btn-ghost btn-sm" onclick="loadReceiveItems(${d.id},${d.order_id},${d.clinic_id})">展開明細</button>
        ` : ''}
        ${d.status === 'confirmed' ? `
          <button class="btn btn-ghost btn-sm" onclick="undoReceive(${d.id},${d.order_id},${d.clinic_id})">↩ 整單回待收貨</button>
          <button class="btn btn-ghost btn-sm" onclick="loadConfirmedReceiveItems(${d.id},${d.order_id},${d.clinic_id})">展開明細</button>
        ` : ''}
      </div>
    </div>`;
  }).join('');

  // 恢復展開的明細
  const expandSet = tab === 'pending' ? window._expandedReceive : window._expandedConfirmedReceive;
  for (const d of items) {
    if (expandSet.has(d.id)) {
      if (tab === 'pending') loadReceiveItems(d.id, d.order_id, d.clinic_id);
      else loadConfirmedReceiveItems(d.id, d.order_id, d.clinic_id);
    }
  }
}

async function undoReceiveSingle(itemId, dcId, orderId, clinicId) {
  if (!await showConfirm('回待收貨', '確定要將此品項回到待收貨狀態？庫存將回扣。')) return;
  try {
    const { data: it } = await withTimeout(sb.from('order_items').select('*').eq('id', itemId).single());
    if (!it) { toast('找不到品項', 'error'); return; }

    // 1. item_status 改回 shipped
    await withTimeout(sb.from('order_items').update({ item_status: 'shipped' }).eq('id', itemId));

    // 2. clinic_inventory 扣回庫存
    const { data: inv } = await withTimeout(sb.from('clinic_inventory')
      .select('*').eq('clinic_id', clinicId).eq('material_id', it.material_id).single());
    if (inv) {
      await withTimeout(sb.from('clinic_inventory').update({ current_stock: Math.max(0, inv.current_stock - it.quantity) }).eq('id', inv.id));
    }

    // 3. 刪除最近一筆該品項的 receive log
    const { data: logs } = await withTimeout(sb.from('inventory_logs')
      .select('id').eq('clinic_id', clinicId).eq('material_id', it.material_id).eq('type', 'receive')
      .order('created_at', { ascending: false }).limit(1));
    if (logs && logs.length > 0) {
      await withTimeout(sb.from('inventory_logs').delete().eq('id', logs[0].id));
    }

    // 4. 重新計算 dc 狀態：檢查是否還有 delivered 品項
    const { data: allItems } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId).eq('clinic_id', clinicId));
    const anyDelivered = (allItems || []).some(i => i.id !== itemId && (i.item_status || 'pending') === 'delivered');
    if (!anyDelivered) {
      // 沒有任何 delivered 品項了，dc 回 pending
      await withTimeout(sb.from('delivery_confirmations').update({
        status: 'pending', confirmed_by: null, confirmed_at: null
      }).eq('id', dcId));
    }

    // 5. 重新計算 order 狀態
    await recomputeOrderStatus(orderId);

    toast('已將品項回到待收貨');
    renderReceiving();
  } catch (e) {
    toast('操作失敗: ' + e.message, 'error');
  }
}

async function doReceiveSingle(itemId, dcId, orderId, clinicId) {
  try {
    const { data: it } = await withTimeout(sb.from('order_items').select('*').eq('id', itemId).single());
    if (!it) { toast('找不到品項', 'error'); return; }

    // 更新庫存
    const { data: inv } = await withTimeout(sb.from('clinic_inventory')
      .select('*').eq('clinic_id', clinicId).eq('material_id', it.material_id).single());
    if (inv) {
      await withTimeout(sb.from('clinic_inventory').update({ current_stock: inv.current_stock + it.quantity }).eq('id', inv.id));
    } else {
      await withTimeout(sb.from('clinic_inventory').insert({ clinic_id: clinicId, material_id: it.material_id, current_stock: it.quantity, safety_stock: 5 }));
    }

    // 新增 inventory_log
    await withTimeout(sb.from('inventory_logs').insert({
      clinic_id: clinicId, material_id: it.material_id, type: 'receive', quantity: it.quantity,
      operator_id: currentUser.id, operator_name: userProfile.display_name, notes: '叫貨單#' + orderId + ' (個別收貨)'
    }));

    // 更新 item_status
    await withTimeout(sb.from('order_items').update({ item_status: 'delivered' }).eq('id', itemId));

    // 檢查是否所有品項都已 delivered，若是則自動確認 dc
    const { data: allItems } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId).eq('clinic_id', clinicId));
    const allDelivered = (allItems || []).every(i => i.id === itemId || (i.item_status || 'pending') === 'delivered');
    if (allDelivered) {
      await withTimeout(sb.from('delivery_confirmations').update({
        status: 'confirmed', confirmed_by: currentUser.id, confirmed_at: new Date().toISOString()
      }).eq('id', dcId));
    }

    await recomputeOrderStatus(orderId);

    toast(allDelivered ? '收貨完成，整單已確認' : '已收貨此品項');
    closeModal();
    renderReceiving();
  } catch (e) {
    toast('收貨失敗: ' + e.message, 'error');
  }
}

async function rushDelivery(dcId) {
  const now = new Date().toISOString();
  const { data: dc } = await withTimeout(sb.from('delivery_confirmations').select('notes,rush_notified,clinic_id').eq('id', dcId).single());
  const newNotes = (dc?.notes || '') + `\n[診所催貨] ${fmtDate(now)} by ${userProfile.display_name}`;
  const updateObj = { notes: newNotes.trim() };
  if (!dc?.rush_notified) updateObj.rush_notified = true;
  const { error } = await withTimeout(sb.from('delivery_confirmations').update(updateObj).eq('id', dcId));
  if (error) { toast('催貨記錄失敗: ' + error.message, 'error'); return; }
  toast('已記錄催貨');
  if (!dc?.rush_notified) {
    const nc = await loadNotifyConfig();
    if (nc.rush_order?.enabled !== false) {
      notifyRushOrder(`🚨 催貨通知\n診所：${clinicName(dc?.clinic_id)}\n催貨人：${userProfile.display_name}\n時間：${fmtDate(now)}`);
    }
  }
}

  toast(`已催貨：${mat}`);

async function startReceive(dcId, orderId, clinicId) {
  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId).eq('clinic_id', clinicId));
  if (!items || !items.length) { toast('無明細', 'error'); return; }

  // 只顯示已出貨的品項
  const shippedItems = items.filter(i => (i.item_status || 'pending') === 'shipped');
  const nonShipped = items.filter(i => !['shipped','delivered'].includes(i.item_status || 'pending'));

  if (!shippedItems.length) { toast('沒有已出貨的品項可收貨', 'error'); return; }
  if (nonShipped.length > 0) { toast('有品項尚未出貨，請使用個別收貨', 'error'); return; }

  let body = '<p style="margin-bottom:12px"><strong>確認收貨明細：</strong></p>';
  body += '<table style="width:100%"><thead><tr><th>品項</th><th>數量</th></tr></thead><tbody>';
  shippedItems.forEach(it => {
    body += `<tr><td>${materialName(it.material_id)}</td><td>+${it.quantity}</td></tr>`;
  });
  body += '</tbody></table>';
  body += '<p style="margin-top:12px;color:var(--danger);font-size:.85rem">收貨後庫存將自動增加</p>';

  openModal('確認收貨 #' + orderId, body,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-success" onclick="doReceive(${dcId},${orderId},${clinicId})">✓ 確認收貨</button>`);
  window._receiveItems = shippedItems;
}

async function doReceive(dcId, orderId, clinicId) {
  const items = window._receiveItems;
  try {
    for (const it of items) {
      const { data: inv } = await withTimeout(sb.from('clinic_inventory')
        .select('*').eq('clinic_id', clinicId).eq('material_id', it.material_id).single());
      if (inv) {
        await withTimeout(sb.from('clinic_inventory').update({ current_stock: inv.current_stock + it.quantity }).eq('id', inv.id));
      } else {
        await withTimeout(sb.from('clinic_inventory').insert({ clinic_id: clinicId, material_id: it.material_id, current_stock: it.quantity, safety_stock: 5 }));
      }
      await withTimeout(sb.from('inventory_logs').insert({
        clinic_id: clinicId, material_id: it.material_id, type: 'receive', quantity: it.quantity,
        operator_id: currentUser.id, operator_name: userProfile.display_name, notes: '叫貨單#' + orderId
      }));
      // Update item status to delivered
      await withTimeout(sb.from('order_items').update({ item_status: 'delivered' }).eq('id', it.id));
    }

    await withTimeout(sb.from('delivery_confirmations').update({
      status: 'confirmed', confirmed_by: currentUser.id, confirmed_at: new Date().toISOString()
    }).eq('id', dcId));

    // 重新計算整單狀態
    await recomputeOrderStatus(orderId);

    toast('收貨完成，庫存已更新');
    closeModal();
    renderReceiving();
  } catch (e) {
    toast('收貨失敗: ' + e.message, 'error');
  }
}

async function undoReceive(dcId, orderId, clinicId) {
  if (!await showConfirm('反悔收貨', '確定要反悔收貨？庫存將回扣。')) return;

  const { data: items } = await withTimeout(sb.from('order_items').select('*').eq('order_id', orderId).eq('clinic_id', clinicId));
  try {
    for (const it of (items || [])) {
      if ((it.item_status || 'pending') === 'delivered') {
        const { data: inv } = await withTimeout(sb.from('clinic_inventory')
          .select('*').eq('clinic_id', clinicId).eq('material_id', it.material_id).single());
        if (inv) {
          await withTimeout(sb.from('clinic_inventory').update({ current_stock: Math.max(0, inv.current_stock - it.quantity) }).eq('id', inv.id));
        }
        await withTimeout(sb.from('inventory_logs').insert({
          clinic_id: clinicId, material_id: it.material_id, type: 'out', quantity: it.quantity,
          operator_id: currentUser.id, operator_name: userProfile.display_name, notes: '反悔收貨#' + orderId
        }));
        await withTimeout(sb.from('order_items').update({ item_status: 'shipped' }).eq('id', it.id));
      }
    }

    await withTimeout(sb.from('delivery_confirmations').update({
      status: 'pending', confirmed_by: null, confirmed_at: null
    }).eq('id', dcId));

    // 重新計算整單狀態
    await recomputeOrderStatus(orderId);

    toast('已反悔收貨，庫存已回扣');
    renderReceiving();
  } catch (e) {
    toast('失敗: ' + e.message, 'error');
  }
}

window.moveClinic = function(id, direction) {
  const idx = allClinics.findIndex(c => c.id === id);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= allClinics.length) return;
  const [item] = allClinics.splice(idx, 1);
  allClinics.splice(newIdx, 0, item);
  clinicSortChanged = true;
  rerenderClinicBody();
  const bar = document.getElementById('clinicSortBar');
  if (bar) bar.style.display = 'flex';
};

async function saveClinicSort() {
  for (let i = 0; i < allClinics.length; i++) {
    const { error } = await withTimeout(sb.from('clinics').update({ sort_order: i }).eq('id', allClinics[i].id));
    if (error) { toast('排序儲存失敗: ' + error.message, 'error'); return; }
    allClinics[i].sort_order = i;
  }
  clinicSortChanged = false;
  const bar = document.getElementById('clinicSortBar');
  if (bar) bar.style.display = 'none';
  toast('診所排序已儲存');
}

function rerenderClinicBody() {
  const tbody = document.getElementById('clinicSortBody');
  if (!tbody) return;
  tbody.innerHTML = allClinics.map((c, i) => `<tr>
    <td>
      <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.8rem" onclick="moveClinic(${c.id},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
      <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.8rem" onclick="moveClinic(${c.id},1)" ${i === allClinics.length - 1 ? 'disabled' : ''}>▼</button>
    </td>
    <td>${escHtml(c.name)}</td><td>${escHtml(c.address || '-')}</td><td>${escHtml(c.phone || '-')}</td><td>${escHtml(c.notes || '-')}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="editClinic(${c.id})">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="deleteClinic(${c.id})">刪除</button>
    </td>
  </tr>`).join('');
}

async function cancelClinicSort() {
  const ordered = [];
  for (const id of clinicOrigOrder) {
    const c = allClinics.find(x => x.id === id);
    if (c) ordered.push(c);
  }
  allClinics = ordered;
  clinicSortChanged = false;
  rerenderClinicBody();
  const bar = document.getElementById('clinicSortBar');
  if (bar) bar.style.display = 'none';
}

// Material drag-to-reorder (within same category)
function matDragStart(e, id) {
  dragMatId = id;
  e.target.closest('tr').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function matDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tr = e.target.closest('tr.cat-drag-item');
  if (tr) {
    document.querySelectorAll('tr.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
    tr.classList.add('cat-drag-over');
  }
}
function matDragLeave(e) {
  const tr = e.target.closest('tr.cat-drag-item');
  if (tr) tr.classList.remove('cat-drag-over');
}
function matDragEnd(e) {
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
}
function matDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
  if (dragMatId === targetId) return;
  const fromIdx = allMaterials.findIndex(m => m.id === dragMatId);
  const toIdx = allMaterials.findIndex(m => m.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  // Only allow reorder within same category
  if ((allMaterials[fromIdx].category_id || 0) !== (allMaterials[toIdx].category_id || 0)) return;
  const [moved] = allMaterials.splice(fromIdx, 1);
  allMaterials.splice(toIdx, 0, moved);
  matSortChanged = true;
  renderAdminMatContent();
  const bar = document.getElementById('matSortBar');
  if (bar) bar.style.display = 'flex';
  dragMatId = null;
}

window.moveMatInCat = function(id, direction) {
  const idx = allMaterials.findIndex(m => m.id === id);
  if (idx < 0) return;
  const catId = allMaterials[idx].category_id || 0;
  // Find prev/next in same category
  let targetIdx = -1;
  if (direction === -1) {
    for (let i = idx - 1; i >= 0; i--) {
      if ((allMaterials[i].category_id || 0) === catId) { targetIdx = i; break; }
    }
  } else {
    for (let i = idx + 1; i < allMaterials.length; i++) {
      if ((allMaterials[i].category_id || 0) === catId) { targetIdx = i; break; }
    }
  }
  if (targetIdx < 0) return;
  const [item] = allMaterials.splice(idx, 1);
  allMaterials.splice(targetIdx, 0, item);
  matSortChanged = true;
  renderAdminMatContent();
  const bar = document.getElementById('matSortBar');
  if (bar) bar.style.display = 'flex';
};

async function saveMatSort() {
  // Save sort_order per category group
  let order = 0;
  let lastCat = null;
  for (const m of allMaterials) {
    const cid = m.category_id || 0;
    if (cid !== lastCat) { order = 0; lastCat = cid; }
    const { error } = await withTimeout(sb.from('materials').update({ sort_order: order }).eq('id', m.id));
    if (error) { toast('排序儲存失敗: ' + error.message, 'error'); return; }
    m.sort_order = order;
    order++;
  }
  matSortChanged = false;
  const bar = document.getElementById('matSortBar');
  if (bar) bar.style.display = 'none';
  toast('品項排序已儲存');
}

}

let _matImg = null, _matImgOx = 0, _matImgOy = 0, _matImgScale = 1, _matImgRot = 0, _matImgDrag = null;

function previewMatImage(input) {
  if (!input.files || !input.files[0]) return;
  _matImg = new Image();
  _matImg.onload = () => {
    _matImgOx = 0; _matImgOy = 0; _matImgRot = 0;
    _matImgScale = Math.max(300 / _matImg.width, 300 / _matImg.height);
    openMatImgEditor();
  };
  _matImg.src = URL.createObjectURL(input.files[0]);
}

function openMatImgEditor() {
  const overlay = document.createElement('div');
  overlay.id = 'matImgEditorOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10001;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
  overlay.innerHTML = `
    <div style="color:#e2e8f0;font-size:.9rem">拖曳移動・滾輪縮放・滑桿旋轉</div>
    <div style="width:300px;height:300px;overflow:hidden;border:3px solid var(--accent,#63b3ed);border-radius:10px;cursor:grab;position:relative" id="matImgFrame">
      <canvas id="matImgCanvas" width="300" height="300" style="display:block"></canvas>
    </div>
    <div style="display:flex;gap:10px;align-items:center;color:#a0aec0;font-size:.82rem">
      <label>旋轉</label>
      <input type="range" id="matImgRotSlider" value="0" min="-180" max="180" style="width:120px" oninput="_matImgRot=parseInt(this.value);drawMatImgCanvas()">
      <span id="matImgRotVal">0°</span>
      <label style="margin-left:8px">縮放</label>
      <input type="range" id="matImgScaleSlider" value="100" min="20" max="400" style="width:120px" oninput="_matImgScale=parseInt(this.value)/100*Math.max(300/_matImg.width,300/_matImg.height);drawMatImgCanvas()">
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeMatImgEditor()">取消</button>
      <button class="btn btn-primary" onclick="saveMatImgFromEditor()">✅ 確認</button>
    </div>`;
  document.body.appendChild(overlay);

  const frame = document.getElementById('matImgFrame');
  frame.onpointerdown = e => { _matImgDrag = { sx: e.clientX, sy: e.clientY, ox: _matImgOx, oy: _matImgOy }; frame.setPointerCapture(e.pointerId); };
  frame.onpointermove = e => { if (!_matImgDrag) return; _matImgOx = _matImgDrag.ox + (e.clientX - _matImgDrag.sx); _matImgOy = _matImgDrag.oy + (e.clientY - _matImgDrag.sy); drawMatImgCanvas(); };
  frame.onpointerup = () => { _matImgDrag = null; };
  frame.onwheel = e => { e.preventDefault(); const d = e.deltaY > 0 ? -0.05 : 0.05; _matImgScale = Math.max(0.1, _matImgScale + d * _matImgScale); const sl = document.getElementById('matImgScaleSlider'); if (sl) sl.value = Math.round(_matImgScale / Math.max(300/_matImg.width, 300/_matImg.height) * 100); drawMatImgCanvas(); };
  drawMatImgCanvas();
}

function drawMatImgCanvas() {
  const canvas = document.getElementById('matImgCanvas');
  if (!canvas || !_matImg) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 300, 300);
  ctx.fillStyle = '#222'; ctx.fillRect(0, 0, 300, 300);
  ctx.save();
  ctx.translate(150 + _matImgOx, 150 + _matImgOy);
  ctx.rotate(_matImgRot * Math.PI / 180);
  ctx.scale(_matImgScale, _matImgScale);
  ctx.drawImage(_matImg, -_matImg.width / 2, -_matImg.height / 2);
  ctx.restore();
  const rv = document.getElementById('matImgRotVal');
  if (rv) rv.textContent = _matImgRot + '°';
}

function closeMatImgEditor() {
  const ol = document.getElementById('matImgEditorOverlay');
  if (ol) ol.remove();
  if (_matImg?.src?.startsWith('blob:')) URL.revokeObjectURL(_matImg.src);
}

function saveMatImgFromEditor() {
  const canvas = document.getElementById('matImgCanvas');
  if (!canvas) return;
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  const prev = document.getElementById('matImgPreview');
  if (prev) { prev.src = dataUrl; prev.style.display = 'block'; }
  document.getElementById('fMatImageUrl').value = dataUrl;
  closeMatImgEditor();
  toast('照片已調整');
}

async function compressImage(file, maxWidth = 500, quality = 0.5) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => {
        resolve(new File([blob], file.name.replace(/\.\w+$/, ".jpg"), { type: "image/jpeg" }));
      }, "image/jpeg", quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function saveMaterial(id) {
  const btn = document.getElementById('btnSaveMat');
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    let imageUrl = document.getElementById('fMatImageUrl').value;
    if (imageUrl === '__DELETE__') imageUrl = '';
    // If editor produced a data URL, use it directly (or try upload)
    if (imageUrl && imageUrl.startsWith('data:')) {
      // Try to upload data URL to storage
      try {
        const resp = await fetch(imageUrl);
        const blob = await resp.blob();
        const path = `${Date.now()}.jpg`;
        const { error: upErr } = await withTimeout(sb.storage.from('materials').upload(path, blob, { contentType: 'image/jpeg' }));
        if (!upErr) {
          const { data: urlData } = sb.storage.from('materials').getPublicUrl(path);
          imageUrl = urlData.publicUrl;
        }
        // If upload fails, keep data URL as fallback
      } catch(e) { /* keep data URL */ }
    } else {
      const fileInput = document.getElementById('fMatImage');
      if (fileInput.files && fileInput.files[0]) {
        const compressed = await compressImage(fileInput.files[0]);
        const path = `${Date.now()}.jpg`;
        const { error: upErr } = await withTimeout(sb.storage.from('materials').upload(path, compressed));
        if (upErr) { toast('圖片上傳失敗: ' + upErr.message, 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
        const { data: urlData } = sb.storage.from('materials').getPublicUrl(path);
        imageUrl = urlData.publicUrl;
      }
    }
    // Collect multi-supplier rows
    const supRows = document.querySelectorAll('#matSupRows .mat-sup-row');
    const newSuppliers = [];
    supRows.forEach(row => {
      const idx = row.id.replace('msRow_', '');
      const supId = parseInt(document.getElementById('msId_'+idx)?.value);
      const price = parseFloat(document.getElementById('msPrice_'+idx)?.value) || 0;
      const isDef = document.getElementById('msDef_'+idx)?.checked || false;
      const spec = document.getElementById('msSpec_'+idx)?.value.trim() || '';
      const orderUnit = document.getElementById('msOUnit_'+idx)?.value.trim() || '';
      const unitRatio = parseFloat(document.getElementById('msRatio_'+idx)?.value) || 1;
      if (supId) newSuppliers.push({ supplier_id: supId, unit_price: price, is_default: isDef, spec, order_unit: orderUnit, unit_ratio: unitRatio });
    });
    // Use default/first supplier for materials legacy fields
    const defSup = newSuppliers.find(s => s.is_default) || newSuppliers[0];

    const obj = {
      name: document.getElementById('fMatName').value.trim(),
      category_id: document.getElementById('fMatCat').value || null,
      supplier_id: defSup?.supplier_id || null,
      spec: defSup?.spec || '',
      unit: document.getElementById('fMatUnit').value.trim() || '個',
      order_unit: defSup?.order_unit || '',
      unit_ratio: defSup?.unit_ratio || 1,
      unit_price: defSup?.unit_price || 0,
      image_url: imageUrl,
      notes: document.getElementById('fMatNotes').value.trim()
    };
    if (!obj.name) { toast('請輸入名稱', 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
    let err, savedId = id;
    if (id) { ({ error: err } = await withTimeout(sb.from('materials').update(obj).eq('id', id))); }
    else {
      const { data: ins, error: insErr } = await withTimeout(sb.from('materials').insert({ ...obj, created_by: currentUser?.id }).select('id').single());
      err = insErr; if (ins) savedId = ins.id;
    }
    if (err) { toast('儲存失敗: ' + err.message, 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
    // Save material_suppliers (delete then insert)
    if (savedId) {
      await sb.from('material_suppliers').delete().eq('material_id', savedId);
      if (newSuppliers.length > 0) {
        const { error: supErr } = await withTimeout(sb.from('material_suppliers').insert(newSuppliers.map(s => ({ ...s, material_id: savedId }))));
        if (supErr) { toast('品項已儲存，但廠商儲存失敗：' + supErr.message + '（請先執行 migrate-v9.sql）', 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
      }
    }
    toast('已儲存'); closeModal(); await loadMaterials(); renderAdminContent();
  } catch (e) { toast('錯誤: ' + e.message, 'error'); btn.disabled = false; btn.textContent = '儲存'; }
}

}
