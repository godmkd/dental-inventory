// --- Materials CRUD ---
async function renderAdminMaterials(el) {
  await loadMaterials();
  el.innerHTML = `
    <div class="toolbar">
      <input class="search-box" placeholder="搜尋品項..." oninput="filterAdminMats(this.value)">
      <button class="btn btn-primary" onclick="editMaterial()">＋ 新增品項</button>
    </div>
    <div class="filter-chips" id="adminMatChips">
      <span class="chip active" onclick="adminMatFilter(0,this)">全部</span>
      ${allCategories.map(c => `<span class="chip" onclick="adminMatFilter(${c.id},this)">${escHtml(c.name)}</span>`).join('')}
    </div>
    <div class="card"><div class="table-wrap"><table id="adminMatTable">
      <thead><tr><th>圖片</th><th>名稱</th><th>類別</th><th>規格</th><th>單位</th><th>廠商</th>${canSeePrice() ? '<th>單價</th>' : ''}<th>操作</th></tr></thead>
      <tbody>${allMaterials.map(m => `<tr data-name="${m.name.toLowerCase()}" data-cat="${m.category_id || 0}">
        <td>${m.image_url ? `<img class="img-thumb" src="${m.image_url}" onclick="window.open('${m.image_url}')">` : '-'}</td>
        <td><strong>${escHtml(m.name)}</strong></td><td>${categoryName(m.category_id)}</td>
        <td>${escHtml(m.spec || '-')}</td><td>${escHtml(m.unit)}</td><td>${supplierName(m.supplier_id)}</td>
        ${canSeePrice() ? `<td>${fmtMoney(m.unit_price)}</td>` : ''}
        <td>
          <button class="btn btn-ghost btn-sm" onclick="editMaterial(${m.id})">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMaterial(${m.id})">刪除</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
  window._adminMatCatFilter = 0;
}

window.filterAdminMats = function(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#adminMatTable tbody tr').forEach(tr => {
    const name = tr.dataset.name || '';
    const catMatch = !window._adminMatCatFilter || parseInt(tr.dataset.cat) === window._adminMatCatFilter;
    tr.style.display = name.includes(q) && catMatch ? '' : 'none';
  });
};

window.adminMatFilter = function(catId, chipEl) {
  window._adminMatCatFilter = catId;
  document.querySelectorAll('#adminMatChips .chip').forEach(c => c.classList.remove('active'));
  if (chipEl) chipEl.classList.add('active');
  filterAdminMats(document.querySelector('#adminContent .search-box')?.value || '');
};

function editMaterial(id) {
  const m = id ? allMaterials.find(x => x.id === id) : {};
  openModal(id ? '編輯品項' : '新增品項', `
    <div class="form-group"><label>名稱 *</label><input id="fMatName" value="${escHtml(m.name || '')}"></div>
    <div class="form-row">
      <div class="form-group"><label>類別</label><select id="fMatCat">${optionsHTML(allCategories, 'id', 'name', m.category_id)}</select></div>
      <div class="form-group"><label>廠商</label><select id="fMatSup">${optionsHTML(allSuppliers, 'id', 'name', m.supplier_id)}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>規格</label><input id="fMatSpec" value="${escHtml(m.spec || '')}"></div>
      <div class="form-group"><label>日常單位</label><input id="fMatUnit" value="${escHtml(m.unit || '個')}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>叫貨單位</label><input id="fMatOrderUnit" value="${escHtml(m.order_unit || '')}" placeholder="如：箱、盒"></div>
      <div class="form-group"><label>換算比例</label><input id="fMatUnitRatio" type="number" step="0.01" min="0.01" value="${m.unit_ratio || 1}" title="1 叫貨單位 = ? 日常單位"></div>
    </div>
    <div style="font-size:.82rem;color:var(--text-light);margin:-8px 0 12px 0">1 [叫貨單位] = [換算比例] [日常單位]</div>
    <div class="form-group"><label>單價</label><input id="fMatPrice" type="number" step="0.01" value="${m.unit_price || 0}"></div>
    <div class="form-group"><label>圖片</label>
      <input id="fMatImage" type="file" accept="image/*" onchange="previewMatImage(this)">
      ${m.image_url ? `<img class="img-upload-preview" id="matImgPreview" src="${m.image_url}">` : '<img class="img-upload-preview" id="matImgPreview" style="display:none">'}
      <input type="hidden" id="fMatImageUrl" value="${m.image_url || ''}">
    </div>
    <div class="form-group"><label>備註</label><textarea id="fMatNotes">${escHtml(m.notes || '')}</textarea></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" id="btnSaveMat" onclick="saveMaterial(${id || 'null'})">儲存</button>`);
}

function previewMatImage(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('matImgPreview');
      prev.src = e.target.result; prev.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}

async function saveMaterial(id) {
  const btn = document.getElementById('btnSaveMat');
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    let imageUrl = document.getElementById('fMatImageUrl').value;
    const fileInput = document.getElementById('fMatImage');
    if (fileInput.files && fileInput.files[0]) {
      const file = fileInput.files[0];
      const ext = file.name.split('.').pop();
      const path = `materials/${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from('material-images').upload(path, file);
      if (upErr) { toast('圖片上傳失敗: ' + upErr.message, 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
      const { data: urlData } = sb.storage.from('material-images').getPublicUrl(path);
      imageUrl = urlData.publicUrl;
    }
    const obj = {
      name: document.getElementById('fMatName').value.trim(),
      category_id: document.getElementById('fMatCat').value || null,
      supplier_id: document.getElementById('fMatSup').value || null,
      spec: document.getElementById('fMatSpec').value.trim(),
      unit: document.getElementById('fMatUnit').value.trim() || '個',
      order_unit: document.getElementById('fMatOrderUnit').value.trim(),
      unit_ratio: parseFloat(document.getElementById('fMatUnitRatio').value) || 1,
      unit_price: parseFloat(document.getElementById('fMatPrice').value) || 0,
      image_url: imageUrl,
      notes: document.getElementById('fMatNotes').value.trim()
    };
    if (!obj.name) { toast('請輸入名稱', 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
    let err;
    if (id) { ({ error: err } = await sb.from('materials').update(obj).eq('id', id)); }
    else { ({ error: err } = await sb.from('materials').insert(obj)); }
    if (err) { toast('儲存失敗: ' + err.message, 'error'); btn.disabled = false; btn.textContent = '儲存'; return; }
    toast('已儲存'); closeModal(); await loadMaterials(); renderAdminContent();
  } catch (e) { toast('錯誤: ' + e.message, 'error'); btn.disabled = false; btn.textContent = '儲存'; }
}

async function deleteMaterial(id) {
  if (!await showConfirm('刪除品項', '確定刪除此品項？')) return;
  const { error } = await sb.from('materials').delete().eq('id', id);
  if (error) { toast('刪除失敗: ' + error.message, 'error'); return; }
  toast('已刪除'); await loadMaterials(); renderAdminContent();
}

// --- Roles CRUD ---
async function renderAdminRoles(el) {
  await loadRoles();
  const visibleRoles = allRoles.filter(r => !r.is_system || isSystemAdmin());
  el.innerHTML = `
    <div class="toolbar"><button class="btn btn-primary" onclick="editRole()">＋ 新增角色</button></div>
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>名稱</th><th>權限</th><th>系統角色</th><th>操作</th></tr></thead>
      <tbody>${visibleRoles.map(r => {
        const perms = (typeof r.permissions === 'string' ? JSON.parse(r.permissions || '[]') : r.permissions) || [];
        let permLabels;
        if (Array.isArray(perms)) {
          permLabels = perms.map(p => { const f = ALL_PERMISSIONS.find(ap => ap.key === p); return f ? f.label : p; }).join('、');
        } else if (typeof perms === 'object' && perms !== null) {
          if (perms.all) permLabels = '全部權限';
          else permLabels = Object.keys(perms).filter(k => perms[k]).map(p => { const f = ALL_PERMISSIONS.find(ap => ap.key === p); return f ? f.label : p; }).join('、');
        } else permLabels = '';
        return `<tr>
          <td><strong>${escHtml(r.display_name)}</strong></td>
          <td style="font-size:.82rem;max-width:300px">${permLabels || '<span class="text-muted">無</span>'}</td>
          <td>${r.is_system ? '✓' : ''}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="editRole(${r.id})">編輯</button>
            ${r.is_system ? '' : `<button class="btn btn-danger btn-sm" onclick="deleteRole(${r.id})">刪除</button>`}
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;
}

function editRole(id) {
  const r = id ? allRoles.find(x => x.id === id) : {};
  const currentPerms = r.permissions ? (typeof r.permissions === 'string' ? JSON.parse(r.permissions) : r.permissions) : [];
  const permCheckboxes = ALL_PERMISSIONS.map(p => {
    let checked = false;
    if (Array.isArray(currentPerms)) checked = currentPerms.includes(p.key);
    else if (typeof currentPerms === 'object' && currentPerms !== null) checked = currentPerms[p.key] === true || currentPerms.all === true;
    return `<label style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:.9rem">
      <input type="checkbox" class="role-perm-cb" value="${p.key}" ${checked ? 'checked' : ''}>
      ${escHtml(p.label)}
    </label>`;
  }).join('');
  openModal(id ? '編輯角色' : '新增角色', `
    <div class="form-group"><label>顯示名稱 *</label><input id="fRoleName" value="${escHtml(r.display_name || '')}"></div>
    <div class="form-group"><label>權限</label><div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px">${permCheckboxes}</div></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="saveRole(${id || 'null'})">儲存</button>`);
}

async function saveRole(id) {
  const displayName = document.getElementById('fRoleName').value.trim();
  if (!displayName) { toast('請輸入名稱', 'error'); return; }
  const perms = Array.from(document.querySelectorAll('.role-perm-cb:checked')).map(cb => cb.value);
  const obj = { display_name: displayName, permissions: perms };
  let err;
  if (id) {
    ({ error: err } = await sb.from('roles').update(obj).eq('id', id));
  } else {
    obj.is_system = false;
    ({ error: err } = await sb.from('roles').insert(obj));
  }
  if (err) { toast('儲存失敗: ' + err.message, 'error'); return; }
  toast('已儲存'); closeModal(); await loadRoles(); renderUserMgmt();
}

async function deleteRole(id) {
  const role = allRoles.find(r => r.id === id);
  if (role && role.is_system) { toast('系統角色不可刪除', 'error'); return; }
  if (!await showConfirm('刪除角色', '確定要刪除此角色？使用此角色的人員將失去角色設定。')) return;
  const { error } = await sb.from('roles').delete().eq('id', id);
  if (error) { toast('刪除失敗: ' + error.message, 'error'); return; }
  toast('已刪除'); await loadRoles(); renderUserMgmt();
}

// 7. 人員管理 (owner only)

window.usersSubTab = 'users';

async function renderUserMgmt() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `
    <div class="page-title">👥 人員管理</div>
    <div class="sub-tabs" id="usersSubTabs">
      <div class="sub-tab ${window.usersSubTab === 'users' ? 'active' : ''}" onclick="window.usersSubTab='users';renderUserMgmt()">👤 人員</div>
      ${hasPermission('manage_roles') ? `<div class="sub-tab ${window.usersSubTab === 'roles' ? 'active' : ''}" onclick="window.usersSubTab='roles';renderUserMgmt()">🔐 角色</div>` : ''}
    </div>
    <div id="usersContent"></div>`;

  const el = document.getElementById('usersContent');
  if (window.usersSubTab === 'roles' && hasPermission('manage_roles')) {
    await renderAdminRoles(el);
  } else {
    await renderUsersList(el);
  }
}

async function renderUsersList(el) {
  await loadUsers();
  el.innerHTML = `
    <div class="card"><div class="table-wrap"><table>
      <thead><tr><th>姓名</th><th>角色</th><th>所屬診所</th><th>狀態</th><th>操作</th></tr></thead>
      <tbody>${allUsers.map(u => `<tr>
        <td>${escHtml(u.display_name)}</td>
        <td>${roleLabel(u.role, u.role_id)}</td>
        <td>${u.clinic_id ? escHtml(clinicName(u.clinic_id)) : '<span class="text-muted">未指派</span>'}</td>
        <td>${u.is_active ? '<span class="text-success">啟用</span>' : '<span class="text-danger">停用</span>'}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">編輯</button>
          <button class="btn ${u.is_active ? 'btn-warning' : 'btn-success'} btn-sm" onclick="toggleUserActive('${u.id}',${!u.is_active})">${u.is_active ? '停用' : '啟用'}</button>
        </td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
}

function editUser(id) {
  const u = allUsers.find(x => x.id === id);
  if (!u) return;
  let roleDropdown;
  if (allRoles.length > 0) {
    const roleOpts = allRoles
      .filter(r => !r.is_system || isSystemAdmin())
      .map(r => `<option value="${r.id}" ${u.role_id === r.id ? 'selected' : ''}>${escHtml(r.display_name)}</option>`)
      .join('');
    roleDropdown = `<select id="fUserRole"><option value="">-- 請選擇 --</option>${roleOpts}</select>`;
  } else {
    roleDropdown = `<select id="fUserRole">
      <option value="owner" ${u.role === 'owner' ? 'selected' : ''}>系統管理員</option>
      <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>總管理者</option>
      <option value="clinic_manager" ${u.role === 'clinic_manager' ? 'selected' : ''}>診所管理者</option>
    </select>`;
  }
  openModal('編輯人員', `
    <div class="form-group"><label>姓名</label><input id="fUserName" value="${escHtml(u.display_name)}"></div>
    <div class="form-row">
      <div class="form-group"><label>角色</label>${roleDropdown}</div>
      <div class="form-group"><label>所屬診所</label>
        <select id="fUserClinic">${optionsHTML(allClinics, 'id', 'name', u.clinic_id)}</select>
      </div>
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="saveUser('${u.id}')">儲存</button>`);
}

async function saveUser(id) {
  const roleVal = document.getElementById('fUserRole').value;
  const obj = {
    display_name: document.getElementById('fUserName').value.trim(),
    clinic_id: document.getElementById('fUserClinic').value || null
  };
  if (!obj.display_name) { toast('請輸入姓名', 'error'); return; }
  if (allRoles.length > 0 && roleVal) {
    obj.role_id = parseInt(roleVal);
  } else if (roleVal) {
    obj.role = roleVal;
  }
  const { error } = await sb.from('user_profiles').update(obj).eq('id', id);
  if (error) { toast('儲存失敗: ' + error.message, 'error'); return; }
  toast('已更新'); closeModal(); await loadUsers(); renderUserMgmt();
}

async function toggleUserActive(id, active) {
  const action = active ? '啟用' : '停用';
  if (!await showConfirm(`${action}帳號`, `確定要${action}此帳號？`)) return;
  const { error } = await sb.from('user_profiles').update({ is_active: active }).eq('id', id);
  if (error) { toast('更新失敗: ' + error.message, 'error'); return; }
  toast(`已${action}`); await loadUsers(); renderUserMgmt();
}
