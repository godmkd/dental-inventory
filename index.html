      <tbody id="catSortBody">${allCategories.map((c, idx) => `<tr ${canManage ? `class="cat-drag-item" draggable="true" data-cat-id="${c.id}" ondragstart="catDragStart(event,${c.id})" ondragover="catDragOver(event)" ondragleave="catDragLeave(event)" ondrop="catDrop(event,${c.id})" ondragend="catDragEnd(event)"` : ''}>
        ${canManage ? `<td>
          <span class="drag-handle" style="display:inline-block;margin-right:4px">⠿</span>
          <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.8rem" onclick="moveCat(${c.id},-1)" ${idx === 0 ? 'disabled' : ''}>▲</button>
          <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.8rem" onclick="moveCat(${c.id},1)" ${idx === allCategories.length - 1 ? 'disabled' : ''}>▼</button>
        </td>` : ''}<td>${escHtml(c.name)}</td><td style="font-size:.82rem">${(c.item_type||'consumable')==='equipment'?'非耗材':'耗材'}</td>
        ${canManage ? `<td>
          <button class="btn btn-ghost btn-sm" onclick="editCategory(${c.id})">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">刪除</button>
        </td>` : ''}
      </tr>`).join('')}</tbody>
    </table></div></div>
    ${canManage ? `<div id="catSortBar" style="display:none" class="sort-confirm-bar">
      <button class="btn btn-primary" onclick="saveCatSort()">✓ 確認排序</button>
      <button class="btn btn-ghost" onclick="cancelCatSort()">✕ 取消</button>
    </div>` : ''}`;
}

window.moveCat = function(id, direction) {
  const idx = allCategories.findIndex(c => c.id === id);
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= allCategories.length) return;
  const [item] = allCategories.splice(idx, 1);
  allCategories.splice(newIdx, 0, item);
  catSortChanged = true;
  // Re-render just the table body
  const tbody = document.getElementById('catSortBody');
  if (tbody) {
    tbody.innerHTML = allCategories.map((c, i) => `<tr class="cat-drag-item" draggable="true" data-cat-id="${c.id}"
      ondragstart="catDragStart(event,${c.id})" ondragover="catDragOver(event)" ondragleave="catDragLeave(event)" ondrop="catDrop(event,${c.id})" ondragend="catDragEnd(event)">
      <td>
        <span class="drag-handle" style="display:inline-block;margin-right:4px">⠿</span>
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.8rem" onclick="moveCat(${c.id},-1)" ${i === 0 ? 'disabled' : ''}>▲</button>
        <button class="btn btn-ghost btn-sm" style="padding:2px 6px;font-size:.8rem" onclick="moveCat(${c.id},1)" ${i === allCategories.length - 1 ? 'disabled' : ''}>▼</button>
      </td><td>${escHtml(c.name)}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="editCategory(${c.id})">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">刪除</button>
      </td>
    </tr>`).join('');
  }
  const bar = document.getElementById('catSortBar');
  if (bar) bar.style.display = 'flex';
};

function catDragStart(e, id) {
  dragCatId = id;
  e.target.closest('tr').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function catDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const tr = e.target.closest('tr.cat-drag-item');
  if (tr) {
    document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
    tr.classList.add('cat-drag-over');
  }
}
function catDragLeave(e) {
  const tr = e.target.closest('tr.cat-drag-item');
  if (tr) tr.classList.remove('cat-drag-over');
}
function catDragEnd(e) {
  document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
}
function catDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.cat-drag-over').forEach(el => el.classList.remove('cat-drag-over'));
  if (dragCatId === targetId) return;
  const fromIdx = allCategories.findIndex(c => c.id === dragCatId);
  const toIdx = allCategories.findIndex(c => c.id === targetId);
  if (fromIdx < 0 || toIdx < 0) return;
  const [moved] = allCategories.splice(fromIdx, 1);
  allCategories.splice(toIdx, 0, moved);
  // re-render tbody
  const tbody = document.getElementById('catSortBody');
  tbody.innerHTML = allCategories.map(c => `<tr class="cat-drag-item" draggable="true" data-cat-id="${c.id}"
        ondragstart="catDragStart(event,${c.id})" ondragover="catDragOver(event)" ondragleave="catDragLeave(event)" ondrop="catDrop(event,${c.id})" ondragend="catDragEnd(event)">
    <td><span class="drag-handle">⠿</span></td><td>${escHtml(c.name)}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="editCategory(${c.id})">編輯</button>
      <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">刪除</button>
    </td>
  </tr>`).join('');
  catSortChanged = true;
  document.getElementById('catSortBar').style.display = 'flex';
  dragCatId = null;
}

async function saveCatSort() {
  for (let i = 0; i < allCategories.length; i++) {
    const { error } = await withTimeout(sb.from('categories').update({ sort_order: i }).eq('id', allCategories[i].id));
    if (error) { toast('排序儲存失敗: ' + error.message, 'error'); return; }
    allCategories[i].sort_order = i;
  }
  catSortChanged = false;
  document.getElementById('catSortBar').style.display = 'none';
  toast('排序已儲存');
}

async function cancelCatSort() {
  // restore original order
  const ordered = [];
  for (const id of catOrigOrder) {
    const c = allCategories.find(x => x.id === id);
    if (c) ordered.push(c);
  }
  allCategories = ordered;
  catSortChanged = false;
  renderAdminContent();
}

function editCategory(id) {
  const c = id ? allCategories.find(x => x.id === id) : {};
  const t = c.item_type || 'consumable';
  openModal(id ? '編輯類別' : '新增類別', `
    <div class="form-group"><label>名稱 *</label><input id="fCatName" value="${escHtml(c.name || '')}"></div>
    <div class="form-group"><label>類型</label>
      <div style="display:flex;gap:16px;margin-top:4px">
        <label><input type="radio" name="fCatType" value="consumable"${t==='consumable'?' checked':''}> 耗材</label>
        <label><input type="radio" name="fCatType" value="equipment"${t==='equipment'?' checked':''}> 非耗材</label>
      </div>
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="saveCategory(${id || 'null'})">儲存</button>`);
}

async function saveCategory(id) {
  const obj = {
    name: document.getElementById('fCatName').value.trim(),
    item_type: document.querySelector('input[name="fCatType"]:checked')?.value || 'consumable'
  };
  if (!obj.name) { toast('請輸入名稱', 'error'); return; }
  let err;
  if (id) { ({ error: err } = await withTimeout(sb.from('categories').update(obj).eq('id', id))); }
  else {
    const maxSort = allCategories.length > 0 ? Math.max(...allCategories.map(c => c.sort_order || 0)) : -1;
    obj.sort_order = maxSort + 1;
    ({ error: err } = await withTimeout(sb.from('categories').insert(obj)));
  }
  if (err) { toast('儲存失敗: ' + err.message, 'error'); return; }
  toast('已儲存'); closeModal(); await loadCategories(); renderAdminContent();
}

async function deleteCategory(id) {
  if (!await showConfirm('刪除類別', '確定刪除此類別？')) return;
  const { error } = await withTimeout(sb.from('categories').delete().eq('id', id));
  if (error) { toast('刪除失敗: ' + error.message, 'error'); return; }
  toast('已刪除'); await loadCategories(); renderAdminContent();
}

async function loadOrderStats() {
  const container = document.getElementById('osResult');
  if (!container) return;

  await loadClinics();
  await loadMaterials();

  let query = sb.from('order_items').select('*');
  if (osDateFrom) query = query.gte('created_at', osDateFrom + 'T00:00:00');
  if (osDateTo) query = query.lte('created_at', osDateTo + 'T23:59:59');
  const { data: items, error } = await query;
  if (error) { container.innerHTML = '<p style="color:var(--danger)">讀取失敗: ' + escHtml(error.message) + '</p>'; return; }
  if (!items || items.length === 0) { container.innerHTML = '<p style="text-align:center;padding:30px;color:var(--text-light)">此期間無叫貨資料</p>'; return; }

  const matMap = {};
  allMaterials.forEach(m => { matMap[m.id] = m; });
  const clinicMap = {};
  allClinics.forEach(c => { clinicMap[c.id] = c; });

  // Group by clinic
  const groups = {};
  items.forEach(it => {
    const cid = it.clinic_id || 0;
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push(it);
  });

  let grandTotal = 0;
  let html = '';
  const statusLabels = { pending: '待處理', confirmed: '已確認', shipped: '已出貨', delivered: '已到貨', cancelled: '已取消' };

  Object.keys(groups).forEach(cid => {
    const rows = groups[cid];
    const clinicName = clinicMap[cid] ? clinicMap[cid].name : '未知診所';
    let clinicTotal = 0;

    const rowsHtml = rows.map(it => {
      const mat = matMap[it.material_id] || {};
      const unitPrice = it.unit_price || 0;
      const customPrice = it.custom_price || 0;
      const isCustom = it.is_custom_price;
      const subtotal = isCustom && customPrice != null ? customPrice : (it.quantity * unitPrice);
      clinicTotal += subtotal;
      const status = statusLabels[it.item_status || 'pending'] || it.item_status || '-';
      const dateStr = it.created_at ? it.created_at.slice(0, 10) : '-';
      return `<tr>
        <td>${escHtml(mat.name || '(已刪除)')}</td>
        <td>${it.quantity}</td>
        <td>${fmtMoney(unitPrice)}</td>
        <td>${fmtMoney(subtotal)}</td>
        <td>${status}</td>
        <td>${dateStr}</td>
      </tr>`;
    }).join('');

    grandTotal += clinicTotal;

    html += `<div class="os-group">
      <div class="os-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="os-title">🏥 ${escHtml(clinicName)}　合計 ${fmtMoney(clinicTotal)}</span>
        <span class="os-arrow">▼</span>
      </div>
      <div class="os-body">
        <table>
          <thead><tr><th>品項</th><th>數量</th><th>單價</th><th>小計</th><th>狀態</th><th>叫貨日期</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>
      <div class="os-subtotal">小計：${fmtMoney(clinicTotal)}</div>
    </div>`;
  });

  html += `<div class="os-grand-total">所有診所總金額：${fmtMoney(grandTotal)}</div>`;
  container.innerHTML = html;
}

        const perms = (typeof r.permissions === 'string' ? JSON.parse(r.permissions || '[]') : r.permissions) || [];
        let permLabels;
        if (Array.isArray(perms)) {
          permLabels = perms.map(p => { const f = ALL_PERMISSIONS.find(ap => ap.key === p); return f ? f.label : p; }).join('、');
        } else if (typeof perms === 'object' && perms !== null) {
          if (perms.all) permLabels = '全部權限';
          else permLabels = Object.keys(perms).filter(k => perms[k]).map(p => { const f = ALL_PERMISSIONS.find(ap => ap.key === p); return f ? f.label : p; }).join('、');

        return `<tr>

            : '<span class="text-muted">無</span>'}</td>

          <td>
            <button class="btn btn-ghost btn-sm" onclick="editRole(${r.id})">編輯</button>

          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>`;

function editRole(id) {
  const r = id ? allRoles.find(x => x.id === id) : {};
  const currentPerms = r.permissions ? (typeof r.permissions === 'string' ? JSON.parse(r.permissions) : r.permissions) : [];
  const permCheckboxes = ALL_PERMISSIONS.map(p => {
    let checked = false;
    if (Array.isArray(currentPerms)) checked = currentPerms.includes(p.key);
    else if (typeof currentPerms === 'object' && currentPerms !== null) checked = currentPerms[p.key] === true || currentPerms.all === true;
    return `<label style="display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:.85rem;cursor:pointer"><input type="checkbox" class="role-perm-cb" value="${p.key}" style="flex-shrink:0;width:16px;height:16px" ${checked ? 'checked' : ''}><span>${escHtml(p.label)}</span></label>`;
  }).join('');
  openModal(id ? '編輯角色' : '新增角色', `
    <div class="form-group"><label>顯示名稱 *</label><input id="fRoleName" value="${escHtml(r.display_name || '')}"></div>
    <div class="form-group"><label>權限</label><div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;word-wrap:break-word;overflow-x:hidden">${permCheckboxes}</div></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-primary" onclick="saveRole(${id || 'null'})">儲存</button>`);
}

async function saveRole(id) {
  const displayName = document.getElementById('fRoleName').value.trim();
  if (!displayName) { toast('請輸入名稱', 'error'); return; }
  const perms = Array.from(document.querySelectorAll('.role-perm-cb:checked')).map(cb => cb.value);
  const obj = { display_name: displayName, permissions: perms };
  let err;
  if (id) {
    ({ error: err } = await withTimeout(sb.from('roles').update(obj).eq('id', id)));
  } else {
    obj.is_system = false;
    obj.name = displayName.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, '_').replace(/_+/g, '_') + '_' + Date.now();
    ({ error: err } = await withTimeout(sb.from('roles').insert(obj)));
  }
  if (err) { toast('儲存失敗: ' + err.message, 'error'); return; }
  toast('已儲存'); closeModal(); await loadRoles(); renderUserMgmt();
}

async function deleteRole(id) {
  const role = allRoles.find(r => r.id === id);
  if (role && role.is_system) { toast('系統角色不可刪除', 'error'); return; }
  if (!await showConfirm('刪除角色', '確定要刪除此角色？使用此角色的人員將失去角色設定。')) return;
  const { error } = await withTimeout(sb.from('roles').delete().eq('id', id));
  if (error) { toast('刪除失敗: ' + error.message, 'error'); return; }
  toast('已刪除'); await loadRoles(); renderUserMgmt();
}

     <button class="btn btn-primary" onclick="saveUser('${u.id}')">儲存</button>`);

async function saveUser(id) {
  const roleVal = document.getElementById('fUserRole').value;
  const obj = {
    display_name: document.getElementById('fUserName').value.trim(),
    clinic_id: document.getElementById('fUserClinic').value || null
  };
  if (!obj.display_name) { toast('請輸入姓名', 'error'); return; }
  if (allRoles.length > 0 && roleVal) {
    obj.role_id = parseInt(roleVal);
  } else if (roleVal) {
    obj.role = roleVal;
  }
  const { error } = await withTimeout(sb.from('user_profiles').update(obj).eq('id', id));
  if (error) { toast('儲存失敗: ' + error.message, 'error'); return; }
  toast('已更新'); closeModal(); await loadUsers(); renderUserMgmt();
}

async function toggleUserActive(id, active) {
  const action = active ? '啟用' : '停用';
  if (!await showConfirm(`${action}帳號`, `確定要${action}此帳號？`)) return;
  const { error } = await withTimeout(sb.from('user_profiles').update({ is_active: active }).eq('id', id));
  if (error) { toast('更新失敗: ' + error.message, 'error'); return; }
  toast(`已${action}`); await loadUsers(); renderUserMgmt();
}

// ===================== TUTORIALS =====================
async function renderTutorials(container) {
  const mc = container || document.getElementById('mainContent');
  mc.innerHTML = '<div class="loading" style="padding:40px;text-align:center">載入中...</div>';

  const { data: tutorials, error } = await withTimeout(
    sb.from('tutorials').select('*').order('created_at', { ascending: false })
  );
  if (error) { mc.innerHTML = '<div class="empty-state">載入失敗：' + escHtml(error.message) + '</div>'; return; }

  const canManageAll = hasPermission('manage_materials') || hasPermission('all');
  const myClinics = canSeeAdmin() ? allClinics : allClinics.filter(c => c.id === userProfile.clinic_id);

  // Filter by clinic
  const filterClinicId = window._tutorialFilterClinic || '';
  let filtered = tutorials;
  if (filterClinicId !== '') {
    const cid = parseInt(filterClinicId);
    filtered = tutorials.filter(t => !t.clinic_id || t.clinic_id === cid);
  } else if (!canSeeAdmin()) {
    filtered = tutorials.filter(t => !t.clinic_id || t.clinic_id === userProfile.clinic_id);
  }

  let clinicOpts = '<option value="">全部診所</option>';
  const clinicList = canSeeAdmin() ? allClinics : myClinics;
  clinicList.forEach(c => {
    clinicOpts += `<option value="${c.id}"${filterClinicId == c.id ? ' selected' : ''}>${escHtml(c.name)}</option>`;
  });

  let html = `<div class="page-title">📖 教學</div>
    <div class="toolbar">
      <select class="search-box" style="flex:none;width:auto" onchange="window._tutorialFilterClinic=this.value;renderTutorials()">
        ${clinicOpts}
      </select>
      <button class="btn btn-primary btn-sm" onclick="openTutorialModal()">＋ 新增教學</button>
    </div>`;

  if (filtered.length === 0) {
    html += '<div class="empty-state"><span>📖</span>尚無教學文章</div>';
  } else {
    filtered.forEach(t => {
      const clinicLabel = t.clinic_id ? clinicName(t.clinic_id) : '全部診所';
      html += `<div class="tutorial-card" id="tut_${t.id}">
        <div class="tutorial-card-header" onclick="document.getElementById('tut_${t.id}').classList.toggle('expanded')">
          <h4>${escHtml(t.title)}</h4>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge badge-confirmed" style="font-size:.72rem">${escHtml(clinicLabel)}</span>
            ${(canManageAll || canEditOwned(t.created_by)) ? `<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openTutorialModal('${t.id}')">✏️</button><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteTutorial('${t.id}')">🗑</button>` : ''}
          </div>
        </div>
        <div class="tutorial-card-body">
          <div class="tutorial-content">${escHtml(t.content || '')}</div>
          ${t.images && t.images.length > 0 ? `<div class="tutorial-images">${t.images.map(img => `<img src="${img}" onclick="openLightbox('${img}')">`).join('')}</div>` : ''}
          <div style="margin-top:8px;font-size:.75rem;color:var(--text-lighter)">作者：${escHtml(t.author || '-')} ｜ ${fmtDate(t.created_at)}</div>
        </div>
      </div>`;
    });
  }
  mc.innerHTML = html;
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxOverlay').classList.add('show');
}

async function openTutorialModal(editId) {
  let t = null;
  if (editId) {
    const { data } = await withTimeout(sb.from('tutorials').select('*').eq('id', editId).single());
    t = data;
  }
  const isEdit = !!t;

  let clinicOpts = '<option value="">全部診所</option>';
  allClinics.forEach(c => {
    clinicOpts += `<option value="${c.id}"${t && t.clinic_id == c.id ? ' selected' : ''}>${escHtml(c.name)}</option>`;
  });

  const body = `
    <div class="form-group">
      <label>標題</label>
      <input id="tutTitle" value="${isEdit ? escHtml(t.title) : ''}">
    </div>
    <div class="form-group">
      <label>內容</label>
      <textarea id="tutContent" rows="6">${isEdit ? escHtml(t.content || '') : ''}</textarea>
    </div>
    <div class="form-group">
      <label>適用診所</label>
      <select id="tutClinic">${clinicOpts}</select>
    </div>
    <div class="form-group">
      <label>圖片（可多張）</label>
      <input type="file" id="tutImages" accept="image/*" multiple>
      ${isEdit && t.images && t.images.length > 0 ? `<div style="margin-top:6px;font-size:.8rem;color:var(--text-light)">已有 ${t.images.length} 張圖片（重新上傳會替換）</div>` : ''}
    </div>`;

  const footer = `
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveTutorial('${editId || ''}')">${isEdit ? '更新' : '新增'}</button>`;

  openModal(isEdit ? '編輯教學' : '新增教學', body, footer);
}

async function saveTutorial(editId) {
  const title = document.getElementById('tutTitle').value.trim();
  const content = document.getElementById('tutContent').value;
  const clinicVal = document.getElementById('tutClinic').value;
  const clinic_id = clinicVal ? parseInt(clinicVal) : null;
  const fileInput = document.getElementById('tutImages');

  if (!title) { toast('請輸入標題', 'error'); return; }

  let images = [];
  if (fileInput.files.length > 0) {
    for (const file of fileInput.files) {
      const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(file); });
      images.push(dataUrl);
    }
  } else if (editId) {
    const { data } = await withTimeout(sb.from('tutorials').select('images').eq('id', editId).single());
    images = data?.images || [];
  }

  const record = editId
    ? { id: editId, title, content, images, clinic_id, author: userProfile.display_name || '-' }
    : { id: Date.now().toString(), title, content, images, clinic_id, created_at: new Date().toISOString(), author: userProfile.display_name || '-', created_by: currentUser?.id };

  const { error } = await withTimeout(sb.from('tutorials').upsert(record));
  if (error) { toast('儲存失敗：' + error.message, 'error'); return; }

  closeModal();
  toast(editId ? '教學已更新' : '教學已新增');
  renderTutorials();
}

async function deleteTutorial(id) {
  const ok = await showConfirm('刪除教學', '確定要刪除這篇教學文章嗎？');
  if (!ok) return;
  const { error } = await withTimeout(sb.from('tutorials').delete().eq('id', id));
  if (error) { toast('刪除失敗：' + error.message, 'error'); return; }
  toast('教學已刪除');
  renderTutorials();
}

let _notifyConfig = null;

async function loadNotifyConfig() {
  if (_notifyConfig) return _notifyConfig;
  const { data } = await withTimeout(sb.from('app_settings').select('value').eq('key', 'notification_config').single());
  _notifyConfig = data?.value || {
    low_stock:  { clinic_users: {}, enable_low: true, enable_half: true },
    rush_order: { user_ids: [], extra_line_ids: [], enabled: true }
  };
  // Migrate old format
  if (!_notifyConfig.low_stock.clinic_users) _notifyConfig.low_stock.clinic_users = {};
  if (!_notifyConfig.rush_order.user_ids) _notifyConfig.rush_order.user_ids = [];
  if (!_notifyConfig.rush_order.extra_line_ids) _notifyConfig.rush_order.extra_line_ids = [];
  if (_notifyConfig.low_stock.enable_low === undefined) _notifyConfig.low_stock.enable_low = true;
  if (_notifyConfig.low_stock.enable_half === undefined) _notifyConfig.low_stock.enable_half = true;
  if (_notifyConfig.rush_order.enabled === undefined) _notifyConfig.rush_order.enabled = true;
  return _notifyConfig;
}

  el.innerHTML = `
    <div class="page-title" style="font-size:1rem;margin-bottom:16px">🔔 通知設定</div>

      <h4 style="margin:0 0 10px">⚠️ 低庫存通知</h4>

function ncChipsHtml(clinicId) {
  const ids = _notifyConfig?.low_stock?.clinic_users?.[String(clinicId)] || [];
  const users = window._notifyActiveUsers || [];
  return ids.map(uid => {
    const u = users.find(x => x.id === uid);
    const name = u ? (u.display_name || uid.slice(0,8)) : uid.slice(0,8);
    const hasLine = u?.line_user_id;
    return `<span style="display:inline-flex;align-items:center;gap:3px;background:rgba(99,179,237,.2);border:1px solid rgba(99,179,237,.4);border-radius:10px;padding:1px 7px;font-size:.75rem;white-space:nowrap">${escHtml(name)}${hasLine ? ' ✅' : ''} <span style="cursor:pointer;opacity:.7;margin-left:2px" onclick="event.stopPropagation();ncRemoveUser(${clinicId},'${uid}')">×</span></span>`;
  }).join('');
}

function ncSelectOptions(clinicId) {
  const ids = _notifyConfig?.low_stock?.clinic_users?.[String(clinicId)] || [];
  const users = window._notifyActiveUsers || [];
  return users.filter(u => !ids.includes(u.id)).map(u =>
    `<option value="${u.id}">${escHtml(u.display_name || u.id.slice(0,8))}${u.line_user_id ? ' ✅' : ''}</option>`
  ).join('');
}

window.ncToggle = function(clinicId) {
  const body = document.getElementById('nc-body-' + clinicId);
  const arrow = document.getElementById('nc-arrow-' + clinicId);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (arrow) arrow.style.transform = open ? '' : 'rotate(90deg)';
};

window.ncAddUser = function(clinicId, sel) {
  const uid = sel.value;
  if (!uid || !_notifyConfig) { sel.value = ''; return; }
  const key = String(clinicId);
  if (!_notifyConfig.low_stock.clinic_users[key]) _notifyConfig.low_stock.clinic_users[key] = [];
  const arr = _notifyConfig.low_stock.clinic_users[key];
  if (!arr.includes(uid)) arr.push(uid);
  sel.value = '';
  // Refresh chips and options
  const chipsEl = document.getElementById('nc-chips-' + clinicId);
  if (chipsEl) chipsEl.innerHTML = ncChipsHtml(clinicId);
  sel.innerHTML = '<option value="">＋ 選人</option>' + ncSelectOptions(clinicId);
};

window.ncRemoveUser = function(clinicId, uid) {
  if (!_notifyConfig) return;
  const key = String(clinicId);
  _notifyConfig.low_stock.clinic_users[key] = (_notifyConfig.low_stock.clinic_users[key] || []).filter(id => id !== uid);
  const chipsEl = document.getElementById('nc-chips-' + clinicId);
  if (chipsEl) chipsEl.innerHTML = ncChipsHtml(clinicId);
  // Refresh select options
  const sel = chipsEl?.closest('div')?.querySelector('select');
  if (sel) sel.innerHTML = '<option value="">＋ 選人</option>' + ncSelectOptions(clinicId);
};

window.notifyToggleRushUser = function(userId, checked) {
  if (!_notifyConfig) return;
  const arr = _notifyConfig.rush_order.user_ids;

// ===================== LINE NOTIFY =====================
async function testLineNotify() {
  const lineId = userProfile?.line_user_id;
  if (!lineId) {
    toast('你的帳號沒有綁定 LINE（line_user_id 為空），請先用 LINE 登入一次', 'error');
    return;
  }
  toast(`LINE ID：${lineId}`, 'info');
  await new Promise(r => setTimeout(r, 1500));
  toast('發送測試訊息中...', 'info');
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/line-notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ lineUserIds: [lineId], message: '✅ 牙材系統通知測試\n如果你收到這則訊息，代表 LINE 通知設定正確！' })
    });
    const json = await res.json();
    if (!res.ok) { toast('發送失敗：' + JSON.stringify(json), 'error'); return; }
    if (json.errors?.length) {
      toast('LINE 回傳錯誤：' + JSON.stringify(json.errors[0]), 'error');
    } else {
      toast('✅ 測試訊息已發送，請確認 LINE 是否收到');
    }
  } catch(e) {
    toast('發送錯誤：' + e.message, 'error');
  }
}

async function sendLineNotify(message, lineUserIds) {
  if (!lineUserIds || lineUserIds.length === 0) return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;
    await fetch(`${SUPABASE_URL}/functions/v1/line-notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({ lineUserIds, message })
    });
  } catch (e) { console.warn('LINE notify failed:', e); }
}

async function notifyLowStock(clinicId, materialName, current, safety, level = 'low') {
  const cfg = await loadNotifyConfig();
  const userIds = cfg.low_stock?.clinic_users?.[String(clinicId)] || [];
  if (!userIds.length) return;
  const { data } = await withTimeout(
    sb.from('user_profiles').select('line_user_id').in('id', userIds).eq('is_active', true).neq('line_user_id', '')
  );
  const ids = [...new Set((data || []).map(u => u.line_user_id).filter(Boolean))];
  if (!ids.length) return;
  const isHalf = level === 'half';
  const emoji = isHalf ? '🚨' : '⚠️';
  const title = isHalf ? '庫存低於安全量一半！' : '低庫存警示';
  await sendLineNotify(`${emoji} ${title}\n診所：${clinicName(clinicId)}\n品項：${materialName}\n目前庫存：${current}（安全庫存：${safety}）\n請盡快補貨！`, ids);
}

async function notifyRushOrder(orderInfo) {
  const cfg = await loadNotifyConfig();
  const userIds = cfg.rush_order?.user_ids || [];
  const extraIds = cfg.rush_order?.extra_line_ids || [];
  let lineIds = [...extraIds];
  if (userIds.length) {
    const { data } = await withTimeout(
      sb.from('user_profiles').select('line_user_id').in('id', userIds).eq('is_active', true).neq('line_user_id', '')
    );
    lineIds = [...lineIds, ...(data || []).map(u => u.line_user_id).filter(Boolean)];
  }
  const ids = [...new Set(lineIds)];
  if (!ids.length) return;
  await sendLineNotify(`🚨 催貨通知\n${orderInfo}`, ids);
}

// ===================== EXCEL EXPORT =====================
async function exportExcel() {
  toast('準備匯出...', 'info');
  await Promise.all([loadClinics(), loadMaterials()]);

  const dateFrom = document.getElementById('osFrom')?.value || '';
  const dateTo   = document.getElementById('osTo')?.value   || '';

  // Sheet 1: 叫貨明細
  let q1 = sb.from('order_items').select('*');
  if (dateFrom) q1 = q1.gte('created_at', dateFrom + 'T00:00:00');
  if (dateTo)   q1 = q1.lte('created_at', dateTo   + 'T23:59:59');
  const { data: items } = await withTimeout(q1);

  const statusMap = { pending:'待處理', confirmed:'已確認', shipped:'已出貨', delivered:'已到貨', cancelled:'已取消' };
  const orderRows = [['診所','品項','數量','單位','單價','小計','狀態','叫貨日期']];
  (items || []).forEach(it => {
    const m = allMaterials.find(x => x.id === it.material_id) || {};
    const subtotal = it.is_custom_price && it.custom_price != null ? it.custom_price : (it.quantity * (it.unit_price || 0));
    orderRows.push([
      clinicName(it.clinic_id), m.name || '(已刪除)',
      it.quantity, m.unit || '',
      it.unit_price || 0,
      subtotal,
      statusMap[it.item_status] || it.item_status || '',
      (it.created_at || '').slice(0, 10)
    ]);
  });

  // Sheet 2: 庫存現況
  const { data: inv } = await withTimeout(sb.from('clinic_inventory').select('*'));
  const invRows = [['診所','品項','類別','目前庫存','安全庫存']];
  (inv || []).forEach(r => {
    const m = allMaterials.find(x => x.id === r.material_id) || {};
    invRows.push([clinicName(r.clinic_id), m.name || '', categoryName(m.category_id), r.current_stock, r.safety_stock]);
  });

  // Sheet 3: 消耗紀錄 (out)
  let q3 = sb.from('inventory_logs').select('*').eq('type', 'out').order('created_at', { ascending: false });
  if (dateFrom) q3 = q3.gte('created_at', dateFrom + 'T00:00:00');
  if (dateTo)   q3 = q3.lte('created_at', dateTo   + 'T23:59:59');
  const { data: logs } = await withTimeout(q3);
  const logRows = [['診所','品項','數量','操作人員','備註','日期']];
  (logs || []).forEach(l => {
    const m = allMaterials.find(x => x.id === l.material_id) || {};
    logRows.push([clinicName(l.clinic_id), m.name || '', l.quantity, l.operator_name || '', l.notes || '', (l.created_at || '').slice(0, 10)]);
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(orderRows), '叫貨明細');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(invRows),   '庫存現況');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(logRows),   '消耗紀錄');

  const filename = `牙材報表_${dateFrom || 'all'}_${dateTo || 'all'}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast('匯出完成：' + filename);
}

async function loadTrendData() {
  const from = (document.getElementById('trendFrom')?.value || '') + '-01';
  const toRaw = document.getElementById('trendTo')?.value || '';
  const to = toRaw ? toRaw + '-31' : '';
  const topN = parseInt(document.getElementById('trendTopN')?.value || '10');

  let q = sb.from('inventory_logs').select('material_id,quantity,created_at').eq('type','out');
  if (from) q = q.gte('created_at', from);
  if (to)   q = q.lte('created_at', to);
  const { data: logs, error } = await withTimeout(q);
  if (error || !logs?.length) {
    document.getElementById('trendTable').innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-light)">此期間無消耗資料</p>';
    return;
  }

  // Aggregate by material
  const byMat = {};
  const byMatMonth = {};
  logs.forEach(l => {
    const mid = l.material_id;
    const month = (l.created_at || '').slice(0, 7);
    byMat[mid] = (byMat[mid] || 0) + (l.quantity || 0);
    if (!byMatMonth[mid]) byMatMonth[mid] = {};
    byMatMonth[mid][month] = (byMatMonth[mid][month] || 0) + (l.quantity || 0);
  });

  // Top N materials
  const sorted = Object.entries(byMat).sort((a, b) => b[1] - a[1]).slice(0, topN);
  const matIds = sorted.map(([id]) => parseInt(id));
  await loadMaterials();

  // All months in range
  const months = [...new Set(logs.map(l => (l.created_at || '').slice(0, 7)))].sort();

  // Chart
  const colors = ['#63b3ed','#68d391','#f6ad55','#fc8181','#b794f4','#4fd1c5','#f687b3','#fbd38d','#a0aec0','#90cdf4','#9ae6b4','#fca5a5'];
  const datasets = matIds.map((mid, i) => ({
    label: (allMaterials.find(m => m.id === mid) || {}).name || mid,
    data: months.map(mo => byMatMonth[mid]?.[mo] || 0),
    backgroundColor: colors[i % colors.length],
    borderColor: colors[i % colors.length],
    fill: false, tension: 0.3
  }));

  if (_trendChart) { _trendChart.destroy(); _trendChart = null; }
  const ctx = document.getElementById('trendCanvas')?.getContext('2d');
  if (ctx) {
    _trendChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: months, datasets },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#e2e8f0' } } },
        scales: {
          x: { ticks: { color: '#a0aec0' }, grid: { color: 'rgba(255,255,255,.05)' } },
          y: { ticks: { color: '#a0aec0' }, grid: { color: 'rgba(255,255,255,.05)' } }
        }
      }
    });
  }

  // Summary table
  let tbl = '<div class="card"><div class="table-wrap"><table><thead><tr><th>品項</th><th>總消耗量</th></tr></thead><tbody>';
  sorted.forEach(([mid, total]) => {
    const m = allMaterials.find(x => x.id == mid) || {};
    tbl += `<tr><td>${escHtml(m.name || mid)}</td><td>${total} ${escHtml(m.unit || '')}</td></tr>`;
  });
  tbl += '</tbody></table></div></div>';
  document.getElementById('trendTable').innerHTML = tbl;
}

// ===================== AUTO ORDER =====================
async function autoGenerateOrder() {
  if (!orderClinicId) { toast('請先選擇診所', 'error'); return; }
  toast('掃描庫存中...', 'info');

  const { data: inv } = await withTimeout(
    sb.from('clinic_inventory').select('material_id,current_stock,safety_stock').eq('clinic_id', orderClinicId)
  );
  if (!inv?.length) { toast('此診所尚無庫存資料', 'error'); return; }

  await loadMaterials();
  const currentType = window._orderViewType || 'consumable';
  const typeLabel = currentType === 'consumable' ? '耗材' : '非耗材';
  // Filter by current item type
  const typeMats = allMaterials.filter(m => matItemType(m) === currentType);
  const typeMatsIds = new Set(typeMats.map(m => m.id));
  const invMap = {};
  (inv || []).forEach(i => { invMap[i.material_id] = i; });

  // Find all items that need ordering: stock <= safety OR stock = 0 OR no inventory record
  const lowItems = [];
  typeMats.forEach(m => {
    const i = invMap[m.id];
    const stock = i ? i.current_stock : 0;
    const safety = i ? (i.safety_stock ?? (m.default_safety_stock ?? 5)) : (m.default_safety_stock ?? 5);
    if (safety > 0 && stock <= safety) {
      lowItems.push({ material_id: m.id, current_stock: stock, safety_stock: safety });
    }
  });
  if (!lowItems.length) { toast(`${typeLabel}品項庫存充足，不需叫貨 ✅`); return; }

  // Pre-fill quantities: bring up to multiplier × safety_stock
  const multiplier = parseFloat(document.getElementById('autoOrderMultiplier')?.value) || 2;
  let filled = 0;
  lowItems.forEach(i => {
    const target = Math.round(i.safety_stock * multiplier);
    const toOrder = Math.max(1, target - i.current_stock);
    orderQtyMap[i.material_id] = toOrder;
    filled++;
  });

  updateOrderSubmitBar();
  // Scroll to order panel
  const panel = document.getElementById('orderChangePanel');
  if (panel) { panel.classList.remove('collapsed'); panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  renderOrderContent(); // refresh to show updated quantities
  toast(`已自動帶入 ${filled} 項低庫存${typeLabel}，請確認數量後送出`, 'info');
}

async function loadMonthlyReport() {
  const year = document.getElementById('mrYear')?.value || new Date().getFullYear();
  const from = `${year}-01-01T00:00:00`, to = `${year}-12-31T23:59:59`;
  const tbl = document.getElementById('mrTable');

  await Promise.all([loadClinics(), loadMaterials()]);
  const { data: items } = await withTimeout(sb.from('order_items').select('clinic_id,quantity,unit_price,custom_price,is_custom_price,created_at').gte('created_at', from).lte('created_at', to));
  if (!items?.length) { if (tbl) tbl.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-light)">此年度無叫貨資料</p>'; return; }

  const months = Array.from({length:12}, (_,i) => String(i+1).padStart(2,'0'));

  // By month total
  const monthlyTotal = {};
  labels.forEach(l => monthlyTotal[l] = 0);
  // By clinic+month
  const byClinic = {};
  allClinics.forEach(c => { byClinic[c.id] = {}; labels.forEach(l => byClinic[c.id][l] = 0); });

  items.forEach(it => {
    const mo = (it.created_at||'').slice(0,7);
    const amount = it.is_custom_price && it.custom_price != null ? Number(it.custom_price) : Number(it.quantity||0) * Number(it.unit_price||0);
    if (monthlyTotal[mo] !== undefined) monthlyTotal[mo] += amount;
    if (byClinic[it.clinic_id]?.[mo] !== undefined) byClinic[it.clinic_id][mo] += amount;
  });

  const colors = ['#63b3ed','#68d391','#f6ad55','#fc8181','#b794f4','#4fd1c5','#f687b3','#fbd38d'];
  const datasets = allClinics.map((c,i) => ({
    label: c.name, data: labels.map(l => byClinic[c.id]?.[l] || 0),
    backgroundColor: colors[i % colors.length], borderColor: colors[i % colors.length], fill: false, tension: 0.3
  }));

  if (_monthlyChart) { _monthlyChart.destroy(); _monthlyChart = null; }
  const ctx = document.getElementById('mrCanvas')?.getContext('2d');
  if (ctx) {
    _monthlyChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: labels.map(l => l.slice(5) + '月'), datasets },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: '#e2e8f0' } } },
        scales: {
          x: { stacked: true, ticks: { color: '#a0aec0' }, grid: { color: 'rgba(255,255,255,.05)' } },
          y: { stacked: true, ticks: { color: '#a0aec0', callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(255,255,255,.05)' } }
        }
      }
    });
  }

  // Table
  const yearTotal = Object.values(monthlyTotal).reduce((s,v) => s+v, 0);
  let html = '<div class="card"><div class="table-wrap"><table style="min-width:max-content"><thead><tr><th>診所</th>'
    + months.map(m => `<th>${parseInt(m)}月</th>`).join('') + '<th>年計</th></tr></thead><tbody>';
  allClinics.forEach(c => {
    const row = labels.map(l => byClinic[c.id]?.[l] || 0);
    const rowTotal = row.reduce((s,v) => s+v, 0);
    html += `<tr><td><strong>${escHtml(c.name)}</strong></td>${row.map(v => `<td>${v>0?'$'+Math.round(v).toLocaleString():'-'}</td>`).join('')}<td><strong>$${Math.round(rowTotal).toLocaleString()}</strong></td></tr>`;
  });
  html += `<tr style="border-top:2px solid rgba(255,255,255,.2)"><td><strong>月合計</strong></td>${labels.map(l=>`<td><strong>$${Math.round(monthlyTotal[l]).toLocaleString()}</strong></td>`).join('')}<td><strong>$${Math.round(yearTotal).toLocaleString()}</strong></td></tr>`;
  html += '</tbody></table></div></div>';
  if (tbl) tbl.innerHTML = html;
}

      <div id="ssTable" style="flex:1;min-width:200px"></div>
    </div>`;
  await loadSupplierStats();
}

async function loadSupplierStats() {
  const from = document.getElementById('ssFrom')?.value || '';
  const to = document.getElementById('ssTo')?.value || '';
  const tbl = document.getElementById('ssTable');
  if (tbl) tbl.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light)">載入中...</div>';

  await Promise.all([loadMaterials(), loadSuppliers()]);
  let q = sb.from('order_items').select('material_id,quantity,unit_price,custom_price,is_custom_price,created_at');
  if (from) q = q.gte('created_at', from + 'T00:00:00');
  if (to)   q = q.lte('created_at', to + 'T23:59:59');
  const { data: items } = await withTimeout(q);
  if (!items?.length) { if (tbl) tbl.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-light)">此期間無叫貨資料</p>'; return; }

  const matSupplier = {};
  allMaterials.forEach(m => { matSupplier[m.id] = m.supplier_id; });

  const bySupplier = {};
  items.forEach(it => {
    const sid = matSupplier[it.material_id] || 0;
    if (!bySupplier[sid]) bySupplier[sid] = { amount: 0, count: 0 };
    const amount = it.is_custom_price && it.custom_price != null ? Number(it.custom_price) : Number(it.quantity||0) * Number(it.unit_price||0);
    bySupplier[sid].amount += amount;
    bySupplier[sid].count++;
  });

  const sorted = Object.entries(bySupplier).sort((a,b) => b[1].amount - a[1].amount);
  const total = sorted.reduce((s,[,v]) => s+v.amount, 0);
  const colors = ['#63b3ed','#68d391','#f6ad55','#fc8181','#b794f4','#4fd1c5','#f687b3','#fbd38d','#a0aec0'];

  if (_supplierChart) { _supplierChart.destroy(); _supplierChart = null; }
  const ctx = document.getElementById('ssCanvas')?.getContext('2d');
  if (ctx) {
    _supplierChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: sorted.map(([sid]) => sid == 0 ? '(未指定廠商)' : (allSuppliers.find(s => s.id == sid)?.name || `廠商#${sid}`)),
        datasets: [{ data: sorted.map(([,v]) => Math.round(v.amount)), backgroundColor: colors }]
      },
      options: {
        responsive: true,
        plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0', font: { size: 11 } } } }
      }
    });
  }

  let html = '<div class="card"><div class="table-wrap"><table><thead><tr><th>廠商</th><th>採購金額</th><th>佔比</th><th>筆數</th></tr></thead><tbody>';
  sorted.forEach(([sid, v]) => {
    const name = sid == 0 ? '(未指定)' : (allSuppliers.find(s => s.id == sid)?.name || `廠商#${sid}`);
    const pct = total > 0 ? (v.amount / total * 100).toFixed(1) : 0;
    html += `<tr><td>${escHtml(name)}</td><td>$${Math.round(v.amount).toLocaleString()}</td><td>${pct}%</td><td>${v.count}</td></tr>`;
  });
  html += `<tr style="border-top:2px solid rgba(255,255,255,.2)"><td><strong>合計</strong></td><td><strong>$${Math.round(total).toLocaleString()}</strong></td><td>100%</td><td>${items.length}</td></tr>`;
  html += '</tbody></table></div></div>';
  if (tbl) tbl.innerHTML = html;
}

// ===================== START =====================
init();
</script>
