<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙材集中採購管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a1535;--primary-light:#2a2555;--primary-dark:#0a0820;
  --accent:#63b3ed;--accent-hover:#4299e1;
  --danger:#fc8181;--danger-bg:rgba(254,178,178,.1);--danger-hover:#f56565;
  --success:#68d391;--success-hover:#48bb78;
  --warning:#f6ad55;--warning-hover:#ed8936;
  --bg:#0f0c29;--card:rgba(255,255,255,.06);--text:#e2e8f0;--text-light:#a0aec0;--text-lighter:#718096;
  --border:rgba(255,255,255,.1);--border-light:rgba(255,255,255,.06);--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.3);
  --font-mono:'SF Mono','Cascadia Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background-color:#000;color:var(--text);min-height:100vh;overflow-x:hidden}

/* Login */
.login-page{display:none;align-items:center;justify-content:center;min-height:100vh;width:100%;position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);z-index:999}
.login-card{background:rgba(30,27,60,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px 40px;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.5);max-width:420px;width:90%;animation:fadeInUp .5s ease;color:#e2e8f0}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-card h1{font-size:1.8rem;background:linear-gradient(135deg, #a78bfa, #c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;font-weight:800}
.login-card p{color:var(--text-light);margin-bottom:32px;font-size:.9rem;letter-spacing:.5px}
.login-logo{font-size:3.5rem;margin-bottom:16px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))}
.login-powered{font-size:.75rem;color:var(--text-lighter);margin-top:24px;opacity:.7}
.btn-line{background:#06C755;color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:all .2s;width:100%;justify-content:center;box-shadow:0 4px 14px rgba(6,199,85,.3)}
.btn-line:hover{background:#05b34a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(6,199,85,.4)}
.btn-line:active{transform:translateY(0);box-shadow:0 2px 8px rgba(6,199,85,.3)}
.login-divider{margin:24px 0 16px;position:relative;border-top:1px solid var(--border)}
.login-divider span{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);padding:0 14px;font-size:.82rem;color:var(--text-light);white-space:nowrap}
.login-loading{display:none;text-align:center;padding:40px;color:#fff;font-size:1.1rem}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-msg{background:rgba(254,252,191,.1);color:#fbd38d;padding:20px;border-radius:var(--radius);margin-top:20px;line-height:1.6}

/* App Shell */
.app{display:none}
.header{background:#000;color:#fff;padding:10px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.1)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{font-size:1.2rem;white-space:nowrap;display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:12px}
.header-user{font-size:.85rem;opacity:.9}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85rem;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.3)}

.app-body{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 56px)}
.content-section .content{max-width:1400px;margin:0 auto}
.sidebar{width:180px;min-width:180px;max-width:180px;background:rgba(15,12,41,.95);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;color:#e2e8f0;overflow-y:auto;display:flex;flex-direction:column}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:.92rem;color:var(--text);transition:all .25s ease;border-left:3px solid transparent}
.sidebar .nav-item:hover{background:linear-gradient(90deg,rgba(99,179,237,.15),transparent);color:var(--accent)}
.sidebar .nav-item.active{background:rgba(99,179,237,.15);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.sidebar .nav-section{font-size:.75rem;color:var(--text-lighter);text-transform:uppercase;padding:16px 20px 6px;letter-spacing:.5px;font-weight:600}
.content{flex:1;padding:20px;overflow-y:auto;min-width:0}

/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(15,12,41,.95);border-top:1px solid var(--border);z-index:100;padding:4px 0 env(safe-area-inset-bottom);box-shadow:0 -2px 10px rgba(0,0,0,.3)}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bottom-nav .bnav-item{display:flex;flex-direction:column;align-items:center;padding:6px 4px;font-size:.65rem;color:var(--text-light);cursor:pointer;min-width:0;flex:1;transition:all .2s}
.bottom-nav .bnav-item:active{transform:scale(0.92)}
.bottom-nav .bnav-item.active{color:var(--accent)}
.bottom-nav .bnav-item.active span:first-child{transform:scale(1.15);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.bottom-nav .bnav-item span:first-child{font-size:1.3rem;margin-bottom:2px}
.bottom-nav .bnav-more{position:relative}
.more-menu{display:none;position:absolute;bottom:100%;right:0;background:rgba(30,27,60,.95);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 -4px 12px rgba(0,0,0,.3);min-width:160px;padding:6px 0;margin-bottom:8px}
.more-menu.show{display:block}
.more-menu .mm-item{padding:10px 16px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:8px}
.more-menu .mm-item{color:var(--text)}
.more-menu .mm-item:hover{background:rgba(255,255,255,.08)}

@media(max-width:1024px){
  .sidebar{display:none!important}
  .bottom-nav{display:block}
  .content{padding:12px;padding-bottom:120px}
  .app-body{min-height:calc(100vh - 56px - 60px)}
  .header h1{font-size:1rem}
}

/* Common */
.page-title{font-size:1.3rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:nowrap;white-space:nowrap}
.help-tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(99,179,237,.2);color:var(--accent);font-size:.6rem;font-weight:700;cursor:help;flex-shrink:0;vertical-align:middle}
.help-tip .help-text{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(30,27,60,.97);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.7rem;font-weight:400;color:#e2e8f0;white-space:normal;width:max-content;max-width:220px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4);line-height:1.4;text-align:left;pointer-events:none}
.help-tip .help-text::after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:rgba(30,27,60,.97)}
.help-tip:hover .help-text{display:block}
.no-transition,.no-transition *,.no-transition *::before,.no-transition *::after{transition:none!important}
.help-tip{overflow:visible!important}
.page-title,.card-title,.toolbar,h2,h3,h4,.bg-section,.form-group{overflow:visible!important}
body[data-theme="light"] .help-tip .help-text{background:rgba(255,255,255,.97);color:#2d3748;border-color:rgba(0,0,0,.15);box-shadow:0 4px 12px rgba(0,0,0,.12)}
body[data-theme="light"] .help-tip .help-text::after{border-bottom-color:rgba(255,255,255,.97);border-top-color:transparent}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:.92rem;outline:none;transition:border-color .2s;background:rgba(255,255,255,.06);color:var(--text)}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,179,237,.15)}
.btn{padding:10px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.88rem;font-weight:500;transition:all .2s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:active:not([disabled]){transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:var(--success-hover)}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:var(--warning-hover)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-hover)}
.btn-ghost{background:transparent;color:var(--text-light);border:1px solid var(--border)}.btn-ghost:hover{background:rgba(255,255,255,.08)}
.btn-sm{padding:6px 12px;font-size:.82rem}
.btn-xs{padding:4px 8px;font-size:.78rem}
.btn[disabled]{opacity:.5;pointer-events:none}

.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.2)}
.card-title{font-size:1.05rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:rgba(255,255,255,.08);padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0;color:var(--text-light)}
td{padding:10px 12px;border-bottom:1px solid var(--border-light);transition:background .15s}
tr:hover td{background:rgba(99,179,237,.1)}
td .num,td.num,.stat-value,.mat-card-stock,.item-stock,[data-num]{font-family:var(--font-mono)}
.stock-danger{background:var(--danger-bg);color:var(--danger);font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:500}
.badge-pending{background:rgba(246,224,94,.15);color:#fbd38d}
.badge-confirmed{background:rgba(104,211,145,.15);color:#68d391}
.badge-shipped{background:rgba(99,179,237,.15);color:#63b3ed}
.badge-delivered{background:rgba(183,148,244,.15);color:#b794f4}
.badge-cancelled{background:rgba(252,129,129,.15);color:#fc8181}
.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-muted{color:var(--text-light)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state span{font-size:2.5rem;display:block;margin-bottom:12px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);opacity:0;transition:opacity .25s}
.modal-overlay.show{display:flex;opacity:1}
.modal{background:rgba(30,27,60,.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.5);animation:modalFadeIn .3s ease}
@keyframes modalFadeIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(30,27,60,.98);z-index:1;border-radius:12px 12px 0 0}
.modal-header h3{font-size:1.1rem}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-light);padding:4px}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.85rem;font-weight:500;margin-bottom:5px;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.92rem;outline:none;transition:border-color .2s;font-family:inherit;background:rgba(255,255,255,.06);color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,179,237,.15)}
select,input[type="number"],input[type="text"],input[type="email"],input[type="password"],textarea{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
select option{background:#1a1a2e;color:#e2e8f0}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}
table{font-size:.78rem}
th,td{padding:6px 4px!important}
}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:6px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);transition:all .15s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center;transition:all .2s}
.stat-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.2);transform:translateY(-2px)}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;color:var(--accent);font-family:var(--font-mono)}
.stat-card .stat-label{font-size:.82rem;color:var(--text-light);margin-top:4px}

/* Toast */
.toast-container{position:fixed;top:72px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;color:#fff;font-size:.9rem;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastSlideIn .4s cubic-bezier(.21,1.02,.73,1);max-width:360px;backdrop-filter:blur(8px);transition:opacity .3s,transform .3s}
.toast-success{background:rgba(56,161,105,.95)}.toast-error{background:rgba(229,62,62,.95)}.toast-info{background:rgba(49,130,206,.95)}
@keyframes toastSlideIn{from{opacity:0;transform:translateX(60px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}

/* Confirm */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.confirm-overlay.show{display:flex}
.confirm-box{background:rgba(30,27,60,.95);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:400px;width:100%;text-align:center;animation:modalFadeIn .3s ease;box-shadow:0 20px 50px rgba(0,0,0,.4)}
.confirm-box h3{margin-bottom:12px}
.confirm-box p{color:var(--text-light);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}

.img-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border)}
.img-upload-preview{max-width:120px;max-height:120px;object-fit:cover;border-radius:var(--radius);margin-top:8px}

/* Sub tabs */
.sub-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.sub-tab{padding:8px 16px;cursor:pointer;font-size:.88rem;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.sub-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Inline item row */
.item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border-light);gap:8px;flex-wrap:wrap}
.item-row:last-child{border-bottom:none}
.item-row .item-row-left{flex:1;min-width:120px}
.item-row .item-row-left .item-name{font-weight:600;font-size:.9rem}
.item-row .item-row-left .item-stock{font-size:.78rem;color:var(--text-light)}
.item-row .item-row-right{display:flex;flex-direction:column;align-items:center;gap:4px}
.item-row .inline-adjuster{display:flex;align-items:center;gap:0}
.item-row .inline-adjuster .adj-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text)}
.item-row .inline-adjuster .adj-btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.item-row .inline-adjuster .adj-btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.item-row .inline-adjuster .adj-btn:hover{background:var(--border-light)}
.item-row .inline-adjuster .adj-btn:active{background:var(--accent);color:#fff}
.item-row .inline-adjuster input{width:56px;height:36px;text-align:center;border:1px solid var(--border);border-left:none;border-right:none;font-size:.95rem;font-weight:600;outline:none;-moz-appearance:textfield}
.item-row .inline-adjuster input::-webkit-outer-spin-button,.item-row .inline-adjuster input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.item-row .btn-add-item{font-size:.78rem;padding:3px 12px;border-radius:12px}

/* Floating panel */
.float-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(30,27,60,.95);backdrop-filter:blur(10px);border-top:2px solid var(--accent);z-index:90;transition:transform .3s;max-height:50vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.float-panel.collapsed{transform:translateY(calc(100% - 48px))}
.float-panel-header{padding:12px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--accent);color:#fff;font-weight:600;font-size:.92rem;position:sticky;top:0;z-index:1}
.float-panel-body{padding:12px 20px}
.float-panel-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:.88rem}
.float-panel-item .item-info{flex:1}
.float-panel-item .item-qty{display:flex;align-items:center;gap:8px}
.float-panel-item .item-qty input{width:60px;text-align:center;padding:4px;border:1px solid var(--border);border-radius:4px}
.float-panel-actions{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}

/* Order card collapsible */
.order-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.order-card-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.order-card-header:hover{background:rgba(255,255,255,.05)}
.order-card-body{display:none;padding:0 20px 16px;border-top:1px solid var(--border-light)}
.order-card.expanded .order-card-body{display:block}
.order-item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light);flex-wrap:wrap;gap:8px}
.order-item-row:last-child{border:none}
.order-item-info{flex:1;min-width:150px}
.order-item-actions{display:flex;gap:6px;flex-wrap:wrap}

/* Responsive table cards */
@media(max-width:640px){
  .responsive-cards thead{display:none}
  .responsive-cards tbody tr{display:block;background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:var(--shadow)}
  .responsive-cards td{display:flex;justify-content:space-between;padding:6px 0;border:none}
  .responsive-cards td::before{content:attr(data-label);font-weight:600;color:var(--text-light);margin-right:12px}
  .mat-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}

/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:skeletonPulse 1.5s ease-in-out infinite;border-radius:var(--radius);min-height:20px}
.skeleton-card{height:120px;border-radius:var(--radius);margin-bottom:12px}
.skeleton-line{height:14px;margin-bottom:10px;border-radius:4px}
.skeleton-line.w60{width:60%}.skeleton-line.w80{width:80%}.skeleton-line.w40{width:40%}
@keyframes skeletonPulse{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Mobile active states */
@media(max-width:768px){
  .header{padding:8px 16px}
  .btn:active{transform:scale(0.97)}
}

/* Qty adjuster in modal */
.qty-adjuster{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0}
.qty-adjuster .btn{width:44px;height:44px;border-radius:50%;font-size:1.3rem;padding:0;display:flex;align-items:center;justify-content:center}
.qty-adjuster input{width:80px;text-align:center;font-size:1.4rem;font-weight:700;border:2px solid var(--border);border-radius:var(--radius);padding:8px}
.qty-type-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.qty-type-toggle .btn.active{box-shadow:0 0 0 3px rgba(49,130,206,.3)}

/* View toggle */
.view-toggle{display:flex;gap:4px}
.view-toggle .btn.active{background:var(--accent);color:#fff}

/* Mat card grid */
.mat-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.mat-card{width:calc(33.333% - 6px);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:32px 1fr 32px;align-items:center;padding:8px 4px;text-align:center;transition:all .25s ease;border:2px solid transparent;gap:2px}
.mat-card .adj-left,.mat-card .adj-right{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:1.1rem;font-weight:700;border-radius:var(--radius);transition:all .15s;color:var(--text)}
.mat-card .adj-left:hover,.mat-card .adj-right:hover{background:var(--border-light)}
.mat-card .adj-left:active,.mat-card .adj-right:active{background:var(--accent);color:#fff}
.mat-card .mat-card-center{display:flex;flex-direction:column;align-items:center}
.mat-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.mat-card.stock-low{border-color:var(--danger);background:rgba(254,178,178,.08)}
.mat-card .mat-card-img{width:56px;height:56px;object-fit:cover;border-radius:8px;margin-bottom:4px}
.mat-card .mat-card-icon{font-size:2rem;margin-bottom:4px}
.mat-card .mat-card-name{font-size:.75rem;font-weight:600;line-height:1.2;margin-bottom:2px;word-break:break-all;max-height:2.4em;overflow:hidden}
.mat-card .mat-card-stock{font-size:.68rem;color:var(--text-light);margin-bottom:6px}
.mat-card .inline-adjuster .adj-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.95rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text)}
.mat-card .inline-adjuster .adj-btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.mat-card .inline-adjuster .adj-btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.mat-card .inline-adjuster .adj-btn:hover{background:var(--border-light)}
.mat-card .inline-adjuster .adj-btn:active{background:var(--accent);color:#fff}
.mat-card .inline-adjuster input{width:40px;height:28px;text-align:center;border:1px solid var(--border);border-left:none;border-right:none;font-size:.82rem;font-weight:600;outline:none;-moz-appearance:textfield}
.mat-card .inline-adjuster input::-webkit-outer-spin-button,.mat-card .inline-adjuster input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
@media(min-width:769px){.mat-card{width:calc(16.666% - 6px)}}
@media(min-width:1200px){.mat-card{width:calc(12.5% - 6px)}}
@media(max-width:500px){.mat-card{width:calc(50% - 6px)}}
@media(max-width:350px){.mat-card{width:100%}}

/* Submit bar */
.submit-bar-row{display:flex;gap:10px;margin-bottom:12px;align-items:stretch}
.submit-bar{flex:1;background:var(--accent);color:#fff;padding:14px 20px;border-radius:var(--radius);text-align:center;cursor:pointer;font-weight:700;font-size:1.05rem;box-shadow:0 2px 8px rgba(49,130,206,.3);transition:background .2s}
.submit-bar:hover{background:var(--accent-hover)}
.submit-bar .submit-count{background:rgba(255,255,255,.25);padding:2px 10px;border-radius:12px;font-size:.85rem;margin-left:8px}
.submit-bar[disabled]{opacity:.5;pointer-events:none}
.btn-clear-all{background:var(--danger);color:#fff;border:none;padding:14px 16px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:.9rem;white-space:nowrap;transition:background .2s}
.btn-clear-all:hover{background:var(--danger-hover)}

/* Bottom change panel */
.bottom-change-panel{position:sticky;bottom:0;left:0;right:0;background:var(--card);box-shadow:0 -4px 16px rgba(0,0,0,.12);z-index:80;border-radius:12px 12px 0 0;overflow:hidden;margin:0 -20px;transition:all .3s ease}
@media(max-width:768px){.bottom-change-panel{margin:0 -12px}}
.bottom-change-panel .bcp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;background:var(--card);border-bottom:1px solid var(--border-light)}
.bottom-change-panel .bcp-header:hover{background:rgba(255,255,255,.05)}
.bottom-change-panel .bcp-title{font-weight:700;font-size:.95rem;color:var(--text)}
.bottom-change-panel .bcp-arrow{font-size:.85rem;color:var(--text-light);transition:transform .3s}
.bottom-change-panel.collapsed .bcp-arrow{transform:rotate(180deg)}
.bottom-change-panel .bcp-body{max-height:40vh;overflow-y:auto;padding:0}
.bottom-change-panel.collapsed .bcp-body{display:none}
.bottom-change-panel .bcp-empty{padding:20px;text-align:center;color:var(--text-light);font-size:.9rem}
.bottom-change-panel .bcp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border-light);font-size:.88rem}
.bottom-change-panel .bcp-item:last-child{border-bottom:none}
.bottom-change-panel .bcp-item-name{flex:1;font-weight:500}
.bottom-change-panel .bcp-item-qty{margin:0 12px;font-weight:700;min-width:40px;text-align:center}
.bottom-change-panel .bcp-item-qty.positive{color:var(--success)}
.bottom-change-panel .bcp-item-qty.negative{color:var(--danger)}
.bottom-change-panel .bcp-item-remove{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:4px;transition:all .15s}
.bottom-change-panel .bcp-item-remove:hover{background:var(--danger-bg);color:var(--danger)}
.bottom-change-panel .bcp-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--card)}
.bottom-change-panel.collapsed .bcp-footer{display:none}
.confirmed-panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;overflow:hidden}
.confirmed-panel .cp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-light)}
.confirmed-panel .cp-header:hover{background:rgba(255,255,255,.05)}
.confirmed-panel .cp-title{font-weight:700;font-size:.95rem;color:var(--text)}
.confirmed-panel .cp-arrow{font-size:.85rem;color:var(--text-light);transition:transform .3s}
.confirmed-panel.collapsed .cp-arrow{transform:rotate(180deg)}
.confirmed-panel .cp-body{max-height:50vh;overflow-y:auto}
.confirmed-panel.collapsed .cp-body{display:none}
.confirmed-panel .cp-empty{padding:20px;text-align:center;color:var(--text-light);font-size:.9rem}
.confirmed-panel .cp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border-light);font-size:.88rem}
.confirmed-panel .cp-item:last-child{border-bottom:none}
.confirmed-panel .cp-item-left{flex:1;display:flex;align-items:center;gap:8px}
.confirmed-panel .cp-item-name{font-weight:500}
.confirmed-panel .cp-item-qty{font-weight:700;min-width:50px}
.confirmed-panel .cp-item-qty.positive{color:var(--success)}
.confirmed-panel .cp-item-qty.negative{color:var(--danger)}
.confirmed-panel .cp-item-time{color:var(--text-light);font-size:.8rem;min-width:50px}
.confirmed-panel .cp-item-cancel{background:none;border:1px solid var(--danger);color:var(--danger);cursor:pointer;font-size:.78rem;padding:3px 10px;border-radius:4px;transition:all .15s}
.confirmed-panel .cp-item-cancel:hover{background:var(--danger);color:#fff}
.btn-reset-item{background:none;border:none;cursor:pointer;font-size:.85rem;color:var(--text-light);padding:2px 4px;line-height:1;transition:color .15s}
.btn-reset-item:hover{color:var(--danger)}

/* Order stats collapsible */
.os-group{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.os-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-light)}
.os-header:hover{background:rgba(255,255,255,.05)}
.os-title{font-weight:700;font-size:.95rem;color:var(--text)}
.os-arrow{font-size:.85rem;color:var(--text-light);transition:transform .3s}
.os-group.collapsed .os-arrow{transform:rotate(180deg)}
.os-group.collapsed .os-body{display:none}
.os-body{overflow-x:auto}
.os-subtotal{padding:10px 20px;text-align:right;font-weight:700;font-size:.9rem;border-top:1px solid var(--border-light);background:var(--bg)}
.money{font-size:1.1em;font-weight:700;font-family:var(--font-mono);letter-spacing:.5px}
.os-grand-total{padding:16px 20px;text-align:right;font-weight:700;font-size:1.05rem;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:12px}
.os-filters{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.os-filters input{padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem}
.os-filters .btn{font-size:.85rem}

/* Order confirm area */
.order-confirm-area{background:rgba(104,211,145,.08);border:2px solid var(--success);border-radius:var(--radius);padding:16px;margin-top:16px}
.order-confirm-area h3{margin-bottom:12px;color:var(--success);font-size:1rem}
.order-confirm-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:.9rem}
.order-confirm-item:last-child{border-bottom:none}
.order-confirm-actions{margin-top:12px;display:flex;gap:10px;justify-content:flex-end}

/* Background image - global: layered directly on body background */
/* Background image - page */
#mainContent{position:relative}
#mainContent{position:relative}
#mainContent.has-bg::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:var(--bg-url);background-size:cover;background-position:center;background-repeat:no-repeat;opacity:var(--bg-opacity,.15);z-index:0;pointer-events:none}
#mainContent.has-bg>*{position:relative;z-index:1}
/* Background image - sidebar */
.sidebar{position:relative}
.sidebar.has-bg::before{content:'';position:absolute;inset:0;background-image:var(--sidebar-bg-url);background-size:cover;background-position:center;background-repeat:no-repeat;opacity:var(--sidebar-bg-opacity,.15);z-index:0;pointer-events:none}
.sidebar.has-bg>*{position:relative;z-index:1}
/* Background settings nav item */
.nav-item-bg{margin-top:auto;border-top:1px solid var(--border)}
/* Bg setting modal */
.bg-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.bg-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.bg-section h4{margin-bottom:10px;font-size:.95rem}
.bg-preview-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.bg-preview-thumb{width:80px;height:50px;object-fit:cover;border-radius:6px;border:1px solid var(--border)}
.bg-opacity-row{display:flex;align-items:center;gap:10px;margin-top:6px}
.bg-opacity-row input[type=range]{flex:1;accent-color:var(--accent)}
.bg-opacity-row span{font-size:.82rem;color:var(--text-light);min-width:36px;text-align:right}
.cat-drag-item{cursor:grab;transition:opacity .2s;user-select:none}
.cat-drag-item:active{cursor:grabbing}
.cat-drag-item.dragging{opacity:.4}
.cat-drag-over{border-top:2px solid var(--accent)}
.sort-confirm-bar{position:sticky;bottom:0;background:rgba(251,211,141,.12);padding:12px;border-radius:8px;display:flex;gap:8px;justify-content:center;margin-top:12px}
.drag-handle{cursor:grab;font-size:1.2em;color:#999;padding:0 8px;letter-spacing:2px}
/* Tutorial page */
.tutorial-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.tutorial-card-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.tutorial-card-header:hover{background:var(--border-light)}
.tutorial-card-header h4{margin:0;font-size:.95rem;font-weight:600}
.tutorial-card-body{display:none;padding:16px 20px;border-top:1px solid var(--border-light)}
.tutorial-card.expanded .tutorial-card-body{display:block}
.tutorial-images{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.tutorial-images img{width:120px;height:90px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border);transition:transform .2s}
.tutorial-images img:hover{transform:scale(1.05)}
.tutorial-content{white-space:pre-wrap;line-height:1.6;font-size:.9rem;color:var(--text)}
/* Image lightbox */
.lightbox-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;align-items:center;justify-content:center;cursor:pointer}
.lightbox-overlay.show{display:flex}
.lightbox-overlay img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}
/* Usage hint */
.usage-hint{margin-bottom:16px}
.usage-hint-toggle{font-size:.82rem;color:var(--text-light);cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:4px}
.usage-hint-toggle:hover{color:var(--accent)}
.usage-hint-body{font-size:.8rem;color:var(--text-light);line-height:1.5;margin-top:6px;padding:8px 12px;background:var(--border-light);border-radius:var(--radius);display:none}
.usage-hint.open .usage-hint-body{display:block}

/* Bubble Home */
.home-section{min-height:100vh;position:relative;overflow-x:auto;overflow-y:hidden;padding:0;background:transparent;-webkit-overflow-scrolling:touch}
.bubble-container{position:relative;width:100vw;min-width:100vw;height:100vh}
.bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(255,255,255,.12);box-shadow:0 0 30px rgba(255,255,255,.04),inset 0 0 30px rgba(255,255,255,.02),0 4px 15px rgba(0,0,0,.2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);animation:float 6s ease-in-out infinite;text-decoration:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.bubble:hover,.bubble.active{transform:scale(1.2);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);box-shadow:0 0 50px rgba(255,255,255,.1),0 0 100px rgba(100,150,255,.08)}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes float2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-7px) rotate(-3deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(1deg)}50%{transform:translateY(-12px) rotate(-1deg)}}
.bubble.active{animation:none}
.bubble .bubble-icon{font-size:2rem;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));pointer-events:none}
.bubble .bubble-label{font-size:.78rem;font-weight:600;color:#fff;text-align:center;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.3);pointer-events:none}
.bubble-xlarge{width:min(32vw,22vh,170px);height:min(32vw,22vh,170px)}.bubble-xlarge .bubble-icon{font-size:2.8rem}.bubble-xlarge .bubble-label{font-size:.95rem}
.bubble-large{width:min(27vw,18vh,140px);height:min(27vw,18vh,140px)}.bubble-large .bubble-icon{font-size:2.3rem}.bubble-large .bubble-label{font-size:.85rem}
.bubble-medium{width:min(23vw,15vh,120px);height:min(23vw,15vh,120px)}.bubble-medium .bubble-icon{font-size:1.9rem}.bubble-medium .bubble-label{font-size:.78rem}
.bubble-small{width:min(19vw,12vh,100px);height:min(19vw,12vh,100px)}.bubble-small .bubble-icon{font-size:1.5rem}.bubble-small .bubble-label{font-size:.7rem}
/* User menu */
.user-menu{display:none;position:fixed;top:90px;right:12px;z-index:300;background:rgba(15,12,41,.97);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 16px;min-width:170px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.user-menu.open{display:block}
.user-menu-name{color:rgba(255,255,255,.7);font-size:.82rem;margin-bottom:10px;line-height:1.4}
/* Edit mode */
.edit-mode-bubble{cursor:move!important;animation:none!important;border-color:rgba(99,179,237,.7)!important;box-shadow:0 0 0 2px rgba(99,179,237,.4),0 0 20px rgba(99,179,237,.2)!important}
.edit-mode-bubble::after{content:'✥';position:absolute;bottom:5px;font-size:.55rem;color:rgba(99,179,237,.8)}
#logoBubble.edit-mode{background:rgba(99,179,237,.2)!important;border-color:rgba(99,179,237,.6)!important}
#editCancelBtn{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:300;background:rgba(30,27,60,.95);border:1px solid rgba(255,255,255,.2);color:var(--text-light);border-radius:20px;padding:8px 20px;cursor:pointer;font-size:.85rem;white-space:nowrap}
#editCancelBtn:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.content-section{min-height:100vh;padding:20px;background:transparent;display:none;scroll-margin-top:92px}
.content-section.active{display:block}
.back-home-btn{position:sticky;top:12px;z-index:50;background:#000;color:var(--text);border:1px solid rgba(255,255,255,.15);padding:8px 18px;border-radius:20px;cursor:pointer;font-size:.88rem;transition:all .2s;margin-bottom:12px}
.back-home-btn:hover{background:rgba(99,179,237,.15);border-color:var(--accent);color:var(--accent)}
.home-greeting{text-align:center;margin-bottom:8px;color:rgba(255,255,255,.5);font-size:.85rem;letter-spacing:1px}
@media(max-width:768px){
  .content-section{padding:12px;padding-bottom:20px}
}
@media(max-width:768px) and (orientation:portrait){
  .bubble-container{width:120vw;min-width:120vw;height:100vh}
  .bubble-xlarge{width:min(24vw,16vh);height:min(24vw,16vh)}.bubble-xlarge .bubble-icon{font-size:2rem}.bubble-xlarge .bubble-label{font-size:.8rem}
  .bubble-large{width:min(20vw,13vh);height:min(20vw,13vh)}.bubble-large .bubble-icon{font-size:1.7rem}.bubble-large .bubble-label{font-size:.72rem}
  .bubble-medium{width:min(17vw,11vh);height:min(17vw,11vh)}.bubble-medium .bubble-icon{font-size:1.45rem}.bubble-medium .bubble-label{font-size:.65rem}
  .bubble-small{width:min(13vw,8.5vh);height:min(13vw,8.5vh)}.bubble-small .bubble-icon{font-size:1.15rem}.bubble-small .bubble-label{font-size:.58rem}
  .user-menu{top:75px}
}
@media(max-width:1100px) and (orientation:landscape){
  .home-section{overflow:hidden}
  .bubble-container{width:100vw;min-width:100vw;height:100vh}
  .bubble-xlarge{width:min(14vw,20vh);height:min(14vw,20vh)}
  .bubble-xlarge .bubble-icon{font-size:1.5rem}.bubble-xlarge .bubble-label{font-size:.66rem}
  .bubble-large{width:min(12vw,17vh);height:min(12vw,17vh)}
  .bubble-large .bubble-icon{font-size:1.3rem}.bubble-large .bubble-label{font-size:.62rem}
  .bubble-medium{width:min(10vw,14vh);height:min(10vw,14vh)}
  .bubble-medium .bubble-icon{font-size:1.1rem}.bubble-medium .bubble-label{font-size:.58rem}
  .bubble-small{width:min(8vw,11vh);height:min(8vw,11vh)}
  .bubble-small .bubble-icon{font-size:.95rem}.bubble-small .bubble-label{font-size:.54rem}
  .user-menu{top:80px}
}
/* ── Light theme overrides ── */
body[data-theme="light"]{color:#2d3748}
body[data-theme="light"] .bubble-label{color:#2d3748}
body[data-theme="light"] .bubble{background:rgba(255,255,255,.85);box-shadow:0 4px 16px rgba(0,0,0,.15)}
body[data-theme="light"] .user-menu{background:rgba(255,255,255,.97);border-color:rgba(0,0,0,.15)}
body[data-theme="light"] .user-menu-name{color:#4a5568}
body[data-theme="light"] .modal{background:#fff;color:#2d3748}
body[data-theme="light"] .modal-header{border-color:rgba(0,0,0,.1)}
body[data-theme="light"] .confirm-box{background:#fff;color:#2d3748}
body[data-theme="light"] .card{color:#2d3748;background:rgba(255,255,255,.85);border-color:rgba(0,0,0,.15)}
body[data-theme="light"] .card-title{color:#2d3748;border-color:rgba(0,0,0,.15)}
body[data-theme="light"] .page-title{color:#2d3748}
body[data-theme="light"] th{color:#2d3748;background:rgba(0,0,0,.08)}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    try {
      const { data, error } = await withTimeout(sb.auth.exchangeCodeForSession(code));
      if (error) console.error('Code exchange error:', error);
    } catch(e) { console.error('Exchange error:', e); }
    history.replaceState(null, '', window.location.pathname);
  }
  if (window.location.hash && window.location.hash.includes('access_token')) {
    await withTimeout(sb.auth.getSession());
    history.replaceState(null, '', window.location.pathname);
  }
  const { data: { session } } = await withTimeout(sb.auth.getSession());
  if (session) {
    currentUser = session.user;
    await loadProfile();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      document.getElementById('loginLoading').style.display = 'block';
      await loadProfile();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null; userProfile = null; showLogin();
    } else if (event === 'TOKEN_REFRESHED' && session) {
      currentUser = session.user;
    }
  });

  // Auto refresh session when page becomes visible (after tab switch or phone wake)
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && currentUser) {
      try {
        await sb.auth.refreshSession();
      } catch(e) {
        console.warn('Session refresh failed:', e);
      }
    }
  });
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('waitingPage').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginLoading').style.display = 'none';
  // 自動填入記住的帳密
  const saved = localStorage.getItem('remembered_login');
  if (saved) {
    try {
      const { email, password } = JSON.parse(saved);
      document.getElementById('loginEmail').value = email || '';
      document.getElementById('loginPassword').value = password || '';
      document.getElementById('rememberMe').checked = true;
    } catch(e) {}
  }
}

async function doEmailLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { toast('請輸入信箱和密碼', 'error'); return; }
  document.getElementById('loginLoading').style.display = 'block';
  const { data, error } = await withTimeout(sb.auth.signInWithPassword({ email, password }));
  if (error) {
    toast('登入失敗: ' + error.message, 'error');
    document.getElementById('loginLoading').style.display = 'none';
    return;
  }
  // 記住帳密
  if (document.getElementById('rememberMe').checked) {
    localStorage.setItem('remembered_login', JSON.stringify({ email, password }));
  } else {
    localStorage.removeItem('remembered_login');
  }
}

    provider: 'custom:line',
    options: { redirectTo: window.location.origin + window.location.pathname, queryParams: { prompt: 'consent' } }
  }));
  if (error) { toast('登入失敗: ' + error.message, 'error'); document.getElementById('loginLoading').style.display = 'none'; }
}

function _suppressClick(e) { e.stopPropagation(); e.preventDefault(); }

function enterEditMode() {

    el.classList.add('edit-mode-bubble');
    el.style.touchAction = 'none';
    el.addEventListener('pointerdown',   _bubbleDragStart);
    el.addEventListener('pointermove',   _dragPointerMove);
    el.addEventListener('pointerup',     _dragPointerUp);
    el.addEventListener('pointercancel', _dragPointerUp);
    el.addEventListener('click', _suppressClick, true);
  });
  const w = window.innerWidth, h = window.innerHeight;
  const vp = (w < h && w <= 900) ? '直幅' : (w > h && h <= 500) ? '橫幅' : '電腦';

  document.getElementById('logoBubble').style.touchAction = 'manipulation';

async function saveLayoutAndExit() {
  const w = window.innerWidth, h = window.innerHeight;
  const isPortrait = w < h && w <= 900;
  const isLandscape = w > h && h <= 500;
  const viewport = isPortrait ? 'portrait' : isLandscape ? 'landscape' : 'desktop';
  const positions = {};
  document.querySelectorAll('#bubbleContainer .bubble').forEach(el => {
    if (el.dataset.page) positions[el.dataset.page] = { top: el.style.top, left: el.style.left };
  });
  const merged = { ...(window._customBubblePositions || {}) };
  merged[viewport] = positions;
  try {
    await withTimeout(sb.from('app_settings').upsert({ key: 'bubble_positions', value: merged, updated_at: new Date().toISOString() }));
    window._customBubblePositions = merged;
    toast('版面已儲存，所有人重整後生效', 'success');
  } catch(e) { toast('儲存失敗：' + e.message, 'error'); }
  exitEditMode();
}

// Bubble drag — Pointer Events + setPointerCapture (works on iOS/Android/desktop, no race conditions)
let _dragEl = null, _dragOX = 0, _dragOY = 0, _dragPid = null, _dragSX = 0, _dragSY = 0, _dragMoved = false;

function _dragPointerMove(e) {
  if (!_dragEl) return;
  if (!_dragMoved) {
    const dx = e.clientX - _dragSX, dy = e.clientY - _dragSY;
    if (Math.sqrt(dx*dx + dy*dy) < 6) return; // ignore tiny jitter
    _dragMoved = true;
  }
  const pr = _dragEl.parentElement.getBoundingClientRect();
  _dragEl.style.left = Math.max(0, Math.min((e.clientX - pr.left - _dragOX) / _dragEl.parentElement.offsetWidth  * 100, 96)).toFixed(1) + '%';
  _dragEl.style.top  = Math.max(0, Math.min((e.clientY - pr.top  - _dragOY) / _dragEl.parentElement.offsetHeight * 100, 96)).toFixed(1) + '%';
}
function _dragPointerUp(e) {
  if (!_dragEl) return;
  const el = _dragEl, moved = _dragMoved;
  try { el.releasePointerCapture(e.pointerId); } catch(_) {}
  el.style.transition = '';
  el.style.animationName = '';
  _dragEl = null; _dragPid = null; _dragMoved = false;
  // Logo bubble tapped (not dragged) in edit mode → save
  if (!moved && el.dataset.page === 'system-logo') saveLayoutAndExit();
}
function _bubbleDragStart(e) {
  if (!editMode) return;
  e.preventDefault();
  if (_dragEl) _dragPointerUp({ pointerId: _dragPid });
  const el = e.currentTarget;
  _dragEl = el; _dragPid = e.pointerId; _dragMoved = false;
  _dragSX = e.clientX; _dragSY = e.clientY;
  el.setPointerCapture(e.pointerId);
  el.style.transition = 'none';
  el.style.animationName = 'none';
  const r = el.getBoundingClientRect();
  _dragOX = e.clientX - r.left;
  _dragOY = e.clientY - r.top;
}
// Keep _dragEnd as alias for exitEditMode cleanup
function _dragEnd() { _dragPointerUp({ pointerId: _dragPid }); }

async function loadProfile() {
  const { data, error } = await withTimeout(sb.from('user_profiles').select('*, roles(*)').eq('id', currentUser.id).single());
  if (error && error.code === 'PGRST116') {
    const meta = currentUser.user_metadata || {};
    const displayName = meta.full_name || meta.name || meta.preferred_username || currentUser.email || '新使用者';
    const lineId = meta.provider_id || meta.sub || '';
    const { data: newP, error: e2 } = await withTimeout(sb.from('user_profiles').insert({
      id: currentUser.id, display_name: displayName, role: 'clinic_manager', line_user_id: lineId, is_active: true
    }).select().single());
    if (e2) { toast('建立個人資料失敗: ' + e2.message, 'error'); showLogin(); return; }
    userProfile = newP;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('waitingPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  if (error) { toast('載入資料失敗: ' + error.message, 'error'); showLogin(); return; }
  userProfile = data;
  // Sync avatar from Supabase to localStorage
  if (data.avatar_url) localStorage.setItem('user_avatar', data.avatar_url);
  else localStorage.removeItem('user_avatar');
  // Update line_user_id if missing (for users who registered before this field was added)
  if (!data.line_user_id) {
    const meta = currentUser.user_metadata || {};
    const lineId = (currentUser.identities || []).find(i => i.provider === 'line')?.id
      || meta.provider_id || meta.sub || '';
    if (lineId) {
      await withTimeout(sb.from('user_profiles').update({ line_user_id: lineId }).eq('id', currentUser.id));
      userProfile.line_user_id = lineId;
    }
  }
  if (!data.is_active) { toast('您的帳號已被停用', 'error'); await withTimeout(sb.auth.signOut()); showLogin(); return; }
  if (data.role === 'clinic_manager' && !data.clinic_id) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('waitingPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  await enterApp();
}

}

function roleLabel(roleStr, roleId) {
  if (roleId) {
    const role = allRoles.find(r => r.id === roleId);
    if (role) return role.display_name;
  }
  return { owner: '系統管理員', admin: '總管理者', clinic_manager: '診所管理者' }[roleStr] || roleStr;
}

function canEditOwned(createdBy) { return !!(currentUser && createdBy === currentUser.id); }

function hasPermission(perm) {
  if (!userProfile) return false;
  if (userProfile.role_id) {
    const role = userProfile.roles || allRoles.find(r => r.id === userProfile.role_id);
    if (role && role.permissions) {
      const perms = typeof role.permissions === 'string' ? JSON.parse(role.permissions) : role.permissions;
      // Support both object {"all":true,"manage_orders":true} and array ["perm1","perm2"]
      if (Array.isArray(perms)) return perms.includes(perm);
      if (typeof perms === 'object') return perms.all === true || perms[perm] === true;
    }
  }
  // Fallback: old role field when role_id is null
  const r = userProfile.role;
  if (r === 'owner') return true;
  if (r === 'admin') return !['manage_users', 'manage_roles'].includes(perm);
  return ['daily_changes', 'create_orders', 'receive_orders'].includes(perm);
}

function isSystemAdmin() {
  if (!userProfile) return false;
  if (userProfile.role_id) {
    const role = userProfile.roles || allRoles.find(r => r.id === userProfile.role_id);
    return !!(role && role.is_system);
  }
  return userProfile.role === 'owner';
}

function isOwner() { return isSystemAdmin(); }
function isAdmin() { return hasPermission('manage_orders'); }
function isManager() { return !hasPermission('manage_orders'); }
function canSeeAdmin() { return hasPermission('view_all_inventory'); }
function canSeePrice() { return hasPermission('view_prices'); }

function clinicName(id) { return allClinics.find(c => c.id === id)?.name || '-'; }
function categoryName(id) { return allCategories.find(c => c.id === id)?.name || '-'; }
function supplierName(id) { return allSuppliers.find(s => s.id === id)?.name || '-'; }
function materialName(id) { return allMaterials.find(m => m.id === id)?.name || '-'; }
function materialObj(id) { return allMaterials.find(m => m.id === id); }
function userName(id) { return allUsers.find(u => u.id === id)?.display_name || '-'; }
function matItemType(m) {
  if (!m?.category_id) return 'consumable';
  return allCategories.find(c => c.id === m.category_id)?.item_type || 'consumable';
}
function groupMatsByCat(mats) {
  const groups = {};
  const catOrder = allCategories.map(c => c.id);
  mats.forEach(m => {
    const cid = m.category_id || 0;
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push(m);
  });
  // Sort group keys by category order
  const sorted = [];
  catOrder.forEach(cid => { if (groups[cid]) sorted.push({ catId: cid, catName: categoryName(cid), mats: groups[cid] }); });
  if (groups[0]) sorted.push({ catId: 0, catName: '未分類', mats: groups[0] });
  return sorted;
}

function layoutBubbles() {
  const w = window.innerWidth, h = window.innerHeight;
  const isPortrait = w < h && w <= 900;
  const isLandscape = w > h && h <= 500;
  const viewport = isPortrait ? 'portrait' : isLandscape ? 'landscape' : 'desktop';
  const custom = window._customBubblePositions?.[viewport];
  document.querySelectorAll('#bubbleContainer .bubble').forEach(el => {
    const id = el.dataset.page;
    if (custom && custom[id]) {
      el.style.top = custom[id].top;
      el.style.left = custom[id].left;
    } else if (isPortrait) {
      el.style.top = el.dataset.pt;
      el.style.left = el.dataset.pl;
    } else if (isLandscape) {
      el.style.top = el.dataset.lt;
      el.style.left = el.dataset.ll;
    } else {
      el.style.top = el.dataset.top;
      el.style.left = el.dataset.left;
    }
  });
}


window.addEventListener('resize', () => {
  clearTimeout(window._layoutTimer);

});

function navigateToBubble(pageId) {
  if (pageId === 'customize') { openBgSettingModal(); return; }
  // Highlight active bubble
  document.querySelectorAll('.bubble').forEach(b => b.classList.remove('active'));
  const activeBubble = document.querySelector(`.bubble[data-page="${pageId}"]`);
  if (activeBubble) activeBubble.classList.add('active');
  // Show content section and scroll to it
  document.getElementById('contentArea').classList.add('active');
  document.getElementById('contentArea').scrollIntoView({ behavior: 'smooth' });
  // Render content
  navigateTo(pageId);
}

function scrollToHome() {
  document.getElementById('home').scrollIntoView({ behavior: 'smooth' });
  document.querySelectorAll('.bubble').forEach(b => b.classList.remove('active'));
  document.getElementById('contentArea').classList.remove('active');
}

// Scroll detection: update active bubble based on scroll position
(function() {
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const contentArea = document.getElementById('contentArea');
        if (!contentArea) { ticking = false; return; }
        const rect = contentArea.getBoundingClientRect();
        // If content area is mostly out of view (scrolled back to home), deactivate
        if (rect.top > window.innerHeight * 0.8) {
          document.querySelectorAll('.bubble').forEach(b => b.classList.remove('active'));
        }
        ticking = false;
      });
      ticking = true;
    }
  });
})();

async function navigateTo(pageId) {
  currentPage = pageId;
  hideFloatPanel();
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent)"></div></div>';
  const renderers = {
    // 直接頁面（新）
    'daily-change':     renderDailyChange,
    'ordering':         renderOrdering,
    'receiving':        renderReceiving,
    'order-list':       renderOrderMgmt,
    'order-summary':    renderOrderMgmt,
    'rush-mgmt':        renderOrderMgmt,
    'admin-suppliers':  renderAdminMgmt,
    'admin-materials':  renderAdminMgmt,
    'admin-categories': renderAdminMgmt,
    'admin-clinics':    renderAdminMgmt,
    'order-stats':      renderAdminMgmt,
    'user-list':        renderUserMgmt,
    'role-mgmt':        renderUserMgmt,
    // 原有頁面
    'stock-overview':   renderStockOverview,
    'account-settings': renderAccountSettings,
    'notify-settings':  renderNotifySettings,
    'tutorials':        () => renderTutorials(mc),
    // 保留舊路由（內部呼叫用）
    'material-mgmt': renderMaterialMgmt,
    'order-mgmt':    renderOrderMgmt,
    'admin-mgmt':    renderAdminMgmt,
    'user-mgmt':     renderUserMgmt,
  };
  const fn = renderers[pageId];
  if (fn) {
    try {
      await fn();
    } catch(e) {
      mc.innerHTML = '<div style="padding:20px;text-align:center;color:var(--danger)">載入失敗：' + e.message + '<br><button onclick="navigateTo(currentPage)" class="btn btn-primary" style="margin-top:12px">重試</button></div>';
    }
  } else {
    mc.innerHTML = '<div class="empty-state"><span>🚧</span>頁面建置中</div>';
  }
  // After render completes, apply bg
  applyPageBg(pageId);
}

// ===================== UTILS =====================
async function withTimeout(promise, ms = 20000) {
  const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("請求逾時")), ms));
  return Promise.race([promise, timeout]);
}

function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(60px) scale(.9)'; setTimeout(() => t.remove(), 400); }, 3000);
}

function openModal(title, bodyHtml, footerHtml = '') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function showConfirm(title, msg) {
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').innerHTML = msg;
    document.getElementById('confirmOverlay').classList.add('show');
  });
}
function closeConfirm(result) {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
}

function applyColorTheme(id, save = true) {
  const t = COLOR_THEMES[id] || COLOR_THEMES.default;
  // Disable transitions during theme switch for instant change
  document.documentElement.classList.add('no-transition');
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-hover', t.accentHover);
  r.setProperty('--primary', t.primary);
  r.setProperty('--primary-light', t.primaryLight);
  r.setProperty('--primary-dark', t.primaryDark);
  r.setProperty('--text', t.text);
  r.setProperty('--text-light', t.textLight);
  r.setProperty('--card', t.card);
  r.setProperty('--border', t.border);
  document.body.style.backgroundColor = t.body;
  document.body.dataset.theme = id;
  if (save) localStorage.setItem('color_theme', id);
  // Re-apply background image with theme-aware overlay
  applyGlobalBg();
  // Re-enable transitions after paint
  requestAnimationFrame(() => { requestAnimationFrame(() => { document.documentElement.classList.remove('no-transition'); }); });
  // Update swatch borders in modal if open
  Object.keys(COLOR_THEMES).forEach(tid => {
    const sw = document.getElementById('theme-swatch-' + tid);
    if (sw) sw.style.borderColor = tid === id ? t.accent : 'transparent';
  });
}

function loadColorTheme() {

async function compressBgImageToDataUrl(file) {
  const canvas = document.createElement('canvas');
  const img = new Image();
  const src = await new Promise(r => { const fr = new FileReader(); fr.onload = ev => r(ev.target.result); fr.readAsDataURL(file); });
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = src; });
  const MAX = 1280;
  let w = img.width, h = img.height;
  if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.65);
}

async function compressBgImage(file) {
  const canvas = document.createElement('canvas');
  const img = new Image();
  const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(file); });
  await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = dataUrl; });
  const MAX = 1920;
  let w = img.width, h = img.height;
  if (w > MAX || h > MAX) { const ratio = Math.min(MAX / w, MAX / h); w = Math.round(w * ratio); h = Math.round(h * ratio); }
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  const compressed = canvas.toDataURL('image/jpeg', 0.8);
  return await (await fetch(compressed)).blob();
}

let _cachedBgUrl = null, _cachedBgBlob = null;
function applyGlobalBg() {
  const url = localStorage.getItem('bg_global');
  const opacity = parseInt(localStorage.getItem('bg_opacity_global') || '30', 10);
  if (url) {
    // Cache blob URL to avoid re-parsing large data URLs
    if (url !== _cachedBgUrl) {
      if (_cachedBgBlob) URL.revokeObjectURL(_cachedBgBlob);
      try {
        const byteString = atob(url.split(',')[1]);
        const mime = url.split(',')[0].split(':')[1].split(';')[0];
        const ab = new ArrayBuffer(byteString.length);
        const ia = new Uint8Array(ab);
        for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
        _cachedBgBlob = URL.createObjectURL(new Blob([ab], { type: mime }));
      } catch(e) { _cachedBgBlob = url; }
      _cachedBgUrl = url;
    }
    const bgUrl = _cachedBgBlob || url;
    const o = ((100 - opacity) / 100).toFixed(2);
    const isLight = document.body.dataset.theme === 'light';
    const lo = Math.max(0, o * 0.4).toFixed(2);
    const overlay = isLight
      ? `linear-gradient(135deg,rgba(255,255,255,${lo}) 0%,rgba(255,255,255,${lo}) 100%)`
      : `linear-gradient(135deg,rgba(15,12,41,${o}) 0%,rgba(48,43,99,${o}) 50%,rgba(36,36,62,${o}) 100%)`;
    document.body.style.backgroundImage = `${overlay},url(${bgUrl})`;
    document.body.style.backgroundSize = 'auto,100% auto';
    document.body.style.backgroundPosition = 'center,center top';
    document.body.style.backgroundAttachment = 'scroll,scroll';
    document.body.style.backgroundRepeat = 'repeat,repeat-y';
    document.body.classList.add('has-bg');
  } else {
    document.body.style.backgroundImage = '';
    document.body.style.backgroundSize = '';
    document.body.style.backgroundPosition = '';
    document.body.style.backgroundAttachment = '';
    document.body.style.backgroundRepeat = '';
    document.body.classList.remove('has-bg');
  }
}

let _avatarImg = null, _avatarOx = 0, _avatarOy = 0, _avatarScale = 1, _avatarRot = 0, _avatarDrag = null;

async function setUserAvatar(input) {
  const file = input.files[0];
  if (!file) return;

  _avatarImg.onload = () => {
    _avatarOx = 0; _avatarOy = 0; _avatarScale = 1; _avatarRot = 0;
    // Fit image to circle
    _avatarScale = Math.max(200 / _avatarImg.width, 200 / _avatarImg.height);
    openAvatarEditor();
  };
  _avatarImg.src = URL.createObjectURL(file);
}

function openAvatarEditor() {
  const overlay = document.createElement('div');
  overlay.id = 'avatarEditorOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
  overlay.innerHTML = `
    <div style="color:#e2e8f0;font-size:.9rem;margin-bottom:4px">拖曳移動・滾輪縮放・滑桿旋轉</div>
    <div style="width:200px;height:200px;border-radius:50%;overflow:hidden;border:3px solid var(--accent,#63b3ed);cursor:grab;position:relative" id="avatarFrame">
      <canvas id="avatarCanvas" width="200" height="200" style="display:block"></canvas>
    </div>
    <div style="display:flex;gap:10px;align-items:center;color:#a0aec0;font-size:.82rem">
      <label>旋轉</label>
      <input type="range" id="avatarRotSlider" value="0" min="-180" max="180" style="width:120px" oninput="_avatarRot=parseInt(this.value);drawAvatarCanvas()">
      <span id="avatarRotVal">0°</span>
      <label style="margin-left:8px">縮放</label>
      <input type="range" id="avatarScaleSlider" value="100" min="20" max="400" style="width:120px" oninput="_avatarScale=parseInt(this.value)/100*Math.max(200/_avatarImg.width,200/_avatarImg.height);drawAvatarCanvas()">
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-ghost" onclick="closeAvatarEditor()">取消</button>
      <button class="btn btn-primary" onclick="saveAvatarFromEditor()">✅ 確認</button>
    </div>`;
  document.body.appendChild(overlay);

  const frame = document.getElementById('avatarFrame');
  frame.onpointerdown = e => { _avatarDrag = { sx: e.clientX, sy: e.clientY, ox: _avatarOx, oy: _avatarOy }; frame.setPointerCapture(e.pointerId); };
  frame.onpointermove = e => { if (!_avatarDrag) return; _avatarOx = _avatarDrag.ox + (e.clientX - _avatarDrag.sx); _avatarOy = _avatarDrag.oy + (e.clientY - _avatarDrag.sy); drawAvatarCanvas(); };
  frame.onpointerup = () => { _avatarDrag = null; };
  frame.onwheel = e => { e.preventDefault(); const d = e.deltaY > 0 ? -0.05 : 0.05; _avatarScale = Math.max(0.1, _avatarScale + d * _avatarScale); const sl = document.getElementById('avatarScaleSlider'); if (sl) sl.value = Math.round(_avatarScale / Math.max(200/_avatarImg.width, 200/_avatarImg.height) * 100); drawAvatarCanvas(); };

  drawAvatarCanvas();
}

function drawAvatarCanvas() {
  const canvas = document.getElementById('avatarCanvas');
  if (!canvas || !_avatarImg) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 200, 200);
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, 200, 200);
  ctx.save();
  ctx.translate(100 + _avatarOx, 100 + _avatarOy);
  ctx.rotate(_avatarRot * Math.PI / 180);
  ctx.scale(_avatarScale, _avatarScale);
  ctx.drawImage(_avatarImg, -_avatarImg.width / 2, -_avatarImg.height / 2);
  ctx.restore();
  const rv = document.getElementById('avatarRotVal');
  if (rv) rv.textContent = _avatarRot + '°';
}

function closeAvatarEditor() {
  const ol = document.getElementById('avatarEditorOverlay');
  if (ol) ol.remove();
  if (_avatarImg?.src?.startsWith('blob:')) URL.revokeObjectURL(_avatarImg.src);
}

async function saveAvatarFromEditor() {
  const canvas = document.getElementById('avatarCanvas');
  if (!canvas) return;
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  localStorage.setItem('user_avatar', dataUrl);
  // Save to Supabase user_profiles

function applyUserAvatar() {

  const bubble = document.getElementById('userBubble');
  const el = document.getElementById('userBubbleIcon');

function usageHint(pageId) {
  const hints = {
    'stock-overview': '查看各診所各品項的庫存量，紅色表示低於安全庫存。點擊類別可收合/展開。',
    'daily-change': '調整品項數量，正數為入庫，負數為消耗。調好後按確定送出。',
    'ordering': '選擇需要的品項和數量，加入叫貨清單後送出。',
    'order-mgmt': '管理所有叫貨單，可確認、出貨、取消。叫貨總覽查看彙總。',
    'receiving': '確認已到貨的品項，可個別或全部收貨。',
    'admin-mgmt': '管理診所、廠商、品項、類別資料。',
    'user-mgmt': '管理系統使用者和角色權限。'
  };
  const text = hints[pageId];
  if (!text) return '';
  const lsKey = 'hint_open_' + pageId;
  const isOpen = localStorage.getItem(lsKey) === '1';
  return `<div class="usage-hint ${isOpen ? 'open' : ''}" id="usageHint_${pageId}">
    <div class="usage-hint-toggle" onclick="toggleUsageHint('${pageId}')">💡 使用說明 <span style="font-size:.7rem">${isOpen ? '▼' : '▶'}</span></div>
    <div class="usage-hint-body">${text}</div>
  </div>`;
}

function toggleUsageHint(pageId) {
  const el = document.getElementById('usageHint_' + pageId);
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  localStorage.setItem('hint_open_' + pageId, isOpen ? '1' : '0');
  const arrow = el.querySelector('.usage-hint-toggle span');
  if (arrow) arrow.textContent = isOpen ? '▼' : '▶';
}

// Float panel
function showFloatPanel(mode, title) {
  floatPanelMode = mode;
  const fp = document.getElementById('floatPanel');
  fp.style.display = 'block';
  fp.classList.remove('collapsed');
  updateFloatPanel();
}
function hideFloatPanel() {
  document.getElementById('floatPanel').style.display = 'none';
  floatPanelItems = [];
  floatPanelMode = '';
}
function toggleFloatPanel() {
  document.getElementById('floatPanel').classList.toggle('collapsed');
  document.getElementById('floatPanelArrow').textContent =
    document.getElementById('floatPanel').classList.contains('collapsed') ? '▲' : '▼';
}

function updateFloatPanel() {
  const titleEl = document.getElementById('floatPanelTitle');
  const bodyEl = document.getElementById('floatPanelBody');
  const actEl = document.getElementById('floatPanelActions');
  const fp = document.getElementById('floatPanel');

  if (floatPanelItems.length === 0) {
    fp.classList.add('collapsed');
  }

  if (floatPanelMode === 'daily') {
    titleEl.textContent = `變動清單 (${floatPanelItems.length})`;
    bodyEl.innerHTML = floatPanelItems.length === 0
      ? '<div style="padding:12px;color:var(--text-light);text-align:center">尚無變動項目</div>'
      : floatPanelItems.map((it, i) => `
        <div class="float-panel-item">
          <div class="item-info">
            <strong>${escHtml(it.name)}</strong>
            <span style="color:${it.changeType === 'in' ? 'var(--success)' : 'var(--danger)'}">
              ${it.changeType === 'in' ? '+' : '-'}${it.quantity}
            </span>
          </div>
          <button class="btn btn-danger btn-xs" onclick="removeFloatItem(${i})">✕</button>
        </div>`).join('');
    actEl.innerHTML = floatPanelItems.length > 0
      ? `<button class="btn btn-ghost btn-sm" onclick="floatPanelItems=[];updateFloatPanel()">清空</button>
         <button class="btn btn-primary btn-sm" onclick="submitDailyChanges()">確認送出</button>`
      : '';
  } else if (floatPanelMode === 'order') {
    titleEl.textContent = `叫貨清單 (${floatPanelItems.length})`;
    bodyEl.innerHTML = floatPanelItems.length === 0
      ? '<div style="padding:12px;color:var(--text-light);text-align:center">尚無叫貨項目</div>'
      : floatPanelItems.map((it, i) => `
        <div class="float-panel-item">
          <div class="item-info">
            <strong>${escHtml(it.name)}</strong>
            <span> x${it.quantity}</span>
          </div>
          <div class="item-qty">
            <button class="btn btn-ghost btn-xs" onclick="floatItemQty(${i},-1)">-</button>
            <span>${it.quantity}</span>
            <button class="btn btn-ghost btn-xs" onclick="floatItemQty(${i},1)">+</button>
            <button class="btn btn-danger btn-xs" onclick="removeFloatItem(${i})">✕</button>
          </div>
        </div>`).join('');
    actEl.innerHTML = floatPanelItems.length > 0
      ? `<button class="btn btn-ghost btn-sm" onclick="floatPanelItems=[];updateFloatPanel()">清空</button>
         <button class="btn btn-primary btn-sm" onclick="submitOrdering()">送出叫貨</button>`
      : '';
  }
}

function removeFloatItem(idx) {

async function renderStockOverview() {
  const mc = document.getElementById('mainContent');
  await Promise.all([loadClinics(), loadCategories(), loadMaterials()]);
  const { data: inv } = await withTimeout(sb.from('clinic_inventory').select('*'));
  const clinicsToShow = canSeeAdmin() ? allClinics : allClinics.filter(c => c.id === userProfile.clinic_id);
  const invMap = {};
  (inv || []).forEach(i => { invMap[`${i.clinic_id}_${i.material_id}`] = i; });

  const filteredMats = allMaterials.filter(m => matItemType(m) === window._stockViewType);
  const matsByCat = {};
  filteredMats.forEach(m => {
    const catId = m.category_id || 0;
    if (!matsByCat[catId]) matsByCat[catId] = [];
    matsByCat[catId].push(m);
  });

  const typeTabHtml = `<div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-sm ${window._stockViewType==='consumable'?'btn-primary':'btn-ghost'}" onclick="window._stockViewType='consumable';renderStockOverview()">耗材</button>
    <button class="btn btn-sm ${window._stockViewType==='equipment'?'btn-primary':'btn-ghost'}" onclick="window._stockViewType='equipment';renderStockOverview()">非耗材</button>
  </div>`;
  let html = `<div class="page-title">📊 庫存總覽 <span class="help-tip">!<span class="help-text">紅色表示庫存低於安全值。安全庫存可在品項下方調整。</span></span></div>${usageHint('stock-overview')}${typeTabHtml}`;
  for (const catId of Object.keys(matsByCat)) {
    const catName = catId == 0 ? '未分類' : categoryName(parseInt(catId));
    const mats = matsByCat[catId];
    const scId = 'stockCat_' + catId;
    html += `<div class="card" style="overflow:hidden">
      <div class="card-title" style="cursor:pointer;user-select:none" onclick="const b=document.getElementById('${scId}');const open=b.style.display!=='none';b.style.display=open?'none':'block';this.querySelector('.sc-arrow').textContent=open?'▶':'▼';if(open)window._collapsedCategories.add('${catId}');else window._collapsedCategories.delete('${catId}')">
        ${escHtml(catName)} <span class="sc-arrow" style="font-size:.8rem;margin-left:6px">▼</span>
      </div>
      <div id="${scId}"><div class="table-wrap"><table style="min-width:max-content">
      <thead><tr><th style="white-space:nowrap">品項</th>${clinicsToShow.map(c => `<th style="white-space:nowrap;min-width:60px">${escHtml(c.name)}</th>`).join('')}<th style="white-space:nowrap">總計</th></tr></thead><tbody>`;
    const canSetSafety = hasPermission('manage_orders');
    mats.forEach(m => {
      let total = 0;
      const cells = clinicsToShow.map(c => {
        const rec = invMap[`${c.id}_${m.id}`];
        const stock = rec ? rec.current_stock : 0;
        const safety = rec ? rec.safety_stock : (m.default_safety_stock ?? 5);
        total += stock;
        const cls = stock <= safety ? 'stock-danger' : '';
        return `<td class="${cls}">${stock}</td>`;
      }).join('');
      html += `<tr><td><strong>${escHtml(m.name)}</strong><br><small class="text-muted">${escHtml(m.spec || '')} ${escHtml(m.unit)}</small></td>${cells}<td><strong>${total}</strong></td></tr>`;
      if (canSetSafety) {
        const globalVal = m.default_safety_stock ?? 5;
        const clinicCells = clinicsToShow.map(c => {
          const rec = invMap[`${c.id}_${m.id}`];
          const val = rec?.safety_stock ?? '';
          return `<td style="padding:2px 4px"><input type="number" min="0" value="${val}" placeholder="${globalVal}" style="width:52px;padding:2px 4px;font-size:.75rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:4px;color:inherit;text-align:center" onblur="saveClinicSafety(${c.id},${m.id},this.value,${globalVal})"></td>`;
        }).join('');
        html += `<tr style="background:rgba(255,200,0,.06)"><td style="padding:2px 6px;font-size:.75rem;color:var(--text-light)">安全庫存 <input type="number" min="0" value="${globalVal}" style="width:52px;padding:2px 4px;font-size:.75rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,200,0,.4);border-radius:4px;color:inherit;text-align:center" onblur="saveGlobalSafety(${m.id},this.value,this)"></td>${clinicCells}<td></td></tr>`;
      }
    });
    html += '</tbody></table></div></div></div>';
  }
  if (Object.keys(matsByCat).length === 0) {
    html += '<div class="card"><div class="empty-state"><span>📦</span>尚無品項資料</div></div>';
  }
  mc.innerHTML = html;

  // 恢復收合狀態
  for (const cid of window._collapsedCategories) {
    const b = document.getElementById('stockCat_' + cid);
    if (b) {
      b.style.display = 'none';
      const arrow = b.parentElement.querySelector('.sc-arrow');
      if (arrow) arrow.textContent = '▶';
    }
  }
}

async function saveGlobalSafety(materialId, value, inputEl) {
  const v = parseInt(value);
  if (isNaN(v) || v < 0) return;
  const { error } = await withTimeout(sb.from('materials').update({ default_safety_stock: v }).eq('id', materialId));
  if (error) { toast('儲存失敗：' + error.message, 'error'); return; }
  // Update in-memory
  const mat = allMaterials.find(m => m.id === materialId);
  if (mat) mat.default_safety_stock = v;
  // Update placeholder values in sibling per-clinic inputs in same row
  if (inputEl) {
    const row = inputEl.closest('tr');
    if (row) row.querySelectorAll('input[type="number"]').forEach(inp => { if (inp !== inputEl) inp.placeholder = v; });
  }
  toast('全診所預設安全庫存已更新');
}

async function saveClinicSafety(clinicId, materialId, value, globalDefault) {
  const raw = value.trim();
  const v = raw === '' ? globalDefault : parseInt(raw);
  if (isNaN(v) || v < 0) return;
  const { error } = await withTimeout(sb.from('clinic_inventory').upsert({
    clinic_id: clinicId, material_id: materialId, safety_stock: v
  }, { onConflict: 'clinic_id,material_id' }));
  if (error) { toast('儲存失敗：' + error.message, 'error'); return; }
  toast('安全庫存已更新');
}

window.adjDailyQty = function(matId, delta) {
  const el = document.getElementById('daily_' + matId);
  if (!el) return;
  const val = parseInt(el.value || 0) + delta;
  el.value = val;

};

window.resetDailyQty = function(matId) {

  updateDailySubmitBar();

window.clearAllDailyQty = function() {

  });

function getDailyChangedItems() {

}

function updateDailySubmitBar() {

  const bodyEl = document.getElementById('dailyPanelBody');

window.toggleDailyPanel = function() {

};

window.filterDailyItems = function(q) {

  document.querySelectorAll(selector).forEach(el => {
    const name = el.dataset.name || '';
