<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牙材集中採購管理系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a365d;--primary-light:#2a4a7f;--primary-dark:#0f2440;
  --accent:#3182ce;--accent-hover:#2b6cb0;
  --danger:#e53e3e;--danger-bg:#fff5f5;--danger-hover:#c53030;
  --success:#38a169;--success-hover:#2f855a;
  --warning:#dd6b20;--warning-hover:#c05621;
  --bg:#f7fafc;--card:#fff;--text:#2d3748;--text-light:#718096;--text-lighter:#a0aec0;
  --border:#e2e8f0;--border-light:#edf2f7;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--primary),var(--primary-light))}
.login-card{background:var(--card);border-radius:16px;padding:48px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);max-width:400px;width:90%}
.login-card h1{font-size:1.8rem;color:var(--primary);margin-bottom:8px}
.login-card p{color:var(--text-light);margin-bottom:32px}
.login-logo{font-size:3rem;margin-bottom:16px}
.btn-line{background:#06C755;color:#fff;border:none;padding:14px 32px;border-radius:var(--radius);font-size:1.1rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:background .2s;width:100%;justify-content:center}
.btn-line:hover{background:#05a648}
.login-loading{display:none;text-align:center;padding:40px;color:#fff;font-size:1.1rem}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.waiting-msg{background:#fefcbf;color:#744210;padding:20px;border-radius:var(--radius);margin-top:20px;line-height:1.6}

/* App Shell */
.app{display:none}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:12px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{font-size:1.2rem;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:12px}
.header-user{font-size:.85rem;opacity:.9}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:.85rem}
.btn-logout:hover{background:rgba(255,255,255,.25)}

.app-body{display:flex;max-width:1400px;margin:0 auto;min-height:calc(100vh - 56px)}
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:12px 0;flex-shrink:0}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:.92rem;color:var(--text);transition:all .15s;border-left:3px solid transparent}
.sidebar .nav-item:hover{background:var(--border-light);color:var(--accent)}
.sidebar .nav-item.active{background:#ebf8ff;color:var(--accent);border-left-color:var(--accent);font-weight:600}
.sidebar .nav-section{font-size:.75rem;color:var(--text-lighter);text-transform:uppercase;padding:16px 20px 6px;letter-spacing:.5px;font-weight:600}
.content{flex:1;padding:20px;overflow-y:auto;min-width:0}

/* Bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:4px 0 env(safe-area-inset-bottom)}
.bottom-nav-inner{display:flex;justify-content:space-around}
.bottom-nav .bnav-item{display:flex;flex-direction:column;align-items:center;padding:6px 4px;font-size:.65rem;color:var(--text-light);cursor:pointer;min-width:0;flex:1}
.bottom-nav .bnav-item.active{color:var(--accent)}
.bottom-nav .bnav-item span:first-child{font-size:1.3rem;margin-bottom:2px}
.bottom-nav .bnav-more{position:relative}
.more-menu{display:none;position:absolute;bottom:100%;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 -4px 12px rgba(0,0,0,.1);min-width:160px;padding:6px 0;margin-bottom:8px}
.more-menu.show{display:block}
.more-menu .mm-item{padding:10px 16px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:8px}
.more-menu .mm-item:hover{background:var(--border-light)}

@media(max-width:768px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  .content{padding:12px;padding-bottom:80px}
  .app-body{min-height:calc(100vh - 56px - 60px)}
  .header h1{font-size:1rem}
}

/* Common */
.page-title{font-size:1.3rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:.92rem;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(49,130,206,.1)}
.btn{padding:10px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-size:.88rem;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:var(--success-hover)}
.btn-warning{background:var(--warning);color:#fff}.btn-warning:hover{background:var(--warning-hover)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-hover)}
.btn-ghost{background:transparent;color:var(--text-light);border:1px solid var(--border)}.btn-ghost:hover{background:var(--border-light)}
.btn-sm{padding:6px 12px;font-size:.82rem}
.btn-xs{padding:4px 8px;font-size:.78rem}
.btn[disabled]{opacity:.5;pointer-events:none}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-title{font-size:1.05rem;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:var(--border-light);padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap;position:sticky;top:0}
td{padding:10px 12px;border-bottom:1px solid var(--border-light)}
tr:hover td{background:#fafcff}
.stock-danger{background:var(--danger-bg);color:var(--danger);font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:500}
.badge-pending{background:#fefcbf;color:#744210}
.badge-confirmed{background:#c6f6d5;color:#22543d}
.badge-shipped{background:#bee3f8;color:#2a4365}
.badge-delivered{background:#e9d8fd;color:#44337a}
.badge-cancelled{background:#fed7d7;color:#9b2c2c}
.text-danger{color:var(--danger)}.text-success{color:var(--success)}.text-muted{color:var(--text-light)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state span{font-size:2.5rem;display:block;margin-bottom:12px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:12px 12px 0 0}
.modal-header h3{font-size:1.1rem}
.modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text-light);padding:4px}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.85rem;font-weight:500;margin-bottom:5px;color:var(--text)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.92rem;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(49,130,206,.1)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:6px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .15s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;color:var(--primary)}
.stat-card .stat-label{font-size:.82rem;color:var(--text-light);margin-top:4px}

/* Toast */
.toast-container{position:fixed;top:72px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius);color:#fff;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease;max-width:360px}
.toast-success{background:var(--success)}.toast-error{background:var(--danger)}.toast-info{background:var(--accent)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* Confirm */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border-radius:12px;padding:24px;max-width:400px;width:100%;text-align:center}
.confirm-box h3{margin-bottom:12px}
.confirm-box p{color:var(--text-light);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}

.img-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border)}
.img-upload-preview{max-width:120px;max-height:120px;object-fit:cover;border-radius:var(--radius);margin-top:8px}

/* Sub tabs */
.sub-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.sub-tab{padding:8px 16px;cursor:pointer;font-size:.88rem;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.sub-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Inline item row */
.item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border-light);gap:8px;flex-wrap:wrap}
.item-row:last-child{border-bottom:none}
.item-row .item-row-left{flex:1;min-width:120px}
.item-row .item-row-left .item-name{font-weight:600;font-size:.9rem}
.item-row .item-row-left .item-stock{font-size:.78rem;color:var(--text-light)}
.item-row .item-row-right{display:flex;flex-direction:column;align-items:center;gap:4px}
.item-row .inline-adjuster{display:flex;align-items:center;gap:0}
.item-row .inline-adjuster .adj-btn{width:36px;height:36px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:1.1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text)}
.item-row .inline-adjuster .adj-btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.item-row .inline-adjuster .adj-btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.item-row .inline-adjuster .adj-btn:hover{background:var(--border-light)}
.item-row .inline-adjuster .adj-btn:active{background:var(--accent);color:#fff}
.item-row .inline-adjuster input{width:56px;height:36px;text-align:center;border:1px solid var(--border);border-left:none;border-right:none;font-size:.95rem;font-weight:600;outline:none;-moz-appearance:textfield}
.item-row .inline-adjuster input::-webkit-outer-spin-button,.item-row .inline-adjuster input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.item-row .btn-add-item{font-size:.78rem;padding:3px 12px;border-radius:12px}

/* Floating panel */
.float-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--accent);z-index:90;transition:transform .3s;max-height:50vh;overflow-y:auto;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.float-panel.collapsed{transform:translateY(calc(100% - 48px))}
.float-panel-header{padding:12px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:var(--accent);color:#fff;font-weight:600;font-size:.92rem;position:sticky;top:0;z-index:1}
.float-panel-body{padding:12px 20px}
.float-panel-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-light);font-size:.88rem}
.float-panel-item .item-info{flex:1}
.float-panel-item .item-qty{display:flex;align-items:center;gap:8px}
.float-panel-item .item-qty input{width:60px;text-align:center;padding:4px;border:1px solid var(--border);border-radius:4px}
.float-panel-actions{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--card)}

/* Order card collapsible */
.order-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.order-card-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.order-card-header:hover{background:var(--border-light)}
.order-card-body{display:none;padding:0 20px 16px;border-top:1px solid var(--border-light)}
.order-card.expanded .order-card-body{display:block}
.order-item-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light);flex-wrap:wrap;gap:8px}
.order-item-row:last-child{border:none}
.order-item-info{flex:1;min-width:150px}
.order-item-actions{display:flex;gap:6px;flex-wrap:wrap}

/* Responsive table cards */
@media(max-width:640px){
  .responsive-cards thead{display:none}
  .responsive-cards tbody tr{display:block;background:var(--card);border-radius:var(--radius);padding:12px;margin-bottom:8px;box-shadow:var(--shadow)}
  .responsive-cards td{display:flex;justify-content:space-between;padding:6px 0;border:none}
  .responsive-cards td::before{content:attr(data-label);font-weight:600;color:var(--text-light);margin-right:12px}
  .mat-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
}

/* Qty adjuster in modal */
.qty-adjuster{display:flex;align-items:center;gap:12px;justify-content:center;margin:16px 0}
.qty-adjuster .btn{width:44px;height:44px;border-radius:50%;font-size:1.3rem;padding:0;display:flex;align-items:center;justify-content:center}
.qty-adjuster input{width:80px;text-align:center;font-size:1.4rem;font-weight:700;border:2px solid var(--border);border-radius:var(--radius);padding:8px}
.qty-type-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
.qty-type-toggle .btn.active{box-shadow:0 0 0 3px rgba(49,130,206,.3)}

/* View toggle */
.view-toggle{display:flex;gap:4px}
.view-toggle .btn.active{background:var(--accent);color:#fff}

/* Mat card grid */
.mat-grid{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.mat-card{width:calc(33.333% - 6px);background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:10px 6px 8px;text-align:center}
.mat-card .mat-card-img{width:56px;height:56px;object-fit:cover;border-radius:6px;margin-bottom:4px}
.mat-card .mat-card-icon{font-size:2rem;margin-bottom:4px}
.mat-card .mat-card-name{font-size:.75rem;font-weight:600;line-height:1.2;margin-bottom:2px;word-break:break-all;max-height:2.4em;overflow:hidden}
.mat-card .mat-card-stock{font-size:.68rem;color:var(--text-light);margin-bottom:6px}
.mat-card .inline-adjuster .adj-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:.95rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text)}
.mat-card .inline-adjuster .adj-btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.mat-card .inline-adjuster .adj-btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.mat-card .inline-adjuster .adj-btn:hover{background:var(--border-light)}
.mat-card .inline-adjuster .adj-btn:active{background:var(--accent);color:#fff}
.mat-card .inline-adjuster input{width:40px;height:28px;text-align:center;border:1px solid var(--border);border-left:none;border-right:none;font-size:.82rem;font-weight:600;outline:none;-moz-appearance:textfield}
.mat-card .inline-adjuster input::-webkit-outer-spin-button,.mat-card .inline-adjuster input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
@media(min-width:769px){.mat-card{width:calc(25% - 6px)}}
@media(max-width:400px){.mat-card{width:calc(33.333% - 6px)}}

/* Submit bar */
.submit-bar-row{display:flex;gap:10px;margin-bottom:12px;align-items:stretch}
.submit-bar{flex:1;background:var(--accent);color:#fff;padding:14px 20px;border-radius:var(--radius);text-align:center;cursor:pointer;font-weight:700;font-size:1.05rem;box-shadow:0 2px 8px rgba(49,130,206,.3);transition:background .2s}
.submit-bar:hover{background:var(--accent-hover)}
.submit-bar .submit-count{background:rgba(255,255,255,.25);padding:2px 10px;border-radius:12px;font-size:.85rem;margin-left:8px}
.submit-bar[disabled]{opacity:.5;pointer-events:none}
.btn-clear-all{background:var(--danger);color:#fff;border:none;padding:14px 16px;border-radius:var(--radius);cursor:pointer;font-weight:600;font-size:.9rem;white-space:nowrap;transition:background .2s}
.btn-clear-all:hover{background:var(--danger-hover)}

/* Bottom change panel */
.bottom-change-panel{position:sticky;bottom:0;left:0;right:0;background:var(--card);box-shadow:0 -4px 16px rgba(0,0,0,.12);z-index:80;border-radius:12px 12px 0 0;overflow:hidden;margin:0 -20px;transition:all .3s ease}
@media(max-width:768px){.bottom-change-panel{margin:0 -12px}}
.bottom-change-panel .bcp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;background:var(--card);border-bottom:1px solid var(--border-light)}
.bottom-change-panel .bcp-header:hover{background:var(--border-light)}
.bottom-change-panel .bcp-title{font-weight:700;font-size:.95rem;color:var(--text)}
.bottom-change-panel .bcp-arrow{font-size:.85rem;color:var(--text-light);transition:transform .3s}
.bottom-change-panel.collapsed .bcp-arrow{transform:rotate(180deg)}
.bottom-change-panel .bcp-body{max-height:40vh;overflow-y:auto;padding:0}
.bottom-change-panel.collapsed .bcp-body{display:none}
.bottom-change-panel .bcp-empty{padding:20px;text-align:center;color:var(--text-light);font-size:.9rem}
.bottom-change-panel .bcp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border-light);font-size:.88rem}
.bottom-change-panel .bcp-item:last-child{border-bottom:none}
.bottom-change-panel .bcp-item-name{flex:1;font-weight:500}
.bottom-change-panel .bcp-item-qty{margin:0 12px;font-weight:700;min-width:40px;text-align:center}
.bottom-change-panel .bcp-item-qty.positive{color:var(--success)}
.bottom-change-panel .bcp-item-qty.negative{color:var(--danger)}
.bottom-change-panel .bcp-item-remove{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:4px;transition:all .15s}
.bottom-change-panel .bcp-item-remove:hover{background:var(--danger-bg);color:var(--danger)}
.bottom-change-panel .bcp-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--card)}
.bottom-change-panel.collapsed .bcp-footer{display:none}
.confirmed-panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:16px;overflow:hidden}
.confirmed-panel .cp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-light)}
.confirmed-panel .cp-header:hover{background:var(--border-light)}
.confirmed-panel .cp-title{font-weight:700;font-size:.95rem;color:var(--text)}

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2bndmZXNibnh6b3FwZGdhdW92Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNTAwMjIsImV4cCI6MjA5MDYyNjAyMn0.wpf9rUcPiaTUkDVhVgUaxBJ2rA4WaAMHG7tgSv9BOOQ';

// ===================== STATE =====================
let currentUser = null;
let userProfile = null;
let allClinics = [];

// ===================== INIT =====================
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    try {
      const { data, error } = await sb.auth.exchangeCodeForSession(code);
      if (error) console.error('Code exchange error:', error);
    } catch(e) { console.error('Exchange error:', e); }
    history.replaceState(null, '', window.location.pathname);
  }
  if (window.location.hash && window.location.hash.includes('access_token')) {
    await sb.auth.getSession();
    history.replaceState(null, '', window.location.pathname);
  }
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProfile();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      document.getElementById('loginLoading').style.display = 'block';
      await loadProfile();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null; userProfile = null; showLogin();
    }
  });
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('waitingPage').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginLoading').style.display = 'none';
}

async function doLogin() {
  document.getElementById('loginLoading').style.display = 'block';
  const { data, error } = await sb.auth.signInWithOAuth({
    provider: 'custom:line',
    options: { redirectTo: window.location.origin + window.location.pathname, queryParams: { prompt: 'consent' } }
  });
  if (error) { toast('登入失敗: ' + error.message, 'error'); document.getElementById('loginLoading').style.display = 'none'; }
}

async function doLogout() { await sb.auth.signOut(); showLogin(); }

async function loadProfile() {
  const { data, error } = await sb.from('user_profiles').select('*, roles(*)').eq('id', currentUser.id).single();
  if (error && error.code === 'PGRST116') {
    const meta = currentUser.user_metadata || {};
    const displayName = meta.full_name || meta.name || meta.preferred_username || currentUser.email || '新使用者';
    const lineId = meta.provider_id || meta.sub || '';
    const { data: newP, error: e2 } = await sb.from('user_profiles').insert({
      id: currentUser.id, display_name: displayName, role: 'clinic_manager', line_user_id: lineId, is_active: true
    }).select().single();
    if (e2) { toast('建立個人資料失敗: ' + e2.message, 'error'); showLogin(); return; }
    userProfile = newP;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('waitingPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  if (error) { toast('載入資料失敗: ' + error.message, 'error'); showLogin(); return; }
  userProfile = data;
  if (!data.is_active) { toast('您的帳號已被停用', 'error'); await sb.auth.signOut(); showLogin(); return; }
  if (data.role === 'clinic_manager' && !data.clinic_id) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('waitingPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    return;
  }
  await enterApp();
}

async function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('waitingPage').style.display = 'none';
  document.getElementById('loginLoading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('headerUser').textContent = `${userProfile.display_name} (${roleLabel(userProfile.role, userProfile.role_id)})`;
  await Promise.all([loadClinics(), loadCategories(), loadSuppliers(), loadMaterials(), loadUsers(), loadRoles()]);
  buildNav();
  const firstNav = getNavItems()[0];
  if (firstNav) navigateTo(firstNav.id);
}

const ALL_PERMISSIONS = [
  { key: 'manage_materials', label: '管理品項' },
  { key: 'manage_categories', label: '管理類別' },
  { key: 'manage_suppliers', label: '管理廠商' },
  { key: 'view_all_inventory', label: '查看所有庫存' },
  { key: 'view_prices', label: '查看價格' },
  { key: 'manage_orders', label: '管理叫貨' },
  { key: 'ship_orders', label: '出貨管理' },
  { key: 'daily_changes', label: '日常變動' },
  { key: 'create_orders', label: '建立叫貨' },
  { key: 'receive_orders', label: '收貨' },
  { key: 'manage_clinics', label: '管理診所' },
  { key: 'manage_users', label: '管理人員' },
  { key: 'manage_roles', label: '管理角色' }
];

function roleLabel(roleStr, roleId) {
  if (roleId) {
    const role = allRoles.find(r => r.id === roleId);
    if (role) return role.display_name;
  }
  return { owner: '系統管理員', admin: '總管理者', clinic_manager: '診所管理者' }[roleStr] || roleStr;
}

function hasPermission(perm) {
  if (!userProfile) return false;
  if (userProfile.role_id) {
    const role = userProfile.roles || allRoles.find(r => r.id === userProfile.role_id);
    if (role && role.permissions) {
      const perms = typeof role.permissions === 'string' ? JSON.parse(role.permissions) : role.permissions;
      // Support both object {"all":true,"manage_orders":true} and array ["perm1","perm2"]
      if (Array.isArray(perms)) return perms.includes(perm);
      if (typeof perms === 'object') return perms.all === true || perms[perm] === true;
    }
  }
  // Fallback: old role field when role_id is null
  const r = userProfile.role;
  if (r === 'owner') return true;
  if (r === 'admin') return !['manage_users', 'manage_roles'].includes(perm);
  return ['daily_changes', 'create_orders', 'receive_orders'].includes(perm);
}

function isSystemAdmin() {
  if (!userProfile) return false;
  if (userProfile.role_id) {
    const role = userProfile.roles || allRoles.find(r => r.id === userProfile.role_id);
    return !!(role && role.is_system);
  }
  return userProfile.role === 'owner';
}

function isOwner() { return isSystemAdmin(); }
function isAdmin() { return hasPermission('manage_orders'); }
function isManager() { return !hasPermission('manage_orders'); }
function canSeeAdmin() { return hasPermission('view_all_inventory'); }
function canSeePrice() { return hasPermission('view_prices'); }

// ===================== DATA =====================
async function loadClinics() { const { data } = await sb.from('clinics').select('*').order('id'); allClinics = data || []; }
async function loadCategories() { const { data } = await sb.from('categories').select('*').order('sort_order'); allCategories = data || []; }
async function loadSuppliers() { const { data } = await sb.from('suppliers').select('*').order('name'); allSuppliers = data || []; }
async function loadMaterials() { const { data } = await sb.from('materials').select('*').order('name'); allMaterials = data || []; }
async function loadUsers() { const { data } = await sb.from('user_profiles').select('*').order('created_at'); allUsers = data || []; }
async function loadRoles() { const { data } = await sb.from('roles').select('*').order('id'); allRoles = data || []; }

function clinicName(id) { return allClinics.find(c => c.id === id)?.name || '-'; }
function categoryName(id) { return allCategories.find(c => c.id === id)?.name || '-'; }
function supplierName(id) { return allSuppliers.find(s => s.id === id)?.name || '-'; }
function materialName(id) { return allMaterials.find(m => m.id === id)?.name || '-'; }
function materialObj(id) { return allMaterials.find(m => m.id === id); }
function userName(id) { return allUsers.find(u => u.id === id)?.display_name || '-'; }

// ===================== NAV =====================
function getNavItems() {
  const all = [
    { id: 'stock-overview', icon: '📊', label: '庫存總覽' },
    { id: 'daily-change', icon: '🔄', label: '日常變動', perm: 'daily_changes' },
    { id: 'ordering', icon: '📦', label: '叫貨', perm: 'create_orders' },
    { id: 'order-mgmt', icon: '📋', label: '叫貨管理', perm: 'manage_orders' },
    { id: 'receiving', icon: '✅', label: '收貨', perm: 'receive_orders' },
    { id: 'admin-mgmt', icon: '⚙️', label: '行政管理', perms: ['manage_materials', 'manage_categories', 'manage_suppliers', 'manage_clinics'] },
    { id: 'user-mgmt', icon: '👥', label: '人員管理', perms: ['manage_users', 'manage_roles'] }
  ];
  return all.filter(it => {
    if (!it.perm && !it.perms) return true;
    if (it.perm) return hasPermission(it.perm);
    if (it.perms) return it.perms.some(p => hasPermission(p));
    return false;
  });
}

function buildNav() {
  const items = getNavItems();
  let sidebarHTML = `<div class="nav-section">${roleLabel(userProfile.role, userProfile.role_id)}</div>`;
  items.forEach(it => {
    sidebarHTML += `<div class="nav-item" data-page="${it.id}" onclick="navigateTo('${it.id}')">${it.icon} ${it.label}</div>`;
  });
  document.getElementById('sidebar').innerHTML = sidebarHTML;

  const bottomInner = document.getElementById('bottomNavInner');
  const maxBottom = 4;
  let bhtml = '';
  const shown = items.slice(0, maxBottom);
  const hidden = items.slice(maxBottom);
  shown.forEach(it => {
    bhtml += `<div class="bnav-item" data-page="${it.id}" onclick="navigateTo('${it.id}')"><span>${it.icon}</span><span>${it.label}</span></div>`;
  });
  if (hidden.length > 0) {
    let moreHtml = '';
    hidden.forEach(it => {
      moreHtml += `<div class="mm-item" data-page="${it.id}" onclick="navigateTo('${it.id}');closeMoreMenu()">${it.icon} ${it.label}</div>`;
    });
    bhtml += `<div class="bnav-item bnav-more" onclick="toggleMoreMenu(event)"><span>⋯</span><span>更多</span><div class="more-menu" id="moreMenu">${moreHtml}</div></div>`;
  }
  bottomInner.innerHTML = bhtml;
}

function toggleMoreMenu(e) {
  e.stopPropagation();
  const m = document.getElementById('moreMenu');
  m.classList.toggle('show');
  const close = () => { m.classList.remove('show'); document.removeEventListener('click', close); };
  if (m.classList.contains('show')) setTimeout(() => document.addEventListener('click', close), 0);
}
function closeMoreMenu() { const m = document.getElementById('moreMenu'); if (m) m.classList.remove('show'); }

function navigateTo(pageId) {
  currentPage = pageId;
  hideFloatPanel();
  document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === pageId));
  document.querySelectorAll('.bottom-nav .bnav-item').forEach(n => n.classList.toggle('active', n.dataset.page === pageId));
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent)"></div></div>';
  const renderers = {
    'stock-overview': renderStockOverview,
    'daily-change': renderDailyChange,
    'ordering': renderOrdering,
    'order-mgmt': renderOrderMgmt,
    'receiving': renderReceiving,
    'admin-mgmt': renderAdminMgmt,
    'user-mgmt': renderUserMgmt
  };
  const fn = renderers[pageId];
  if (fn) fn();
  else mc.innerHTML = '<div class="empty-state"><span>🚧</span>頁面建置中</div>';
}

// ===================== UTILS =====================
function toast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(() => t.remove(), 300); }, 3000);
}

function openModal(title, bodyHtml, footerHtml = '') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = footerHtml;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

function showConfirm(title, msg) {
  return new Promise(resolve => {
    confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').innerHTML = msg;
    document.getElementById('confirmOverlay').classList.add('show');
  });
}
function closeConfirm(result) {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
}

function optionsHTML(arr, valKey, labelKey, selected) {
  return '<option value="">-- 請選擇 --</option>' +
    arr.map(a => `<option value="${a[valKey]}"${a[valKey] == selected ? ' selected' : ''}>${a[labelKey]}</option>`).join('');
}
function fmtDate(d) { if (!d) return '-'; const dt = new Date(d); return dt.toLocaleDateString('zh-TW') + ' ' + dt.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }); }
function fmtMoney(n) { return '$' + Number(n || 0).toLocaleString(); }
function statusBadge(s) {
  const map = { pending: '待確認', confirmed: '已確認', shipped: '已出貨', delivered: '已到貨', cancelled: '已取消' };
  return `<span class="badge badge-${s}">${map[s] || s}</span>`;
}
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Float panel
function showFloatPanel(mode, title) {
  floatPanelMode = mode;
  const fp = document.getElementById('floatPanel');
  fp.style.display = 'block';
  fp.classList.remove('collapsed');
  updateFloatPanel();
}
function hideFloatPanel() {
  document.getElementById('floatPanel').style.display = 'none';
  floatPanelItems = [];
  floatPanelMode = '';
}
function toggleFloatPanel() {
  document.getElementById('floatPanel').classList.toggle('collapsed');
  document.getElementById('floatPanelArrow').textContent =
    document.getElementById('floatPanel').classList.contains('collapsed') ? '▲' : '▼';
}

function updateFloatPanel() {
  const titleEl = document.getElementById('floatPanelTitle');
  const bodyEl = document.getElementById('floatPanelBody');
  const actEl = document.getElementById('floatPanelActions');
  const fp = document.getElementById('floatPanel');

  if (floatPanelItems.length === 0) {
    fp.classList.add('collapsed');
  }

  if (floatPanelMode === 'daily') {
    titleEl.textContent = `變動清單 (${floatPanelItems.length})`;
    bodyEl.innerHTML = floatPanelItems.length === 0
      ? '<div style="padding:12px;color:var(--text-light);text-align:center">尚無變動項目</div>'
      : floatPanelItems.map((it, i) => `
        <div class="float-panel-item">
          <div class="item-info">
            <strong>${escHtml(it.name)}</strong>
            <span style="color:${it.changeType === 'in' ? 'var(--success)' : 'var(--danger)'}">
              ${it.changeType === 'in' ? '+' : '-'}${it.quantity}
            </span>
          </div>
          <button class="btn btn-danger btn-xs" onclick="removeFloatItem(${i})">✕</button>
        </div>`).join('');
    actEl.innerHTML = floatPanelItems.length > 0
      ? `<button class="btn btn-ghost btn-sm" onclick="floatPanelItems=[];updateFloatPanel()">清空</button>
         <button class="btn btn-primary btn-sm" onclick="submitDailyChanges()">確認送出</button>`
      : '';
  } else if (floatPanelMode === 'order') {

      ? '<div style="padding:12px;color:var(--text-light);text-align:center">尚無叫貨項目</div>'

  refreshCardBadges();

async function renderStockOverview() {
  const mc = document.getElementById('mainContent');
  const { data: inv } = await sb.from('clinic_inventory').select('*');
  const clinicsToShow = canSeeAdmin() ? allClinics : allClinics.filter(c => c.id === userProfile.clinic_id);
  const invMap = {};
  (inv || []).forEach(i => { invMap[`${i.clinic_id}_${i.material_id}`] = i; });

  const matsByCat = {};
  allMaterials.forEach(m => {
    const catId = m.category_id || 0;
    if (!matsByCat[catId]) matsByCat[catId] = [];
    matsByCat[catId].push(m);
  });

  let html = `<div class="page-title">📊 庫存總覽</div>`;
  for (const catId of Object.keys(matsByCat)) {
    const catName = catId == 0 ? '未分類' : categoryName(parseInt(catId));
    const mats = matsByCat[catId];
    html += `<div class="card"><div class="card-title">${escHtml(catName)}</div><div class="table-wrap"><table>
      <thead><tr><th>品項</th>${clinicsToShow.map(c => `<th>${escHtml(c.name)}</th>`).join('')}<th>總計</th></tr></thead><tbody>`;
    mats.forEach(m => {
      let total = 0;
      const cells = clinicsToShow.map(c => {
        const rec = invMap[`${c.id}_${m.id}`];
        const stock = rec ? rec.current_stock : 0;
        const safety = rec ? rec.safety_stock : 5;
        total += stock;
        const cls = stock <= safety ? 'stock-danger' : '';
        return `<td class="${cls}">${stock}</td>`;
      }).join('');
      html += `<tr><td><strong>${escHtml(m.name)}</strong><br><small class="text-muted">${escHtml(m.spec || '')} ${escHtml(m.unit)}</small></td>${cells}<td><strong>${total}</strong></td></tr>`;
    });
    html += '</tbody></table></div></div>';
  }
  if (Object.keys(matsByCat).length === 0) {
    html += '<div class="card"><div class="empty-state"><span>📦</span>尚無品項資料</div></div>';
  }
  mc.innerHTML = html;
}

window.adjDailyQty = function(matId, delta) {
  const el = document.getElementById('daily_' + matId);
  if (!el) return;
  const val = parseInt(el.value || 0) + delta;
  el.value = val;
  dailyQtyMap[matId] = val;
  updateDailySubmitBar();
};

window.resetDailyQty = function(matId) {
  dailyQtyMap[matId] = 0;
  const el = document.getElementById('daily_' + matId);
  if (el) el.value = 0;
  updateDailySubmitBar();
};

window.clearAllDailyQty = function() {
  dailyQtyMap = {};
  allMaterials.forEach(m => {
    const el = document.getElementById('daily_' + m.id);
    if (el) el.value = 0;
  });
  updateDailySubmitBar();
};

function getDailyChangedItems() {
  const items = [];
  allMaterials.forEach(m => {
    const val = dailyQtyMap[m.id] || 0;
    if (val !== 0) {
      items.push({ material_id: m.id, name: m.name, quantity: Math.abs(val), changeType: val > 0 ? 'in' : 'out' });
    }
  });
  return items;
}

function updateDailySubmitBar() {
  const panel = document.getElementById('dailyChangePanel');
  if (!panel) return;
  const items = getDailyChangedItems();
  const titleEl = document.getElementById('dailyPanelTitle');
  const bodyEl = document.getElementById('dailyPanelBody');
  const footerEl = document.getElementById('dailyPanelFooter');

  titleEl.textContent = `📋 變動清單 (${items.length})`;

  if (items.length === 0) {
    bodyEl.innerHTML = '<div class="bcp-empty">尚無變動</div>';
    footerEl.innerHTML = '';
  } else {
    bodyEl.innerHTML = items.map(it => `
      <div class="bcp-item">
        <span class="bcp-item-name">${escHtml(it.name)}</span>
        <span class="bcp-item-qty ${it.changeType === 'in' ? 'positive' : 'negative'}">${it.changeType === 'in' ? '+' : '-'}${it.quantity}</span>
        <button class="bcp-item-remove" onclick="resetDailyQty(${it.material_id})" title="取消">✕</button>
      </div>`).join('');
    footerEl.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="clearAllDailyQty()">全部清除</button>
      <button class="btn btn-primary btn-sm" onclick="submitDailyChanges()">確定送出 (${items.length})</button>`;
  }
}

window.toggleDailyPanel = function() {
  const panel = document.getElementById('dailyChangePanel');
  if (!panel) return;
  panel.classList.toggle('collapsed');
};

window.filterDailyItems = function(q) {
  q = q.toLowerCase();
  const selector = dailyViewMode === 'icon' ? '#dailyContent .mat-card' : '#dailyContent .item-row';
  document.querySelectorAll(selector).forEach(el => {
    const name = el.dataset.name || '';
    el.style.display = name.includes(q) ? '' : 'none';
  });
};

async function submitDailyChanges() {
  const items = getDailyChangedItems();
  if (!items.length) { toast('請先調整品項數量', 'error'); return; }
  if (!dailyClinicId) { toast('請選擇診所', 'error'); return; }

  const summary = items.map(it => `${it.changeType === 'in' ? '+' : '-'}${it.quantity} ${it.name}`).join('、');
  if (!await showConfirm('確認送出', `將送出 ${items.length} 項變動：<br><small>${summary}</small>`)) return;

  try {
    for (const it of items) {
      const { data: inv } = await sb.from('clinic_inventory')
        .select('*').eq('clinic_id', dailyClinicId).eq('material_id', it.material_id).single();

      if (it.changeType === 'out') {
        if (!inv) { toast(`${it.name} 無庫存紀錄`, 'error'); continue; }
        if (inv.current_stock < it.quantity) { toast(`${it.name} 庫存不足 (${inv.current_stock})`, 'error'); continue; }
        await sb.from('clinic_inventory').update({ current_stock: inv.current_stock - it.quantity }).eq('id', inv.id);
      } else {
        if (inv) {
          await sb.from('clinic_inventory').update({ current_stock: inv.current_stock + it.quantity }).eq('id', inv.id);
        } else {
          await sb.from('clinic_inventory').insert({ clinic_id: dailyClinicId, material_id: it.material_id, current_stock: it.quantity, safety_stock: 5 });
        }
      }
      await sb.from('inventory_logs').insert({
        clinic_id: dailyClinicId, material_id: it.material_id,
        type: it.changeType === 'in' ? 'in' : 'out',
        quantity: it.quantity,
        operator_id: currentUser.id, operator_name: userProfile.display_name,
        notes: it.changeType === 'in' ? '日常入庫' : '日常消耗'
      });
    }
    toast('所有變動已送出');
    dailyQtyMap = {};
    // Reload inventory
    const { data: invData } = await sb.from('clinic_inventory').select('*').eq('clinic_id', dailyClinicId);
    dailyInvMap = {};
    (invData || []).forEach(i => { dailyInvMap[i.material_id] = i; });
    renderDailyContent();
    loadDailyConfirmedLogs();
  } catch (e) {
    toast('送出失敗: ' + e.message, 'error');
  }
}

window.toggleDailyConfirmedPanel = function() {
  const panel = document.getElementById('dailyConfirmedPanel');
  if (panel) panel.classList.toggle('collapsed');
};

async function loadDailyConfirmedLogs() {
  const titleEl = document.getElementById('dailyConfirmedTitle');
  const bodyEl = document.getElementById('dailyConfirmedBody');
  if (!titleEl || !bodyEl) return;
  if (!dailyClinicId) { bodyEl.innerHTML = '<div class="cp-empty">請選擇診所</div>'; return; }

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);

  const { data: logs } = await sb.from('inventory_logs').select('*')
    .eq('clinic_id', dailyClinicId)
    .gte('created_at', todayStart.toISOString())
    .lte('created_at', todayEnd.toISOString())
    .order('created_at', { ascending: false });

  const items = logs || [];
  titleEl.textContent = `✅ 已確認變動 (${items.length})`;

  if (!items.length) {
    bodyEl.innerHTML = '<div class="cp-empty">今天尚無已確認變動</div>';
    return;
  }
  bodyEl.innerHTML = items.map(log => {
    const isIn = log.type === 'in';
    const time = new Date(log.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    return `<div class="cp-item">
      <div class="cp-item-left">
        <span class="cp-item-name">${escHtml(materialName(log.material_id))}</span>
        <span class="cp-item-qty ${isIn ? 'positive' : 'negative'}">${isIn ? '+' : '-'}${log.quantity}</span>
        <span class="cp-item-time">${time}</span>
      </div>
      <button class="cp-item-cancel" onclick="cancelDailyLog(${log.id})">取消</button>
    </div>`;
  }).join('');
}

window.cancelDailyLog = async function(logId) {
  if (!await showConfirm('取消變動', '確定要取消這筆變動？庫存將反向調整。')) return;
  try {
    const { data: log, error: e1 } = await sb.from('inventory_logs').select('*').eq('id', logId).single();
    if (e1 || !log) { toast('找不到該筆紀錄', 'error'); return; }

    const { data: inv } = await sb.from('clinic_inventory').select('*')
      .eq('clinic_id', log.clinic_id).eq('material_id', log.material_id).single();

    if (inv) {
      const newStock = log.type === 'out' ? inv.current_stock + log.quantity : inv.current_stock - log.quantity;
      await sb.from('clinic_inventory').update({ current_stock: Math.max(0, newStock) }).eq('id', inv.id);
    }

    await sb.from('inventory_logs').delete().eq('id', logId);
    toast('變動已取消，庫存已調整');

    // Reload inventory map and confirmed logs
    const { data: invData } = await sb.from('clinic_inventory').select('*').eq('clinic_id', dailyClinicId);
    dailyInvMap = {};
    (invData || []).forEach(i => { dailyInvMap[i.material_id] = i; });
    renderDailyContent();
    loadDailyConfirmedLogs();
  } catch (e) {
    toast('取消失敗: ' + e.message, 'error');
  }
};

          <button class="btn-reset-item" onclick="resetOrderQty(${m.id})" title="重置">↺</button>
        </div>
      </div>`;
    }).join('')}</div>`;
  }
}

window.adjOrderQty = function(matId, delta) {
  const el = document.getElementById('order_' + matId);
  if (!el) return;
  let val = parseInt(el.value || 0) + delta;
  if (val < 0) val = 0;
  el.value = val;
  orderQtyMap[matId] = val;
  updateOrderSubmitBar();
};

window.resetOrderQty = function(matId) {
  orderQtyMap[matId] = 0;
  const el = document.getElementById('order_' + matId);
  if (el) el.value = 0;
  updateOrderSubmitBar();
};

window.clearAllOrderQty = function() {
  orderQtyMap = {};
  allMaterials.forEach(m => {
    const el = document.getElementById('order_' + m.id);
    if (el) el.value = 0;
  });
  updateOrderSubmitBar();
};

function getOrderSelectedItems() {
  const items = [];
  allMaterials.forEach(m => {
    const val = orderQtyMap[m.id] || 0;
    if (val > 0) {
      items.push({ material_id: m.id, name: m.name, quantity: val, unit_price: m.unit_price || 0, unit: m.unit });
    }
  });
  return items;
}

function updateOrderSubmitBar() {
  const panel = document.getElementById('orderChangePanel');
  if (!panel) return;
  const items = getOrderSelectedItems();
  const titleEl = document.getElementById('orderPanelTitle');
  const bodyEl = document.getElementById('orderPanelBody');
  const footerEl = document.getElementById('orderPanelFooter');

  titleEl.textContent = `📦 叫貨清單 (${items.length})`;

  if (items.length === 0) {
    bodyEl.innerHTML = '<div class="bcp-empty">尚無叫貨項目</div>';
    footerEl.innerHTML = '';
  } else {
    bodyEl.innerHTML = items.map(it => `
      <div class="bcp-item">
        <span class="bcp-item-name">${escHtml(it.name)}</span>
        <span class="bcp-item-qty positive">x${it.quantity}</span>
        <button class="bcp-item-remove" onclick="resetOrderQty(${it.material_id})" title="取消">✕</button>
      </div>`).join('');
    footerEl.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="clearAllOrderQty()">全部清除</button>
      <button class="btn btn-primary btn-sm" onclick="confirmOrderList()">送出叫貨 (${items.length})</button>`;
  }
}

window.toggleOrderPanel = function() {
  const panel = document.getElementById('orderChangePanel');
  if (!panel) return;
  panel.classList.toggle('collapsed');
};

window.filterOrderItems = function(q) {
  q = q.toLowerCase();
  const selector = orderViewMode === 'icon' ? '#orderContent .mat-card' : '#orderContent .item-row';
  document.querySelectorAll(selector).forEach(el => {
    const name = el.dataset.name || '';
    el.style.display = name.includes(q) ? '' : 'none';
  });
};

function confirmOrderList() {
  const items = getOrderSelectedItems();
  if (!items.length) { toast('請先選擇品項數量', 'error'); return; }
  orderConfirmItems = items;
  // Reset inputs and qty map
  orderQtyMap = {};
  items.forEach(it => {
    const el = document.getElementById('order_' + it.material_id);
    if (el) el.value = 0;
  });
  updateOrderSubmitBar();
  updateOrderConfirmArea();
  toast(`${items.length} 項品項已加入叫貨清單`, 'info');
}

function updateOrderConfirmArea() {
  const area = document.getElementById('orderConfirmArea');
  if (!area) return;
  if (!orderConfirmItems.length) { area.innerHTML = ''; return; }
  const total = orderConfirmItems.reduce((s, it) => s + (it.unit_price || 0) * it.quantity, 0);
  area.innerHTML = `<div class="order-confirm-area">
    <h3>叫貨清單 (${orderConfirmItems.length} 項)${canSeePrice() ? ' | 總計 ' + fmtMoney(total) : ''}</h3>
    ${orderConfirmItems.map((it, i) => `<div class="order-confirm-item">
      <span><strong>${escHtml(it.name)}</strong> x${it.quantity}${canSeePrice() ? ' <small class="text-muted">' + fmtMoney(it.unit_price * it.quantity) + '</small>' : ''}</span>
      <button class="btn btn-danger btn-xs" onclick="removeOrderConfirmItem(${i})">✕</button>
    </div>`).join('')}
    <div class="order-confirm-actions">
      <button class="btn btn-ghost" onclick="orderConfirmItems=[];updateOrderConfirmArea()">清空</button>
      <button class="btn btn-success" onclick="submitOrdering()">送出叫貨</button>
    </div>
  </div>`;
}

window.removeOrderConfirmItem = function(idx) {
  orderConfirmItems.splice(idx, 1);
  updateOrderConfirmArea();
};

async function submitOrdering() {
  if (!orderConfirmItems.length) { toast('清單是空的', 'error'); return; }
  const cid = orderClinicId || userProfile.clinic_id;
  if (!cid) { toast('請選擇診所', 'error'); return; }

  if (!await showConfirm('送出叫貨', `共 ${orderConfirmItems.length} 項品項，確定送出？`)) return;

  try {
    const totalAmount = orderConfirmItems.reduce((s, it) => s + (it.unit_price || 0) * it.quantity, 0);
    const { data: order, error: e1 } = await sb.from('orders').insert({
      status: 'pending', created_by: currentUser.id, total_amount: totalAmount, notes: ''
    }).select().single();
    if (e1) { toast('建立失敗: ' + e1.message, 'error'); return; }

    const orderItems = orderConfirmItems.map(it => ({
      order_id: order.id, material_id: it.material_id, clinic_id: cid,
      quantity: it.quantity, unit_price: it.unit_price || 0
    }));
    const { error: e2 } = await sb.from('order_items').insert(orderItems);
    if (e2) { toast('明細建立失敗: ' + e2.message, 'error'); return; }

    toast('叫貨單已送出');
    orderConfirmItems = [];
    orderQtyMap = {};
    updateOrderConfirmArea();
    updateOrderSubmitBar();
    loadConfirmedOrders();
  } catch (e) {
    toast('錯誤: ' + e.message, 'error');
  }
}

window.toggleOrderConfirmedPanel = function() {
  const panel = document.getElementById('orderConfirmedPanel');
  if (panel) panel.classList.toggle('collapsed');
};

async function loadConfirmedOrders() {
  const titleEl = document.getElementById('orderConfirmedTitle');
  const bodyEl = document.getElementById('orderConfirmedBody');
  if (!titleEl || !bodyEl) return;

  const cid = orderClinicId || userProfile.clinic_id;

  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd = new Date(); todayEnd.setHours(23,59,59,999);

  const { data: orders } = await sb.from('orders').select('*')
    .gte('created_at', todayStart.toISOString())
    .lte('created_at', todayEnd.toISOString())
    .eq('created_by', currentUser.id)
    .order('created_at', { ascending: false });

  // Filter orders that have order_items belonging to the selected clinic
  const orderIds = (orders || []).map(o => o.id);
  let filteredOrders = [];
  let oiMap = {};
  if (orderIds.length > 0 && cid) {
    const { data: allOI } = await sb.from('order_items').select('*').in('order_id', orderIds);
    (allOI || []).forEach(oi => { if (!oiMap[oi.order_id]) oiMap[oi.order_id] = []; oiMap[oi.order_id].push(oi); });
    filteredOrders = (orders || []).filter(o => (oiMap[o.id] || []).some(oi => oi.clinic_id === cid));
  } else {
    filteredOrders = orders || [];
    if (orderIds.length > 0) {
      const { data: allOI } = await sb.from('order_items').select('*').in('order_id', orderIds);
      (allOI || []).forEach(oi => { if (!oiMap[oi.order_id]) oiMap[oi.order_id] = []; oiMap[oi.order_id].push(oi); });
    }
  }

  titleEl.textContent = `✅ 已送出叫貨單 (${filteredOrders.length})`;

  if (!filteredOrders.length) {
    bodyEl.innerHTML = '<div class="cp-empty">今天尚無已送出叫貨單</div>';
    return;
  }

  bodyEl.innerHTML = filteredOrders.map(o => {
    const ois = (oiMap[o.id] || []).filter(oi => !cid || oi.clinic_id === cid);
    const time = new Date(o.created_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    const itemsHtml = ois.map(oi => `<span style="display:inline-flex;align-items:center;gap:2px">${escHtml(materialName(oi.material_id))} x${oi.quantity}<button style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:.85rem;padding:0 2px" onclick="event.stopPropagation();cancelOrderItem(${o.id},${oi.id})">✕</button></span>`).join('、');
    return `<div class="cp-item">
      <div class="cp-item-left" style="flex-direction:column;align-items:flex-start;gap:2px">
        <span class="cp-item-name">#${o.id} ${statusBadge(o.status)} <span class="cp-item-time">${time}</span></span>
        <span style="font-size:.82rem;color:var(--text-light)">${itemsHtml}</span>
      </div>
      ${o.status === 'pending' ? `<button class="cp-item-cancel" onclick="cancelOrder(${o.id})">取消</button>` : ''}
    </div>`;
  }).join('');
}

window.cancelOrder = async function(orderId) {
  if (!await showConfirm('取消叫貨單', '確定要取消整張叫貨單？')) return;
  try {
    await sb.from('order_items').delete().eq('order_id', orderId);
    await sb.from('orders').delete().eq('id', orderId);
    toast('叫貨單已取消');
    loadConfirmedOrders();
  } catch (e) {
    toast('取消失敗: ' + e.message, 'error');
  }
};

window.cancelOrderItem = async function(orderId, itemId) {
  if (!await showConfirm('取消品項', '確定要取消此品項？')) return;
  try {
    await sb.from('order_items').delete().eq('id', itemId);
    const { data: remaining } = await sb.from('order_items').select('id').eq('order_id', orderId);
    if (!remaining || remaining.length === 0) {
      await sb.from('orders').delete().eq('id', orderId);
      toast('品項已取消，叫貨單已清空刪除');
    } else {
      toast('品項已取消');
    }
    loadConfirmedOrders();
  } catch (e) {
    toast('取消失敗: ' + e.message, 'error');
  }
};

// 4. 叫貨管理 (admin/owner)
// ============================================================
let orderMgmtFilter = 'all';
let orderMgmtTab = 'list'; // 'list' | 'summary'

async function renderOrderMgmt() {
  const mc = document.getElementById('mainContent');

  mc.innerHTML = `
    <div class="page-title">📋 叫貨管理</div>
    <div class="sub-tabs" style="margin-bottom:4px">
      <div class="sub-tab ${orderMgmtTab === 'list' ? 'active' : ''}" onclick="orderMgmtTab='list';renderOrderMgmt()">各單管理</div>
      <div class="sub-tab ${orderMgmtTab === 'summary' ? 'active' : ''}" onclick="orderMgmtTab='summary';renderOrderMgmt()">叫貨總覽</div>
    </div>
    <div id="orderMgmtTabContent"></div>`;

  if (orderMgmtTab === 'summary') {
    await renderOrderSummary();
    return;
  }

  // === 各單管理 ===
  const tabContent = document.getElementById('orderMgmtTabContent');
  const { data: orders } = await sb.from('orders').select('*').order('created_at', { ascending: false });

  tabContent.innerHTML = `
    <div class="sub-tabs">
      <div class="sub-tab ${orderMgmtFilter === 'all' ? 'active' : ''}" onclick="orderMgmtFilter='all';renderOrderMgmt()">全部</div>
      <div class="sub-tab ${orderMgmtFilter === 'pending' ? 'active' : ''}" onclick="orderMgmtFilter='pending';renderOrderMgmt()">待確認</div>
      <div class="sub-tab ${orderMgmtFilter === 'confirmed' ? 'active' : ''}" onclick="orderMgmtFilter='confirmed';renderOrderMgmt()">已確認</div>
      <div class="sub-tab ${orderMgmtFilter === 'shipped' ? 'active' : ''}" onclick="orderMgmtFilter='shipped';renderOrderMgmt()">已出貨</div>
      <div class="sub-tab ${orderMgmtFilter === 'delivered' ? 'active' : ''}" onclick="orderMgmtFilter='delivered';renderOrderMgmt()">已到貨</div>
    </div>
    <div id="orderMgmtList"></div>`;

  // 先取得所有 items 以計算真實狀態來篩選
  const allOrderIds = (orders || []).map(o => o.id);
  const { data: allOItems } = await sb.from('order_items').select('order_id, item_status').in('order_id', allOrderIds);
  const oiByOrder = {};
  (allOItems || []).forEach(it => { (oiByOrder[it.order_id] = oiByOrder[it.order_id] || []).push(it); });
  const withRealStatus = (orders || []).map(o => ({ ...o, _realStatus: oiByOrder[o.id] ? slowestItemStatus(oiByOrder[o.id]) : o.status }));
  const filtered = orderMgmtFilter === 'all' ? withRealStatus : withRealStatus.filter(o => o._realStatus === orderMgmtFilter);
  renderOrderMgmtList(filtered);
}

async function renderOrderMgmtList(orders) {
  const el = document.getElementById('orderMgmtList');
  if (!orders.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><span>📭</span>沒有叫貨單</div></div>';
    return;
  }

  el.innerHTML = orders.map(o => {
    const realStatus = o._realStatus || o.status;
    return `
    <div class="order-card" id="oc_${o.id}">
      <div class="order-card-header" onclick="toggleOrderCard(${o.id})">
        <div>
          <strong>#${o.id}</strong> ${statusBadge(realStatus)}
          <span class="text-muted" style="font-size:.82rem;margin-left:8px">${fmtDate(o.created_at)}</span>
        </div>
        <div>
          <span style="font-size:.85rem">${userName(o.created_by)} | ${fmtMoney(o.total_amount)}</span>
          <span style="margin-left:8px">▼</span>
        </div>
      </div>
      <div class="order-card-body" id="ocb_${o.id}"></div>
    </div>`;
  }).join('');
}

// ---- 叫貨總覽 ----
async function renderOrderSummary() {
  const el = document.getElementById('orderMgmtTabContent');
  el.innerHTML = '<div style="text-align:center;padding:32px"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent);width:28px;height:28px;border-width:3px"></div></div>';

  // 讀取所有 confirmed / shipped / delivered 的 order_items
  const { data: items } = await sb.from('order_items').select('*').in('item_status', ['confirmed', 'shipped', 'delivered']);
  if (!items || !items.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><span>📭</span>目前沒有已確認或已出貨的品項</div></div>';
    return;
  }

  // 按 material_id 彙總，分開統計 confirmed vs shipped/delivered
  const grouped = {};
  items.forEach(it => {
    const mid = it.material_id;
    if (!grouped[mid]) grouped[mid] = { confirmedItems: [], shippedItems: [], totalConfirmedQty: 0, totalShippedQty: 0, totalActual: 0 };
    if (it.item_status === 'confirmed') {
      grouped[mid].confirmedItems.push(it);
      grouped[mid].totalConfirmedQty += (it.quantity || 0);
    } else {
      grouped[mid].shippedItems.push(it);
      grouped[mid].totalShippedQty += (it.quantity || 0);
    }
    grouped[mid].totalActual += (it.actual_ordered_qty || 0);
  });

  let html = '<div class="card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.9rem">';
  html += '<thead><tr style="border-bottom:2px solid var(--border);text-align:left">';
  html += '<th style="padding:10px 12px">品項名</th><th style="padding:10px 12px">廠商</th>';
  html += '<th style="padding:10px 12px">待出貨</th><th style="padding:10px 12px">已出貨</th>';
  html += '<th style="padding:10px 12px">已叫貨數量</th>';
  html += '<th style="padding:10px 12px">差額</th></tr></thead><tbody>';

  Object.keys(grouped).forEach(mid => {
    const g = grouped[mid];
    const mat = materialObj(Number(mid));
    const name = mat ? escHtml(mat.name) : `#${mid}`;
    const supplier = mat ? escHtml(supplierName(mat.supplier_id)) : '-';
    const ratio = mat ? (mat.unit_ratio || 1) : 1;
    const orderUnit = mat ? (mat.order_unit || mat.unit || '') : '';

    const confirmedQty = Math.round((g.totalConfirmedQty / ratio) * 100) / 100;
    const shippedQty = Math.round((g.totalShippedQty / ratio) * 100) / 100;
    const actualQty = Math.round((g.totalActual / ratio) * 100) / 100;
    const diff = Math.round((confirmedQty - actualQty) * 100) / 100;
    const diffColor = diff > 0 ? 'var(--danger)' : diff < 0 ? 'var(--success)' : 'var(--text-light)';

    // 收集所有 confirmed items 的 ids 供更新用
    const itemIds = g.confirmedItems.map(i => i.id).join(',');

    html += `<tr style="border-bottom:1px solid var(--border-light)">
      <td style="padding:10px 12px"><strong>${name}</strong></td>
      <td style="padding:10px 12px">${supplier}</td>
      <td style="padding:10px 12px">${confirmedQty} ${escHtml(orderUnit)}</td>
      <td style="padding:10px 12px">${shippedQty} ${escHtml(orderUnit)}</td>
      <td style="padding:10px 12px">
        <input type="number" value="${actualQty}" min="0" step="0.01"
          style="width:80px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.88rem"
          onchange="onSummaryActualChange(this.value,${ratio},'${itemIds}')">
        ${escHtml(orderUnit)}
      </td>
      <td style="padding:10px 12px;color:${diffColor};font-weight:600">${diff > 0 ? '+' : ''}${diff} ${escHtml(orderUnit)}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

window.onSummaryActualChange = async function(val, ratio, itemIdsStr) {
  const actualInOrderUnit = parseFloat(val) || 0;
  const actualDaily = Math.round(actualInOrderUnit * ratio);
  const ids = itemIdsStr.split(',').map(Number);
  if (!ids.length) return;
  try {
    // 將總量平均分配：第一筆存全部，其餘歸 0（簡化處理）
    for (let i = 0; i < ids.length; i++) {
      const qty = i === 0 ? actualDaily : 0;
      await sb.from('order_items').update({ actual_ordered_qty: qty }).eq('id', ids[i]);
    }
    toast('已更新叫貨數量');
  } catch (e) { toast('更新失敗: ' + e.message, 'error'); }
};

async function toggleOrderCard(orderId) {
  const card = document.getElementById('oc_' + orderId);
  const body = document.getElementById('ocb_' + orderId);
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
    return;
  }
  card.classList.add('expanded');

  if (body.innerHTML) return; // already loaded

  body.innerHTML = '<div style="padding:16px;text-align:center"><div class="spinner" style="border-color:var(--border);border-top-color:var(--accent);width:24px;height:24px;border-width:3px"></div></div>';

  const { data: items } = await sb.from('order_items').select('*').eq('order_id', orderId);
  if (!items || !items.length) { body.innerHTML = '<div style="padding:16px;color:var(--text-light)">無明細</div>'; return; }

  let html = '<div style="padding:16px 0">';
  items.forEach(it => {
    const mat = materialObj(it.material_id);
    const price = it.is_custom_price && it.custom_price != null ? it.custom_price : it.unit_price;
    const itemStatus = it.item_status || it.notes_status || 'pending';
    const ratio = mat ? (mat.unit_ratio || 1) : 1;
    const orderUnit = mat ? (mat.order_unit || mat.unit) : '';
    const dailyUnit = mat ? mat.unit : '';
    const orderQty = Math.round((it.quantity / ratio) * 100) / 100;
    const subtotal = orderQty * price;

    html += `<div class="order-item-row" id="oi_${it.id}">
      <div class="order-item-info" style="flex:1">
        <strong>${mat ? escHtml(mat.name) : materialName(it.material_id)}</strong>
        <span class="text-muted"> | ${escHtml(clinicName(it.clinic_id))}</span>
        <br>
        <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:6px 0">
          <label style="font-size:.82rem;color:var(--text-light)">數量(${escHtml(orderUnit)}):</label>
          <input type="number" id="oiq_${it.id}" value="${orderQty}" min="0" step="0.01"
            style="width:70px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.88rem"
            onchange="onOrderItemQtyChange(${it.id},${orderId},this.value)">
          <label style="font-size:.82rem;color:var(--text-light)">換算:</label>
          <input type="number" id="oir_${it.id}" value="${ratio}" min="0.01" step="0.01"
            style="width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:.88rem"
            onchange="onOrderItemRatioChange(${it.id},${orderId},this.value)">
          <span style="font-size:.8rem;color:var(--text-light)">1${escHtml(orderUnit)}=${ratio}${escHtml(dailyUnit)}</span>
        </div>
        <small>單價: ${it.is_custom_price ? '<span class="text-success">優惠</span> ' : ''}${fmtMoney(price)}
        | 小計: <span id="ois_${it.id}">${fmtMoney(subtotal)}</span></small>
        <br>${statusBadge(itemStatus)}
      </div>
      <div class="order-item-actions">
        ${itemStatus === 'pending' ? `
          <button class="btn btn-ghost btn-xs" onclick="editItemPrice(${it.id},${it.unit_price},${it.custom_price || 0},${it.is_custom_price ? 1 : 0})">💰 改價</button>
          <button class="btn btn-success btn-xs" onclick="confirmOrderItem(${it.id},${orderId})">✓ 確認</button>
          <button class="btn btn-danger btn-xs" onclick="setItemStatus(${it.id},${orderId},'cancelled')">✕ 取消</button>
        ` : ''}
        ${itemStatus === 'confirmed' ? `
          <button class="btn btn-primary btn-xs" onclick="setItemStatus(${it.id},${orderId},'shipped')">📦 出貨</button>
          <button class="btn btn-warning btn-xs" onclick="setItemStatus(${it.id},${orderId},'pending')">↩ 回待確認</button>
          <button class="btn btn-danger btn-xs" onclick="setItemStatus(${it.id},${orderId},'cancelled')">✕ 取消</button>
        ` : ''}
        ${itemStatus === 'shipped' ? `
          <button class="btn btn-warning btn-xs" onclick="setItemStatus(${it.id},${orderId},'confirmed')">↩ 回已確認</button>
        ` : ''}
        ${itemStatus === 'cancelled' ? `
          <button class="btn btn-ghost btn-xs" onclick="setItemStatus(${it.id},${orderId},'pending')">↩ 恢復</button>
        ` : ''}
      </div>
    </div>`;
  });
  // 底部統一操作按鈕
  const hasPending = items.some(i => (i.item_status || 'pending') === 'pending');
  const hasConfirmed = items.some(i => (i.item_status || 'pending') === 'confirmed');
  if (hasPending || hasConfirmed) {
    html += '<div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)">';
    if (hasPending) html += `<button class="btn btn-success btn-sm" onclick="confirmAllItems(${orderId})">✓ 全部確認</button>`;
    if (hasConfirmed) html += `<button class="btn btn-primary btn-sm" onclick="shipAllItems(${orderId})">📦 全部出貨</button>`;
    html += '</div>';
  }

window.confirmAllItems = async function(orderId) {

};

// 計算整單最慢狀態：pending > confirmed > shipped > delivered
function slowestItemStatus(items) {
  const priority = { pending: 0, confirmed: 1, shipped: 2, delivered: 3 };
  const activeItems = items.filter(i => (i.item_status || 'pending') !== 'cancelled');
  if (!activeItems.length) return 'cancelled';
  let slowest = 'delivered';
  for (const it of activeItems) {
    const s = it.item_status || 'pending';
    if ((priority[s] ?? 0) < (priority[slowest] ?? 3)) slowest = s;
  }
  return slowest;
}

async function recomputeOrderStatus(orderId) {
  const { data: items } = await sb.from('order_items').select('*').eq('order_id', orderId);
  if (!items) return;
  const newStatus = slowestItemStatus(items);
  const update = { status: newStatus };
  if (newStatus === 'shipped' && !items._shipped_at) update.shipped_at = new Date().toISOString();
  if (newStatus === 'delivered' && !items._delivered_at) update.delivered_at = new Date().toISOString();
  await sb.from('orders').update(update).eq('id', orderId);
}

async function setItemStatus(itemId, orderId, newStatus) {
  // Try to update item_status column; fallback to notes
  let { error } = await sb.from('order_items').update({ item_status: newStatus }).eq('id', itemId);
  if (error) {
    // Fallback: use notes field to store status
    const notesVal = `__status:${newStatus}`;
    ({ error } = await sb.from('order_items').update({ notes: notesVal }).eq('id', itemId));
    if (error) { toast('更新失敗: ' + error.message, 'error'); return; }
  }

  toast(`品項狀態已改為 ${statusLabelText(newStatus)}`);

  // Check if we need to create delivery_confirmations (when item shipped)
  if (newStatus === 'shipped') {
    console.log(`[setItemStatus] Item ${itemId} shipped → calling checkAutoShipOrder(${orderId})`);
    await checkAutoShipOrder(orderId);
  }

  // 重新計算整單狀態（以最慢的 item 為準）
  await recomputeOrderStatus(orderId);

  // Refresh card
  const cardBody = document.getElementById('ocb_' + orderId);
  if (cardBody) {
    cardBody.innerHTML = '';
    const cardEl = document.getElementById('oc_' + orderId);
    cardEl.classList.remove('expanded');
    toggleOrderCard(orderId);
  }
}

function statusLabelText(s) {
  return { pending: '待確認', confirmed: '已確認', shipped: '已出貨', delivered: '已到貨', cancelled: '已取消' }[s] || s;
}

async function checkAutoShipOrder(orderId) {
  const { data: items } = await sb.from('order_items').select('*').eq('order_id', orderId);
  if (!items) return;

  // Check: any items shipped? → create delivery confirmations for those clinics
  const shippedItems = items.filter(i => (i.item_status || 'pending') === 'shipped');
  if (shippedItems.length > 0) {
    const clinicIds = [...new Set(shippedItems.map(i => i.clinic_id))];
    // Check existing delivery_confirmations
    const { data: existingDcs } = await sb.from('delivery_confirmations').select('clinic_id').eq('order_id', orderId);
    const existingClinicIds = (existingDcs || []).map(d => d.clinic_id);
    const newClinicIds = clinicIds.filter(c => !existingClinicIds.includes(c));
    if (newClinicIds.length > 0) {
      const { error: insertErr } = await sb.from('delivery_confirmations').insert(
        newClinicIds.map(cid => ({ order_id: orderId, clinic_id: cid, status: 'pending' }))
      );
      if (insertErr) {
        console.error(`[checkAutoShipOrder] delivery_confirmations insert failed for order ${orderId}:`, insertErr);
        toast('建立待收貨記錄失敗: ' + insertErr.message, 'error');
        return;
      }
      console.log(`[checkAutoShipOrder] Created delivery_confirmations for order ${orderId}, clinics:`, newClinicIds);
    }
    // Update order status to shipped if not already
    await sb.from('orders').update({ status: 'shipped', shipped_at: new Date().toISOString() }).eq('id', orderId);
  }
}

async function checkAutoDeliverOrder(orderId) {
  const { data: items } = await sb.from('order_items').select('*').eq('order_id', orderId);
  if (!items) return;
  const activeItems = items.filter(i => (i.item_status || 'pending') !== 'cancelled');
  if (activeItems.length === 0) return;
  const allShippedOrDelivered = activeItems.every(i => ['shipped', 'delivered'].includes(i.item_status || 'pending'));
  if (allShippedOrDelivered) {
    await sb.from('orders').update({ status: 'shipped', shipped_at: new Date().toISOString() }).eq('id', orderId);
  }
}

async function rushDelivery(dcId) {
  const now = new Date().toISOString();
  const { data: dc } = await sb.from('delivery_confirmations').select('notes').eq('id', dcId).single();
  const newNotes = (dc?.notes || '') + `\n催貨: ${fmtDate(now)} by ${userProfile.display_name}`;

  if (error) { toast('催貨記錄失敗: ' + error.message, 'error'); return; }

}

async function startReceive(dcId, orderId, clinicId) {
  const { data: items } = await sb.from('order_items').select('*').eq('order_id', orderId).eq('clinic_id', clinicId);
  if (!items || !items.length) { toast('無明細', 'error'); return; }

  // 只顯示已出貨的品項
  const shippedItems = items.filter(i => (i.item_status || 'pending') === 'shipped');

  if (!shippedItems.length) { toast('沒有已出貨的品項可收貨', 'error'); return; }

  let body = '<p style="margin-bottom:12px"><strong>確認收貨明細：</strong></p>';
  body += '<table style="width:100%"><thead><tr><th>品項</th><th>數量</th></tr></thead><tbody>';
  shippedItems.forEach(it => {
    body += `<tr><td>${materialName(it.material_id)}</td><td>+${it.quantity}</td></tr>`;
  });
  body += '</tbody></table>';
  body += '<p style="margin-top:12px;color:var(--danger);font-size:.85rem">收貨後庫存將自動增加</p>';

  openModal('確認收貨 #' + orderId, body,
    `<button class="btn btn-ghost" onclick="closeModal()">取消</button>
     <button class="btn btn-success" onclick="doReceive(${dcId},${orderId},${clinicId})">✓ 確認收貨</button>`);
  window._receiveItems = shippedItems;
}

async function doReceive(dcId, orderId, clinicId) {
  const items = window._receiveItems;
  try {
    for (const it of items) {
      const { data: inv } = await sb.from('clinic_inventory')
        .select('*').eq('clinic_id', clinicId).eq('material_id', it.material_id).single();
      if (inv) {
        await sb.from('clinic_inventory').update({ current_stock: inv.current_stock + it.quantity }).eq('id', inv.id);
      } else {
        await sb.from('clinic_inventory').insert({ clinic_id: clinicId, material_id: it.material_id, current_stock: it.quantity, safety_stock: 5 });
      }
      await sb.from('inventory_logs').insert({
        clinic_id: clinicId, material_id: it.material_id, type: 'receive', quantity: it.quantity,
        operator_id: currentUser.id, operator_name: userProfile.display_name, notes: '叫貨單#' + orderId
      });
      // Update item status to delivered
      await sb.from('order_items').update({ item_status: 'delivered' }).eq('id', it.id);
    }

    await sb.from('delivery_confirmations').update({
      status: 'confirmed', confirmed_by: currentUser.id, confirmed_at: new Date().toISOString()
    }).eq('id', dcId);

    // 重新計算整單狀態
    await recomputeOrderStatus(orderId);

    toast('收貨完成，庫存已更新');
    closeModal();
    renderReceiving();
  } catch (e) {
    toast('收貨失敗: ' + e.message, 'error');
  }
}

async function undoReceive(dcId, orderId, clinicId) {
  if (!await showConfirm('反悔收貨', '確定要反悔收貨？庫存將回扣。')) return;

  const { data: items } = await sb.from('order_items').select('*').eq('order_id', orderId).eq('clinic_id', clinicId);
  try {
    for (const it of (items || [])) {
      if ((it.item_status || 'pending') === 'delivered') {
        const { data: inv } = await sb.from('clinic_inventory')
          .select('*').eq('clinic_id', clinicId).eq('material_id', it.material_id).single();
        if (inv) {
          await sb.from('clinic_inventory').update({ current_stock: Math.max(0, inv.current_stock - it.quantity) }).eq('id', inv.id);
        }
        await sb.from('inventory_logs').insert({
          clinic_id: clinicId, material_id: it.material_id, type: 'out', quantity: it.quantity,
          operator_id: currentUser.id, operator_name: userProfile.display_name, notes: '反悔收貨#' + orderId
        });
        await sb.from('order_items').update({ item_status: 'shipped' }).eq('id', it.id);
      }
    }

    await sb.from('delivery_confirmations').update({
      status: 'pending', confirmed_by: null, confirmed_at: null
    }).eq('id', dcId);

    // 重新計算整單狀態
    await recomputeOrderStatus(orderId);

    toast('已反悔收貨，庫存已回扣');
    renderReceiving();
  } catch (e) {
    toast('失敗: ' + e.message, 'error');
  }
}
